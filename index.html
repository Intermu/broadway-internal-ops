  <p id="m">Opening the Ops Suite&hellip; <a href="./Broadway_Projects_Tracker.html">Continue</a> if it doesn't load automatically.</p>

    // Only bounce to the hub when we're the top-level page. If this page is
    // loaded inside a frame (e.g. a tool path fell back to index), do NOT
    // redirect - that would load the hub inside the hub and stack a header.

      location.replace('/Broadway_Projects_Tracker.html' + location.search + location.hash);
    } else {
      document.getElementById('m').textContent = 'This tool could not be loaded at this path.';
    }
