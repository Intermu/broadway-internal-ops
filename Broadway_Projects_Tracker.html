/* BN-THEME:START | Canonical theme synced from bn-theme.css. Do not edit between the sentinels; edit bn-theme.css and run: node sync-theme.js */
:root{
  /* ── COLOR TOKENS ──────────────────────────────────────── */
  --color-bg:            #f0f4f8;
  --color-surface:       #ffffff;
  --color-surface-alt:   #f8fafc;
  --color-surface-faint: #fafffe;
  --color-text:          #1e293b;
  --color-text-muted:    #64748b;
  --color-text-ghost:    #94a3b8;
  --color-border:        #e2e8f0;
  --color-border-strong: #cbd5e1;
  --color-primary:       #1a5f3e;
  --color-primary-strong:#0d3d26;
  --color-primary-faint: #f0fdf4;
  --color-primary-mid:   #c6f0da;
  --color-accent:        #2ECC71;
  --color-success:       #2ECC71;
  --color-success-bg:    #f0fdf4;
  --color-success-border:#c6f0da;
  --color-success-text:  #1a5f3e;
  --color-warning:       #f39c12;
  --color-warning-bg:    #fff8e6;
  --color-warning-border:#f0d87a;
  --color-warning-text:  #7d5a00;
  --color-danger:        #e74c3c;
  --color-danger-bg:     #fef0ee;
  --color-danger-border: #f7c9c9;
  --color-danger-text:   #8b1a1a;
  --color-info:          #3498db;
  --color-info-bg:       #eaf4fd;
  --color-info-border:   #bbd7f0;
  --color-info-text:     #1a5699;
  /* ── ADDED TOKENS (Phase 0.1, value-preserving) ───────── */
  --color-surface-sunken:#f1f5f9;
  --color-text-soft:     #475569;
  --color-danger-bg-alt: #fde8e8;
  --color-warning-bg-alt:#fff3cd;
  --color-success-mid:   #d1f0e6;
  /* ── ROLE TOKENS (Phase 0.2: split dual-use colors for theming) ── */
  --color-on-accent:     #ffffff;
  --color-brand-ink:     #1a5f3e;
  --color-sidebar:       #1e293b;
  /* ── LEGACY ALIASES (kept for backward compat) ─────────── */
  --green:     #2ECC71;
  --green-dk:  #1a5f3e;
  --green-bg:  #f0fdf4;
  --amber:     #f39c12;
  --amber-bg:  #fff8e6;
  --red:       #e74c3c;
  --red-bg:    #fef0ee;
  --blue:      #3498db;
  --blue-bg:   #eaf4fd;
  --border:    #e2e8f0;
  --text:      #1e293b;
  --muted:     #64748b;
  --bg:        #f0f4f8;
  /* aliases used by Pilot Proposal Diagnostic */
  --green-darker:#0d3d26;
  --amber-text:  #7d5a00;
  --red-text:    #8b1a1a;
  /* ── SPACING (8-pt grid) ────────────────────────────────── */
  --space-1: 4px;  --space-2: 8px;  --space-3: 12px; --space-4: 16px;
  --space-5: 20px; --space-6: 24px; --space-7: 28px; --space-8: 32px;
  /* ── RADII ──────────────────────────────────────────────── */
  --radius-sm: 4px; --radius-md: 7px; --radius-lg: 10px;
  --radius-xl: 14px; --radius-pill: 99px;
  /* ── SHADOWS ────────────────────────────────────────────── */
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.08);
  --shadow-md: 0 4px 14px rgba(0,0,0,.10),0 2px 4px rgba(0,0,0,.08);
  /* ── TYPOGRAPHY ─────────────────────────────────────────── */
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  /* ── TRANSITIONS ────────────────────────────────────────── */
  --transition-fast: 0.12s ease;
  --transition-base: 0.20s ease;
}
/* ══ DARK THEME (Phase 0.2) - screen-only, so print falls back to the light :root tokens (no print-reset needed) ══ */
@media screen{
html[data-theme="dark"]{
  --color-bg:#0f141b; --color-surface:#1a2230; --color-surface-alt:#222d3c; --color-surface-faint:#1e2734; --color-surface-sunken:#161f2b;
  --color-text:#e6ebf2; --color-text-soft:#aab6c6; --color-text-muted:#8c99ab; --color-text-ghost:#7d8a9b;
  --color-border:#2b3747; --color-border-strong:#3b4858;
  --color-sidebar:#10161e; --color-brand-ink:#4ade80;
  --color-success-bg:#13251b; --color-success-border:#235f40; --color-success-mid:#16321f; --color-success-text:#4ade80;
  --color-warning-bg:#2a2310; --color-warning-bg-alt:#332a13; --color-warning-border:#5a4716; --color-warning-text:#fbbf24;
  --color-danger-bg:#2a1715; --color-danger-bg-alt:#331a1a; --color-danger-border:#6a2b2b; --color-danger-text:#f87171;
  --color-info-bg:#11212f; --color-info-border:#264a6a; --color-info-text:#60a5fa;
  --text:#e6ebf2; --muted:#8c99ab; --bg:#0f141b; --green-bg:#13251b;
  color-scheme:dark;
}
/* Long-tail element dark overrides (Phase 0.2.1) - token-based so the @media print reset keeps them light */
html[data-theme="dark"] .data-mode-badge.real{background:var(--color-success-bg);color:var(--color-success-text);border-color:var(--color-success-border);}
html[data-theme="dark"] .data-mode-badge.sample{background:var(--color-warning-bg);color:var(--color-warning-text);border-color:var(--color-warning-border);}
html[data-theme="dark"] .upload-panel .last-pill.recent{background:var(--color-success-bg);color:var(--color-success-text);}
html[data-theme="dark"] .upload-panel .last-pill.sample{background:var(--color-warning-bg);color:var(--color-warning-text);}
html[data-theme="dark"] .upload-slot.has-data{background:var(--color-success-bg);border-color:var(--color-success-border);}
html[data-theme="dark"] .upload-panel .panel-head{background:var(--color-success-bg);}
html[data-theme="dark"] .gs-item:hover{background:var(--color-surface-alt);}
html[data-theme="dark"] .gs-item.gs-sel{background:var(--color-success-bg);}
html[data-theme="dark"] .data-table th.sortable:hover{background:var(--color-surface-alt);}
html[data-theme="dark"] .slim-strip .ghost-btn:hover{background:var(--color-success-mid);}
html[data-theme="dark"] .tv-chip{background:var(--color-surface-sunken);color:var(--color-text-soft);}
html[data-theme="dark"] .reviewer-pill{background:var(--color-surface-sunken);border-color:var(--color-border-strong);}
html[data-theme="dark"] .o30-bar{background:var(--color-border);}
html[data-theme="dark"] .upload-panel .spinner{border-color:var(--color-warning-bg);}
html[data-theme="dark"] .mgmt-edit.edited{background:var(--color-warning-bg);}
html[data-theme="dark"] .filter-chip{background:var(--color-success-bg);}
html[data-theme="dark"] .pri2-p4,html[data-theme="dark"] .pri2-blue{border-color:var(--color-border-strong);}
html[data-theme="dark"] .pri2-other{border-color:var(--color-success-border);}
}
/* BN-THEME:END */
:root{
  /* Local token names kept so existing rules don't change; values now sourced
     from the canonical bn-theme layer above (single source of truth + dark-mode
     ready). Values are unchanged except --card2 (negligible shade shift to the
     shared surface-alt). --t2 has no canonical equivalent, kept literal. */
  --bg: var(--color-bg);
  --nav: var(--color-surface);
  --card: var(--color-surface);
  --card2: var(--color-surface-alt);
  --b1: var(--color-border);
  --b2: var(--color-border-strong);
  --b3: var(--color-text-ghost);
  --t1: var(--color-text);
  --t2: #334155;
  --t3: var(--color-text-muted);
  --green: var(--color-accent);
  --green-d: var(--color-primary);
  --green-l: var(--color-primary-faint);
  --red: var(--color-danger);
  --amber: var(--color-warning);
  --blue: var(--color-info);
  --sidebar-w:240px;
}
body{background:var(--bg);color:var(--t1);font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── HEADER ── */
.hdr{background:#fff;border-bottom:1px solid var(--b1);padding:9px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.brand-pill{background:var(--green-d);padding:5px 12px;border-radius:10px;display:flex;flex-direction:column;gap:1px;flex-shrink:0}
.brand-pill img{height:26px;object-fit:contain;mix-blend-mode:screen}
.brand-sub{font-size:10px;font-weight:600;color:#bbf7d0;letter-spacing:normal;text-transform:none}
.hdr-mid{flex:1;display:flex;align-items:center;gap:8px}
.search-wrap{flex:1;max-width:380px;position:relative}
.search-wrap input{width:100%;background:var(--card2);border:1px solid var(--b2);border-radius:20px;padding:7px 14px 7px 34px;font-size:12px;font-family:inherit;color:var(--t1);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--green)}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--t3);pointer-events:none}
.hdr-right{display:flex;gap:7px;align-items:center;margin-left:auto}
.vtoggle{background:var(--green-l);border-radius:9px;padding:3px;display:flex;border:1px solid var(--b1)}
.vtbtn{padding:4px 10px;border-radius:7px;border:none;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;background:transparent;color:var(--t3);transition:all .15s}
.vtbtn.on{background:var(--green);color:#fff}
.btn{padding:6px 12px;border-radius:9px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.btn-g{background:var(--green);color:#fff}.btn-g:hover{filter:brightness(1.08)}
.btn-b{background:#1a3a6622;border:1px solid #2563eb44;color:#1a5c9e}.btn-b:hover{background:#1a3a6633}
.btn-ghost{background:transparent;border:1px solid var(--b2);color:var(--t3)}.btn-ghost:hover{background:var(--card2);color:var(--t1)}
.btn-red{background:#fee2e2;border:1px solid #fca5a5;color:var(--red)}.btn-red:hover{background:#fecaca}

/* ── USER CHIP (signed-in identity from SWA /.auth/me) ── */
.user-chip{position:relative}
.user-chip-btn{width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;background:var(--green-d);color:#fff;font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;font-size:11px;font-weight:600;letter-spacing:.5px;display:flex;align-items:center;justify-content:center;transition:filter .15s}
.user-chip-btn:hover{filter:brightness(1.18)}
.user-chip-menu{display:none;position:absolute;top:36px;right:0;background:#fff;border:1px solid var(--b1);border-radius:9px;box-shadow:0 6px 20px rgba(0,0,0,.12);padding:10px 14px;min-width:220px;z-index:300}
.user-chip-menu.open{display:block}
.user-chip-email{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:8px;word-break:break-all}
.user-chip-logout{display:inline-block;font-size:11px;font-weight:600;color:var(--red);text-decoration:none;border:1px solid #fca5a5;background:#fee2e2;border-radius:7px;padding:4px 10px}
.user-chip-logout:hover{background:#fecaca}

/* ── STATS BAR ── */
.sbar{background:#fff;border-bottom:1px solid var(--b1);padding:5px 16px;display:flex;gap:16px;flex-shrink:0;overflow-x:auto;align-items:center}
.filt-toggle{display:inline-flex;align-items:center;gap:6px;background:var(--green-l);border:1px solid #bbf7d0;color:var(--green-d);border-radius:7px;padding:3px 11px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .12s;flex-shrink:0}
.filt-toggle:hover{background:#dcfce7;border-color:var(--green)}
.filt-toggle.active{background:var(--green);color:#fff;border-color:var(--green)}
.filt-toggle-cnt{background:rgba(255,255,255,0.28);border-radius:99px;padding:0 6px;font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;font-size:10px}
.sbar::-webkit-scrollbar{display:none}
.sitem{font-size:11px;color:var(--t3);white-space:nowrap}
.sitem strong{font-weight:600;color:var(--t2)}

/* ── BODY LAYOUT ── */
.body{flex:1;display:flex;overflow:hidden}

/* ── SIDEBAR ── */
.sb-wrap{position:relative;display:flex;flex-shrink:0}
.sidebar{width:var(--sidebar-w);background:#fff;border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:width .22s ease}
.sb-title{font-size:10px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--t3)}

/* ── FACETED FILTERS ── */
/* Pinned top: title row + active-filter chips */
.sb-facet-top{flex-shrink:0;border-bottom:1px solid var(--b1);padding:10px 12px;background:#fff}
.facet-hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.facet-clear{font-size:10px;font-weight:600;color:var(--t3);background:none;border:none;cursor:pointer;font-family:inherit;text-transform:none;letter-spacing:normal;transition:color .1s}
.facet-clear:hover{color:var(--red)}
.fchips{display:flex;flex-wrap:wrap;gap:5px}
.fchip{display:inline-flex;align-items:center;gap:5px;background:var(--green-l);border:1px solid #bbf7d0;color:var(--green-d);border-radius:99px;padding:3px 6px 3px 9px;font-size:11px;font-weight:600;max-width:100%}
.fchip-f{color:var(--t3);font-weight:600;font-size:9px;text-transform:none;letter-spacing:normal}
.fchip-x{background:rgba(26,95,62,.12);border:none;color:var(--green-d);width:15px;height:15px;border-radius:50%;cursor:pointer;font-size:11px;line-height:1;display:inline-flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;font-family:inherit;transition:all .1s}
.fchip-x:hover{background:var(--red);color:#fff}
.fchips-empty{font-size:11px;color:var(--t3);font-style:italic;padding:2px 0}

/* Scrollable facet list */
.sb-facet-list{flex:1;overflow-y:auto;padding:4px 0}
.facet{border-bottom:1px solid var(--b1)}
.facet-hdr{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;width:100%;background:none;border:none;font-family:inherit;font-size:12px;font-weight:600;color:var(--t2);text-align:left;transition:background .1s}
.facet-hdr:hover{background:var(--green-l)}
.facet.open .facet-hdr{color:var(--green-d)}
.facet-chev{font-size:9px;color:var(--t3);flex-shrink:0;width:9px}
.facet.open .facet-chev{color:var(--green)}
.facet-ico{font-size:12px;flex-shrink:0}
.facet-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-transform:none;letter-spacing:normal;font-size:11px}
.facet-badge{font-size:10px;background:var(--green);color:#fff;border-radius:99px;padding:1px 7px;font-weight:600;flex-shrink:0;font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace}
.facet-tot{font-size:10px;background:var(--b1);color:var(--t3);border-radius:99px;padding:1px 7px;font-weight:600;flex-shrink:0;font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace}
.facet-body{padding:2px 8px 8px}
.facet-search{width:100%;background:var(--card2);border:1px solid var(--b1);border-radius:6px;padding:5px 9px;font-size:11px;font-family:inherit;color:var(--t1);outline:none;margin-bottom:5px;transition:border-color .1s}
.facet-search:focus{border-color:var(--green);background:#fff}
.facet-vals{display:flex;flex-direction:column;gap:1px;max-height:240px;overflow-y:auto}
.facet-val{display:flex;align-items:center;gap:8px;padding:5px 7px;border-radius:6px;cursor:pointer;font-size:11px;color:var(--t2);transition:background .1s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.facet-val:hover{background:var(--green-l)}
.facet-val.on{background:var(--green-l);color:var(--green-d);font-weight:600}
.facet-box{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--b2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;transition:all .1s}
.facet-val.on .facet-box{background:var(--green);border-color:var(--green)}
.facet-val-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.facet-val-cnt{margin-left:auto;font-size:10px;background:var(--b1);color:var(--t3);border-radius:99px;padding:1px 6px;flex-shrink:0;font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace}
.facet-val.on .facet-val-cnt{background:var(--green);color:#fff}
.facet-empty,.facet-noload{padding:8px 10px;font-size:11px;color:var(--t3);font-style:italic}

/* ── CONTENT ── */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.nav-div{width:1px;height:16px;background:rgba(255,255,255,0.3);margin:0 6px;align-self:center;flex-shrink:0}
#tool-host{flex:1;min-width:0;position:relative;background:#fff}
#tool-host .tool-iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:none}
#tool-host .tool-iframe.active{display:block}
/* If the hub is ever loaded inside a frame (e.g. a tool path fell back to the hub), don't draw its header again. */
html.embedded .hdr{display:none}
.board-area{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* ── GROUP HEADER ── */
.group-hdr{padding:8px 16px;background:var(--card2);border-bottom:1px solid var(--b1);font-size:11px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--t2);display:flex;align-items:center;gap:8px;flex-shrink:0}
.group-hdr span{background:var(--green);color:#fff;border-radius:10px;padding:1px 8px;font-size:10px}

/* ── BOARD ── */
.board{flex:1;overflow:auto;padding:14px;display:flex;gap:10px;align-items:flex-start}
.col{flex:1 1 0;min-width:220px;max-width:none}
.col-hdr{display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--card2);border-radius:10px;border:1px solid var(--b1);margin-bottom:8px}
.col-lbl{font-size:10px;font-weight:600;text-transform:none;letter-spacing:normal;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.col-cnt{border-radius:10px;padding:2px 6px;font-size:11px;font-weight:600}
.col-cards{display:flex;flex-direction:column;gap:7px;min-height:40px}
.jcard{background:#fff;border:1px solid var(--b1);border-radius:10px;padding:10px;cursor:pointer;transition:all .15s;border-left-width:3px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.jcard:hover{border-color:var(--b2);background:var(--green-l)}
.jcard.sel{border-color:var(--green);background:var(--green-l)}
.jcard-wo{font-size:10px;color:var(--t3);margin-bottom:2px}
.jcard-wo span{color:var(--green-d);font-weight:600}
.jcard-city{font-size:12px;font-weight:600;margin-bottom:2px}
.jcard-meta{font-size:11px;color:var(--t3);margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.jcard-dates{font-size:10px;color:var(--t3);margin-bottom:5px}
.pbar{background:var(--b1);border-radius:4px;height:4px;overflow:hidden;margin-bottom:2px}
.pfill{height:100%;border-radius:4px;transition:width .4s}
.ppct{font-size:10px;color:var(--t3)}
.jcard-type{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;text-transform:none;letter-spacing:normal;margin-bottom:4px}
.jcard{position:relative}
.jcard-check{position:absolute;top:9px;left:8px;width:15px;height:15px;cursor:pointer;accent-color:var(--green);z-index:2;opacity:0;transition:opacity .12s}
.jcard:hover .jcard-check,.jcard-check:checked{opacity:1}
.jcard-checked{box-shadow:0 0 0 2px var(--green) inset;background:var(--green-l)}
.jcard-type{margin-left:22px}
.bulkbar{flex-shrink:0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 14px;background:var(--green-d);color:#fff;border-bottom:1px solid rgba(0,0,0,.1)}
.bulk-count{font-weight:600;font-size:12px;white-space:nowrap}
.bulk-grp{display:inline-flex;align-items:center;gap:5px}
.bulk-lbl{font-size:10px;text-transform:none;letter-spacing:normal;opacity:.8}
.bulk-sel{font-family:inherit;font-size:11px;padding:3px 6px;border-radius:6px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);color:#fff;cursor:pointer}
.bulk-sel option{color:#1e293b}
.bulk-btn{font-family:inherit;font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);color:#fff;cursor:pointer;transition:background .12s;white-space:nowrap}
.bulk-btn:hover{background:rgba(255,255,255,.24)}
.bulk-del{border-color:rgba(255,150,150,.5)}
.bulk-del:hover{background:#ef4444;border-color:#ef4444}
.bulk-spacer{flex:1}

/* ── LIST ── */
.list-wrap{flex:1;overflow:auto;padding:14px}
.ltable{width:100%;border-collapse:collapse;font-size:12px}
.ltable th{padding:8px 12px;text-align:left;font-size:10px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--t3);background:var(--card2);border-bottom:2px solid var(--b1);white-space:nowrap;position:sticky;top:0}
.ltable td{padding:8px 12px;border-bottom:1px solid var(--b1);vertical-align:middle}
.ltable tr{cursor:pointer;transition:background .1s}
.ltable tr:hover td{background:var(--green-l)}
.ltable tr.sel td{background:var(--green-l);border-left:3px solid var(--green)}
.badge{border-radius:20px;padding:2px 8px;font-size:10px;font-weight:600}

/* ── GANTT ── */
.gantt-wrap{flex:1;overflow:auto;padding:14px}
.gantt-hdr-row{display:flex;align-items:center;margin-bottom:6px;position:sticky;top:0;background:var(--bg);z-index:20;padding-bottom:4px;border-bottom:1px solid var(--b1)}
.gantt-label-col{width:200px;flex-shrink:0;font-size:10px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--t3);padding-right:10px}
.gantt-timeline-hdr{flex:1;position:relative;height:34px;overflow:hidden}
.gantt-month{position:absolute;top:0;height:100%;display:flex;flex-direction:column;justify-content:center;font-size:10px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--t3);border-left:1px solid var(--b1);padding-left:5px}
.gantt-row{display:flex;align-items:center;margin-bottom:4px;cursor:pointer}
.gantt-label{width:200px;flex-shrink:0;padding-right:10px}
.gantt-label-city{font-size:12px;font-weight:600;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gantt-label-sub{font-size:10px;color:var(--t3)}
.gantt-bar-area{flex:1;position:relative;height:24px}
.gantt-seg{position:absolute;top:2px;height:20px;border-radius:5px;overflow:hidden;cursor:pointer;transition:opacity .15s}
.gantt-seg:hover{opacity:.8}
.gantt-seg-lbl{font-size:10px;font-weight:600;color:rgba(255,255,255,.9);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px;line-height:20px;position:relative;z-index:2}
.gantt-prog{position:absolute;inset:0;background:rgba(255,255,255,.25);pointer-events:none}
.gantt-today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--green);z-index:10;pointer-events:none}
.gantt-today-lbl{position:absolute;top:-16px;font-size:10px;font-weight:600;color:var(--green);transform:translateX(-50%);white-space:nowrap}
.gantt-no-date{position:absolute;top:6px;left:0;right:0;height:12px;background:var(--green-l);border:1px dashed var(--b2);border-radius:4px;display:flex;align-items:center;padding:0 6px}
.gantt-no-date span{font-size:10px;color:var(--t3)}

/* ── SIDE PANEL ── */
.panel{width:340px;background:#fff;border-left:2px solid var(--b1);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:width .2s}
.panel.hidden{width:0;border:none;overflow:hidden}
.panel-hdr{padding:12px 14px;border-bottom:1px solid var(--b1);flex-shrink:0}
.panel-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.panel-eye{font-size:10px;letter-spacing:normal;color:var(--green);text-transform:none;font-weight:600;margin-bottom:2px}
.panel-city{font-size:16px;font-weight:600;color:var(--t1)}
.pcls{background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:2px;font-family:inherit;line-height:1}
.stage-mover{display:flex;align-items:center;gap:6px;margin-top:8px;position:relative;z-index:2}
.sarr{background:var(--card2);border:1px solid var(--b2);border-radius:8px;color:var(--t2);cursor:pointer;padding:6px 14px;font-size:13px;font-family:inherit;transition:all .15s;position:relative;z-index:2;touch-action:manipulation}
.sarr:hover:not(:disabled){background:var(--green-l)}
.sarr:disabled{opacity:.3;cursor:not-allowed}
.slbl{flex:1;text-align:center;font-size:10px;font-weight:600;text-transform:none;letter-spacing:normal}
.edit-fields{padding:10px 14px;border-bottom:1px solid var(--b1);display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.ef-row{display:flex;gap:7px}
.ef{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.ef-lbl{font-size:10px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--t3)}
.ef-val{font-size:12px;color:var(--t2);padding:3px 5px;border-radius:5px;border:1px solid transparent;cursor:text;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-height:24px;line-height:18px}
.ef-val:hover{border-color:var(--b2);background:var(--card2)}
.ef-val:focus{border-color:var(--green);background:var(--green-l);color:var(--t1);outline:none}
.ef-val.ph{color:var(--b3);font-style:italic}
.date-strip{padding:7px 14px;border-bottom:1px solid var(--b1);display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}
.panel-audit{padding:8px 14px;border-bottom:1px solid var(--b1);font-size:12px;display:flex;align-items:center;gap:8px;flex-shrink:0;background:#fafafa}
.panel-audit-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.panel-audit-lbl{font-size:10px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--t3)}
.panel-audit-val{color:var(--t2);font-weight:600}
.panel-audit.diverged{background:#fff7ed;border-bottom-color:#fcd9a3}
.panel-audit-hrs{margin-left:auto;font-size:11px;color:var(--t3)}
.dfield{display:flex;flex-direction:column;gap:2px;flex:1}
.dlbl{font-size:10px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--t3)}
.dinput{background:var(--card2);border:1px solid var(--b2);border-radius:7px;padding:4px 7px;color:var(--t1);font-size:11px;font-family:inherit;outline:none;width:100%}
.dinput:focus{border-color:var(--green)}
.prog-ring{display:flex;align-items:center;gap:9px;padding:9px 14px;border-bottom:1px solid var(--b1);flex-shrink:0}
.pring-wrap{position:relative;width:40px;height:40px;flex-shrink:0}
.pring-wrap svg{position:absolute;inset:0}
.pring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600}
.pring-info{flex:1;min-width:0}
.pring-label{font-size:11px;font-weight:600;color:var(--t2)}
.pring-sub{font-size:10px;color:var(--t3);margin-top:2px;line-height:1.5}
.stabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--b1);padding:0 14px;flex-shrink:0}
.stabs::-webkit-scrollbar{display:none}
.stab{padding:7px 7px;background:none;border:none;cursor:pointer;font-size:10px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--t3);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;font-family:inherit}
.stab.on{border-bottom-color:currentColor}
.cklist{flex:1;overflow-y:auto;padding:12px 14px}
.cktitle{font-size:10px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--t3);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.ck-badge{font-size:10px;background:#2ECC7122;color:var(--green-d);border:1px solid #2ECC7144;border-radius:10px;padding:1px 7px}
.ckitem{display:flex;align-items:flex-start;gap:8px;padding:7px 9px;margin-bottom:4px;background:var(--card2);border:1px solid var(--b1);border-radius:8px;cursor:pointer;transition:all .15s}
.ckitem.done{background:#2ECC7112;border-color:#2ECC7144}
.ckitem:hover{border-color:var(--b2)}
.ckbox{width:15px;height:15px;border-radius:4px;border:2px solid var(--b2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;transition:all .15s;margin-top:1px}
.ckitem.done .ckbox{background:var(--green);border-color:var(--green)}
.cklbl{font-size:12px;color:var(--t2);line-height:1.4}
.ckitem.done .cklbl{color:var(--green-d);text-decoration:line-through}
.notes-blk{margin-top:12px;padding:9px;background:var(--card2);border-radius:8px;border:1px solid var(--b1)}
.notes-lbl{font-size:10px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--green);margin-bottom:4px}
.notes-txt{font-size:12px;color:var(--t2);line-height:1.6}

/* ── STAGE EDITOR IN PANEL ── */
.stage-editor{padding:10px 14px;border-bottom:1px solid var(--b1);flex-shrink:0}
.se-lbl{font-size:10px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--t3);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.se-stages{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.se-stage{padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600;border:1px solid var(--b2);cursor:pointer;background:var(--card2);color:var(--t2);display:flex;align-items:center;gap:4px}
.se-stage.cur{border-color:var(--green);background:var(--green-l);color:var(--green-d)}
.se-add{padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600;border:1px dashed var(--b2);cursor:pointer;background:transparent;color:var(--t3);font-family:inherit}
.se-add:hover{border-color:var(--green);color:var(--green)}

/* ── EMPTY / DROP ZONE ── */
.empty-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:28px}
.drop-zone{border:2px dashed var(--green);border-radius:12px;padding:36px 28px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:all .2s;text-align:center;background:var(--green-l);width:100%;max-width:420px}
.drop-zone:hover,.drop-zone.over{background:#d4edda;border-color:var(--green-d)}
.dz-ico{font-size:36px;transition:transform .2s}
.dz-title{font-size:14px;font-weight:600;color:var(--green-d)}
.dz-sub{font-size:12px;color:var(--t3)}

/* ── MODALS ── */
.overlay{position:fixed;inset:0;background:#00000066;display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#fff;border:1px solid var(--b2);border-radius:12px;padding:22px;width:500px;max-width:94vw;max-height:90vh;overflow-y:auto}
.modal h2{font-size:15px;font-weight:600;color:var(--t1);margin-bottom:14px}
.add-umb{width:560px;max-width:94vw;max-height:92vh;overflow:auto}
.add-title{font-size:20px;font-weight:600;color:#1e3a5f;margin-bottom:18px;letter-spacing:-.3px}
.add-umb .flbl{font-size:11px;font-weight:600;letter-spacing:.3px;text-transform:none;color:var(--t2)}
.add-umb .finput,.add-umb .fselect{padding:9px 11px;font-size:13px;border-radius:8px}
.add-umb .finput:focus,.add-umb .fselect:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(46,204,113,0.12)}
.ftext{min-height:74px;resize:vertical;line-height:1.45;white-space:normal}
.req{color:#dc2626;font-weight:600}
.opt{font-weight:400;color:var(--t3);text-transform:none;letter-spacing:0}
.frow{display:flex;gap:9px}
.fgrp{margin-bottom:10px;flex:1}
.flbl{font-size:10px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--t3);display:block;margin-bottom:3px}
.finput{width:100%;background:var(--card2);border:1px solid var(--b2);border-radius:8px;padding:7px 9px;color:var(--t1);font-size:12px;font-family:inherit;outline:none}
.finput:focus{border-color:var(--green)}
.fselect{width:100%;background:var(--card2);border:1px solid var(--b2);border-radius:8px;padding:7px 9px;color:var(--t1);font-size:12px;font-family:inherit;outline:none}
.mact{display:flex;gap:8px;margin-top:12px}
.mact .btn{flex:1;padding:9px;font-size:13px;justify-content:center}

/* STAGE TEMPLATE PILLS */
.tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.tpl-card{padding:9px 11px;border:2px solid var(--b1);border-radius:10px;cursor:pointer;transition:all .15s;background:var(--card2)}
.tpl-card:hover{border-color:var(--green)}
.tpl-card.sel{border-color:var(--green);background:var(--green-l)}
.tpl-name{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:3px}
.tpl-stages{font-size:10px;color:var(--t3);line-height:1.5}

/* CTX MENU */
.ctx-menu{position:fixed;background:#fff;border:1px solid var(--b2);border-radius:9px;padding:5px;z-index:500;min-width:210px;box-shadow:0 4px 16px rgba(0,0,0,.12);display:none}
.ctx-menu.show{display:block}
.ctx-hdr{padding:6px 10px;font-size:10px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--t3);border-bottom:1px solid var(--b1);margin-bottom:3px}
.ctx-item{display:flex;align-items:center;gap:8px;padding:7px 11px;border-radius:7px;cursor:pointer;font-size:12px;color:var(--t2);border:none;background:none;width:100%;text-align:left;font-family:inherit;transition:all .12s}
.ctx-item:hover{background:var(--green-l);color:var(--green-d)}
.ctx-item.warn:hover{background:#fff7ed;color:#c2410c}
.ctx-item.danger:hover{background:#fee2e2;color:var(--red)}
.ctx-sep{height:1px;background:var(--b1);margin:3px 2px}

/* DRAG OVERLAY */
.drag-overlay{position:fixed;inset:0;background:rgba(15,31,15,.82);z-index:300;display:none;align-items:center;justify-content:center}
.drag-overlay.show{display:flex}
.drag-overlay-box{border:3px dashed var(--green);border-radius:16px;padding:44px 56px;display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center}
.drag-overlay-ico{font-size:48px;animation:bob .8s ease-in-out infinite alternate}
.drag-overlay-lbl{font-size:17px;font-weight:600;color:var(--green)}
.drag-overlay-sub{font-size:12px;color:#bbf7d0}
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(-7px)}}

/* ── REPORTS VIEW ── */
.rpt-wrap{flex:1;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:14px}
.rpt-section{background:#fff;border:1px solid var(--b1);border-radius:10px;padding:14px;flex-shrink:0}
.rpt-section-hdr{font-size:11px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--t3);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.rpt-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.rpt-stat{background:var(--card2);border:1px solid var(--b1);border-radius:10px;padding:10px}
.rpt-stat-num{font-size:22px;font-weight:600;line-height:1.1;color:var(--t1)}
.rpt-stat-lbl{font-size:10px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--t3);margin-top:4px}
.rpt-stat-sub{font-size:11px;color:var(--t3);margin-top:3px}
.rpt-table{width:100%;border-collapse:collapse;font-size:12px}
.rpt-table th{padding:7px 10px;text-align:left;font-size:10px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--t3);background:var(--card2);border-bottom:1px solid var(--b1)}
.rpt-table td{padding:7px 10px;border-bottom:1px solid var(--b1);vertical-align:middle}
.rpt-table .num{text-align:right;font-variant-numeric:tabular-nums}
.rpt-empty{padding:24px;text-align:center;color:var(--t3);font-size:12px}
tr.bn-row-hidden{display:none}
.bn-more-row td{color:var(--green-d);cursor:pointer;font-weight:600;font-size:11px;padding:8px 10px}
.bn-more-row td:hover{text-decoration:underline}
.rpt-distbar{display:flex;height:8px;border-radius:5px;overflow:hidden;background:#eef2ee;width:140px}
.rpt-distbar-seg{height:100%}
.rpt-flag{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;letter-spacing:normal;text-transform:none;margin-left:6px;vertical-align:middle}
.rpt-flag.red{background:#fee2e2;color:#b91c1c}
.rpt-flag.amber{background:#fff7ed;color:#a16207}
.rpt-flag.green{background:#dcfce7;color:#166534}
.rpt-audit-status{font-size:11px;color:var(--t3);margin-top:6px}
.jcard-audit{display:inline-block;font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px;background:#fef3c7;color:#92400e;letter-spacing:normal;text-transform:none;margin-left:5px;vertical-align:middle}

/* INLINE REPORTS EDITORS (targets, status map) */
.rpt-editor{background:var(--card2);border:1px solid var(--b1);border-radius:10px;padding:12px;margin-bottom:12px}
.rpt-editor-hdr{font-size:11px;color:var(--t3);margin-bottom:10px;line-height:1.5}
.rpt-editor-group{margin-bottom:10px}
.rpt-editor-group-hdr{font-size:10px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--green-d);margin-bottom:6px}
.rpt-editor-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
.rpt-editor-cell{display:flex;flex-direction:column;gap:3px}
.rpt-editor-input{background:#fff;border:1px solid var(--b2);border-radius:7px;padding:5px 8px;font-family:inherit;font-size:12px;color:var(--t1);outline:none;width:100%}
.rpt-editor-input:focus{border-color:var(--green)}
/* ── PROSPECTS VIEW ── */
.prosp-wrap{flex:1;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.prosp-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.prosp-bar select{background:var(--card2);border:1px solid var(--b2);border-radius:7px;padding:5px 8px;font-family:inherit;font-size:12px;color:var(--t1);outline:none}
.prosp-bar select:focus{border-color:var(--green)}
.prosp-refresh{background:var(--card2);border:1px solid var(--b2);border-radius:7px;padding:5px 10px;font-size:12px;font-weight:600;color:var(--t1);cursor:pointer}
.prosp-refresh:hover:not(:disabled){border-color:var(--green)}
.prosp-refresh:disabled{opacity:.6;cursor:default}
.prosp-hint{font-size:11px;color:var(--t3)}
.prosp-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.prosp-chip{background:var(--card2);border:1px solid var(--b1);border-radius:10px;padding:8px 10px}
.prosp-chip-num{font-size:20px;font-weight:600;line-height:1.1;color:var(--t1)}
.prosp-chip-lbl{font-size:10px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--t3);margin-top:3px}
.prosp-kind{display:inline-block;font-size:10px;font-weight:600;padding:1px 8px;border-radius:99px;letter-spacing:.3px}
.prosp-kind.contractor{background:var(--blue-bg);color:var(--color-info-text)}
.prosp-kind.supplier{background:var(--amber-bg);color:var(--amber-text)}
.prosp-oc{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;letter-spacing:normal;text-transform:none}
.prosp-oc.joined{background:var(--green-bg);color:var(--green-d)}
.prosp-oc.declined,.prosp-oc.do-not-contact{background:var(--red-bg);color:var(--red-text)}
.prosp-oc.bid-sent,.prosp-oc.contacted,.prosp-oc.no-response,.prosp-oc.note{background:var(--amber-bg);color:var(--amber-text)}
.prosp-muted{color:var(--t3);font-size:11px}
.prosp-wrap .rpt-table td a{color:var(--green-d);text-decoration:none}
.prosp-wrap .rpt-table td a:hover{text-decoration:underline}
.prosp-rec{background:var(--card2);border:1px solid var(--b2);border-radius:6px;padding:3px 6px;font-family:inherit;font-size:11px;color:var(--t1);outline:none}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--green);color:#fff;padding:11px 16px;border-radius:10px;font-size:12px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:300px;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast.show{opacity:1}

/* ── DASHBOARD-STYLE TWO-ROW HEADER (additions) ── */

.hdr-brand{display:contents}
.hdr-toolbar{display:contents}
.hdr-mid{display:contents}

.brand-sub{display:none}
.hdr-nav{display:flex;align-items:center;gap:2px;order:1;flex-shrink:0}

/* Toolbar controls restyled for the dark-green background */

.hdr-toolbar .vtoggle{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.22)}

.hdr-toolbar .vtbtn.on{background:#fff;color:#0d3d26}

.hdr-toolbar .btn-ghost:hover{background:rgba(255,255,255,0.2);color:#fff}
.hdr-toolbar .btn-b{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);color:#fff}
.hdr-toolbar .btn-b:hover{background:rgba(255,255,255,0.2)}
.hdr-toolbar .btn-g{background:#fff;color:#0d3d26}
.hdr-toolbar .btn-g:hover{background:#f0fdf4;color:#0d3d26}

/* ── TAB STRIP (wrapper additions for the side panel) ── */

.stabs-wrap::after{right:0;background:linear-gradient(270deg,#fff 30%,rgba(255,255,255,0))}
.stabs-wrap.fade-l::before{opacity:1}
.stabs-wrap.fade-r::after{opacity:1}
.stabs-chev{position:absolute;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;border:1px solid var(--b1);background:#fff;color:var(--t2);font-size:11px;font-family:inherit;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:3;padding:0;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.08)}

.stabs-wrap.fade-l .stabs-chev.l,.stabs-wrap.fade-r .stabs-chev.r{display:flex}
.stabs{padding:0 28px;scroll-behavior:smooth}

.today-toggle{background:#e0f2fe;border-color:#bae6fd;color:#075985}
.today-toggle:hover{background:#bae6fd;border-color:#38bdf8}
.today-toggle.active{background:#0284c7;color:#fff;border-color:#0284c7}
.tasklist{flex-shrink:0;max-height:230px;overflow-y:auto;border-top:1px solid var(--b1);padding:10px 14px}
.tl-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.tl-title{font-size:10px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--t3)}
.tl-cnt{font-weight:600;color:var(--green-d);letter-spacing:0}
.tl-add{font-size:10px;padding:3px 9px}
.tl-locked{font-size:10px;font-weight:600;color:var(--t3)}
.tl-empty{font-size:11px;color:var(--t3);padding:4px 0}
.tl-item{display:flex;align-items:flex-start;gap:7px;padding:6px 0;border-top:1px solid var(--b1)}
.tl-item.done .tl-text{text-decoration:line-through;color:var(--t3)}
.tl-ck{margin-top:3px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.tl-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.tl-text{width:100%;border:1px solid transparent;background:transparent;border-radius:5px;padding:2px 4px;font-family:inherit;font-size:12px;color:var(--t1);outline:none}
.tl-text:focus{border-color:var(--green);background:#fff}
.tl-text[readonly]{cursor:default}
.tl-sub{display:flex;gap:6px}
.tl-due,.tl-asg{border:1px solid var(--b2);background:var(--card2);border-radius:5px;padding:2px 5px;font-family:inherit;font-size:10px;color:var(--t2);outline:none}
.tl-due{flex-shrink:0}.tl-asg{flex:1;min-width:0}
.tl-due.overdue{border-color:#fca5a5;color:#b91c1c;background:#fef2f2}
.tl-del{background:none;border:none;color:var(--t3);cursor:pointer;font-size:11px;padding:2px 4px;flex-shrink:0}
.tl-del:hover{color:var(--red)}
.note-composer{border:1px solid var(--b1);border-radius:9px;padding:10px;background:#fafafa;display:flex;flex-direction:column;gap:8px}
.note-comp-row{display:flex;align-items:center;gap:12px}
.note-type-sel{font-family:inherit;font-size:12px;font-weight:600;padding:5px 8px;border:1px solid var(--b2);border-radius:7px;background:#fff;color:var(--t1)}
.note-pin-lbl{font-size:11px;font-weight:600;color:var(--t2);display:inline-flex;align-items:center;gap:5px;cursor:pointer}
.note-text{width:100%;min-height:64px;resize:vertical;font-family:inherit;font-size:13px;line-height:1.45;padding:8px 10px;border:1px solid var(--b2);border-radius:8px;outline:none;box-sizing:border-box}
.note-text:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(46,204,113,.12)}
.note-comp-actions{display:flex;align-items:center;justify-content:space-between;gap:10px}
.note-hint{font-size:10px;color:var(--t3)}
.note-thread{display:flex;flex-direction:column;gap:8px}
.note-item{border:1px solid var(--b1);border-radius:9px;padding:9px 11px;background:#fff}
.note-item.pinned{border-color:#cfe6da;background:#f3faf6;box-shadow:0 0 0 1px #cfe6da inset}
.note-meta{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:11px;color:var(--t3)}
.note-tag{font-size:9px;font-weight:600;text-transform:none;letter-spacing:normal;padding:2px 7px;border-radius:5px}
.note-pin-ico{font-size:11px}
.note-ts{font-size:10px;color:var(--t3)}
.note-actions{margin-left:auto;display:flex;gap:4px}
.note-actions button{background:none;border:1px solid var(--b1);border-radius:6px;color:var(--t3);font-family:inherit;font-size:10px;padding:2px 7px;cursor:pointer}
.note-actions button:hover{background:var(--green-l);color:var(--green-d);border-color:var(--green)}
.note-body{font-size:13px;line-height:1.5;color:var(--t1);white-space:normal;word-break:break-word}
.co-ready{background:var(--green);color:#fff;font-weight:600;font-size:10px;text-transform:none;letter-spacing:normal;padding:2px 8px;border-radius:99px}
.co-sect{border:1px solid var(--b1);border-radius:9px;overflow:hidden}
.co-sect-hdr{padding:9px 12px;background:#fafafa;border-bottom:1px solid var(--b1);font-size:11px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--t2);display:flex;align-items:center;justify-content:space-between}
.co-add{font-size:10px;padding:3px 9px}
.co-table{width:100%;border-collapse:collapse;font-size:12px}
.co-table th{text-align:left;padding:6px 10px;font-size:9px;text-transform:none;letter-spacing:normal;color:var(--t3);border-bottom:1px solid var(--b1)}
.co-table td{padding:3px 8px;border-bottom:1px solid var(--b1)}
.co-table tr:last-child td{border-bottom:none}
.co-table input,.co-table select{width:100%;border:1px solid transparent;background:transparent;font-family:inherit;font-size:12px;padding:4px 5px;border-radius:5px;color:var(--t1);outline:none}
.co-table input:hover,.co-table select:hover{border-color:var(--b1)}
.co-table input:focus,.co-table select:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 2px rgba(46,204,113,0.12)}
.co-table tr.co-done td{background:#f0fdf4}
.co-table tr.co-done input{text-decoration:line-through;color:var(--t3)}
.co-table tr.co-fail td{background:#fef2f2}
.co-table tr.co-pass td{background:#f0fdf4}
.co-na{color:var(--b3);font-size:11px;padding-left:5px}
.co-del{width:28px;text-align:center}
.co-del button{background:none;border:none;color:var(--b3);cursor:pointer;font-size:12px}
.co-del button:hover{color:var(--red)}
.co-docs{padding:8px 12px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:4px}
.co-doc{display:flex;align-items:center;gap:8px;padding:7px 9px;border:1px solid var(--b1);border-radius:7px;font-size:12px;cursor:pointer;background:#fff}
.co-doc.done{background:#f0fdf4;border-color:#bbf7d0}
.co-doc input{cursor:pointer}
.co-doc-lbl{flex:1}
.co-doc-date{font-size:9px;color:var(--green-d);font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace}
.lg-flag{font-size:8px;font-weight:600;text-transform:none;letter-spacing:normal;padding:1px 5px;border-radius:4px;vertical-align:middle}
.lg-flag.red{background:#fef2f2;color:#b91c1c}
.lg-flag.amber{background:#fffbeb;color:#b45309}
.fin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;background:var(--b1)}
.fin-cell{background:#fff;padding:9px 12px}
.fin-cell label{display:block;font-size:9px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--t3);margin-bottom:3px}
.fin-in{display:flex;align-items:center;font-size:14px;font-weight:600;color:var(--t2)}
.fin-in input{border:1px solid transparent;background:transparent;font-family:inherit;font-size:14px;font-weight:600;width:100%;padding:2px 3px;border-radius:5px;outline:none;color:var(--t1)}
.fin-in input:hover{border-color:var(--b1)}
.fin-in input:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 2px rgba(46,204,113,0.12)}
.fin-ro{font-size:14px;color:var(--t2)}
.fin-ro.strong{font-weight:600}
/* ── AT-RISK ROLLUP ── */
.ar-count{display:inline-flex;gap:6px;margin-left:8px}
.ar-pill{font-size:9px;font-weight:600;text-transform:none;letter-spacing:normal;padding:2px 8px;border-radius:99px}
.ar-pill.high{background:#fef2f2;color:#b91c1c}
.ar-pill.med{background:#fffbeb;color:#b45309}
.ar-list{display:flex;flex-direction:column;gap:4px}
.ar-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--b1);border-left-width:3px;border-radius:7px;cursor:pointer;font-size:12px;transition:background .12s}
.ar-item:hover{background:var(--green-l)}
.ar-item.high{border-left-color:var(--red)}
.ar-item.med{border-left-color:var(--amber)}
.ar-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ar-item.high .ar-dot{background:var(--red)}
.ar-item.med .ar-dot{background:var(--amber)}
.ar-cat{font-size:9px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--t3);width:78px;flex-shrink:0}
.ar-job{font-weight:600;width:180px;flex-shrink:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.ar-wo{display:block;font-size:9px;font-weight:500;color:var(--t3);font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace}
.ar-detail{color:var(--t2);flex:1}

/* ── MASTER SCHEDULE (portfolio mini-gantt in Reports) ── */
.ms-wrap{border:1px solid var(--b1);border-radius:8px;overflow:hidden}
.ms-axis{position:relative;height:26px;background:#fafafa;border-bottom:1px solid var(--b1);margin-left:180px}
.ms-month{position:absolute;top:0;height:100%;display:flex;align-items:center;font-size:9px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--t3);border-left:1px solid var(--b1);padding-left:4px}
.ms-today{position:absolute;top:0;height:100%;border-left:2px dashed var(--red)}
.ms-today span{position:absolute;top:1px;left:3px;font-size:8px;font-weight:600;color:var(--red)}
.ms-row{display:flex;align-items:stretch;height:30px;border-bottom:1px solid var(--b1);cursor:pointer}
.ms-row:last-child{border-bottom:none}
.ms-row:hover{background:var(--green-l)}
.ms-lbl{width:180px;flex-shrink:0;display:flex;flex-direction:column;justify-content:center;padding:0 10px;font-size:11px;font-weight:600;border-right:1px solid var(--b1);overflow:hidden;white-space:nowrap}
.ms-wo{font-size:9px;color:var(--t3);font-weight:500;font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace}
.ms-track{flex:1;position:relative}
.ms-today-line{position:absolute;top:0;bottom:0;border-left:2px dashed rgba(231,76,60,.5)}
.ms-bar{position:absolute;top:50%;transform:translateY(-50%);height:15px;border-radius:3px;display:flex;align-items:center;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.12)}
.ms-bar-fill{position:absolute;left:0;top:0;bottom:0;background:rgba(255,255,255,0.32)}
.ms-bar-lbl{font-size:8px;color:#fff;font-weight:600;padding-left:5px;white-space:nowrap;position:relative;text-shadow:0 1px 1px rgba(0,0,0,.25)}
.sg-trow.critical .sg-name input{color:#b91c1c}
.sg-crit-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;margin-right:4px}
.sg-bar.critical{background:#e74c3c}
.sg-bar.critical.pinned{background:#c0392b}
.sg-bar-prog{position:absolute;left:0;top:0;bottom:0;background:rgba(0,0,0,0.28);border-radius:3px 0 0 3px}
.sg-del{width:28px;flex-shrink:0;justify-content:center;border-right:none}
.sg-c input{width:100%;border:1px solid transparent;background:transparent;font-family:inherit;font-size:11px;padding:3px 4px;border-radius:4px;color:var(--t1);outline:none}
.sg-c input:hover{border-color:var(--b1)}
.sg-c input:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 2px rgba(46,204,113,0.12)}
.sg-dur input{text-align:center}
.sg-startwrap{display:inline-flex;align-items:center;gap:2px;width:100%;white-space:nowrap}
.sg-startwrap.pinned{color:var(--amber)}
.sg-startwrap input[type=date]{font-size:9px;padding:2px;width:92px}
.sg-pin{background:none;border:none;cursor:pointer;font-size:10px;opacity:.4;padding:0 2px;flex-shrink:0;transition:opacity .12s}
.sg-pin:hover{opacity:1}
.sg-del button{background:none;border:none;color:var(--b3);cursor:pointer;font-size:12px;padding:0;line-height:1}
.sg-del button:hover{color:var(--red)}
.sched-gantt{flex:1;min-width:520px;position:relative}
.sg-axis{height:40px;position:sticky;top:0;background:#fafafa;border-bottom:1px solid var(--b1);z-index:4}
.sg-month{position:absolute;bottom:0;height:20px;display:flex;align-items:center;font-size:9px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--t3);border-left:1px solid var(--b1);padding-left:5px}
.sg-today{position:absolute;top:0;height:100%;border-left:2px dashed var(--red);z-index:3}
.sg-today span{position:absolute;top:2px;left:3px;font-size:8px;font-weight:600;color:#fff;background:var(--red);padding:1px 5px;border-radius:3px;text-transform:none;white-space:nowrap}
.sg-bars{position:relative}
.sg-today-line{position:absolute;top:0;bottom:0;border-left:2px dashed rgba(231,76,60,.5);z-index:1}
.sg-bar-row{position:absolute;left:0;right:0;display:flex;align-items:center}
.sg-bar{position:absolute;height:15px;background:var(--blue);border-radius:3px;display:flex;align-items:center;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.12);min-width:3px}
.sg-bar.pinned{background:var(--amber)}
.sg-bar-lbl{font-size:9px;white-space:nowrap;padding-left:5px;overflow:hidden;position:absolute;left:100%;margin-left:5px;color:var(--t2)}
.sg-summary-bar{position:absolute;height:8px;top:6px;background:var(--green-d);border-radius:2px}
.sg-milestone{position:absolute;width:11px;height:11px;background:var(--green-d);transform:rotate(45deg);top:50%;margin-top:-5px;margin-left:-5px}
</style>
</head>

<!-- BODY -->
<div class="body">

  <!-- SIDEBAR -->
  <div class="sb-wrap" id="sb-wrap">
  <div class="sidebar collapsed" id="sidebar">
    <!-- FACETED FILTERS: pinned chips header + scrollable facet sections -->
    <div class="sb-facet-top" id="sb-facet-top"></div>
    <div class="sb-facet-list" id="sb-facet-list"></div>
  </div><!-- end sidebar -->
  <button class="sb-tab" id="sb-tab-btn" onclick="toggleSidebar()" title="Expand sidebar"><span class="sb-tab-ico">&#8249;</span></button>
  </div><!-- end sb-wrap -->

  <!-- MAIN CONTENT -->
  <div class="content">
    <div id="empty-state" class="empty-wrap">
      <div style="display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:420px">
        <div class="drop-zone" id="drop-zone">
          <div class="dz-ico">&#128194;</div>
          <div class="dz-title">Drop your Excel file here</div>
          <div class="dz-sub">.xlsx or .xls &mdash; or click to browse</div>
          <input type="file" id="xlfile-dz" accept=".xlsx,.xls" style="display:none" onchange="processFile(this)">
        </div>
        <div style="display:flex;gap:8px;width:100%">
          <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="downloadTemplate()">&#8595; Download Template</button>
          <button class="btn btn-g" style="flex:1;justify-content:center" onclick="openAdd()">+ Add Job Manually</button>
        </div>
      </div>
    </div>
    <div id="board-area" style="flex:1;overflow:hidden;display:none;flex-direction:column"></div>
    <div id="tool-host" style="display:none"></div>
  </div>

  <!-- SIDE PANEL -->
  <div class="panel hidden" id="side-panel">
    <div class="panel-hdr">
      <div class="panel-top">
        <div>
          <div class="panel-eye" id="p-client"></div>
          <div class="panel-city" id="p-city"></div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="pcls" onclick="openLogs(selId)" title="Project controls: submittals, RFIs, change orders, permits">&#128203;</button>
          <button class="pcls" onclick="openNotes(selId)" title="Notes thread: vendor / client / internal / recap log">&#128172;</button>
          <button class="pcls" onclick="openCloseout(selId)" title="Closeout: punch list, inspections, docs">&#9989;</button>
          <button class="pcls" onclick="openSchedule(selId)" title="Open construction schedule">&#128197;</button>
          <button class="pcls" onclick="openExpandedView()" title="Expand to full view">&#9974;</button>
          <button class="pcls" onclick="closePanel()" title="Close">&#x2715;</button>
        </div>
      </div>
      <div class="stage-mover">
        <button class="sarr" type="button" id="sarr-back" onclick="moveStage(-1)">&#9664;</button>
        <span class="slbl" id="slbl"></span>
        <button class="sarr" type="button" id="sarr-fwd" onclick="moveStage(1)">&#9654;</button>
      </div>
    </div>
    <div class="edit-fields">
      <div class="ef-row">
        <div class="ef" style="flex:2"><span class="ef-lbl">City</span><div class="ef-val" id="ef-city" contenteditable="true" data-key="city" spellcheck="false"></div></div>
        <div class="ef" style="flex:1"><span class="ef-lbl">State</span><div class="ef-val" id="ef-state" contenteditable="true" data-key="state" spellcheck="false"></div></div>
        <div class="ef" style="flex:1"><span class="ef-lbl">Loc #</span><div class="ef-val" id="ef-loc" contenteditable="true" data-key="loc" spellcheck="false"></div></div>
      </div>
      <div class="ef-row">
        <div class="ef"><span class="ef-lbl">WO #</span><div class="ef-val" id="ef-wo" contenteditable="true" data-key="wo" spellcheck="false"></div></div>
        <div class="ef"><span class="ef-lbl">Source Job #</span><div class="ef-val" id="ef-srcJob" contenteditable="true" data-key="srcJob" spellcheck="false"></div></div>
      </div>
      <div class="ef-row">
        <div class="ef"><span class="ef-lbl">Client</span><div class="ef-val" id="ef-client" contenteditable="true" data-key="client" spellcheck="false"></div></div>
        <div class="ef"><span class="ef-lbl">Vendor</span><div class="ef-val" id="ef-vendor" contenteditable="true" data-key="vendor" spellcheck="false"></div></div>
      </div>
      <div class="ef"><span class="ef-lbl">Notes</span><div class="ef-val" id="ef-notes" contenteditable="true" data-key="notes" spellcheck="false" style="white-space:normal;min-height:32px"></div></div>
    </div>
    <div class="date-strip">
      <div class="dfield"><span class="dlbl">Start Date</span><input class="dinput" type="date" id="p-start" onchange="setStartDate(this.value)"></div>
      <div class="dfield"><span class="dlbl">Next Touch</span><input class="dinput" type="date" id="p-action" onchange="setActionDate(this.value)" title="The day this job needs to be touched next - drives the Today view"></div>
      <div class="dfield"><span class="dlbl">Proj. End</span><input class="dinput" type="date" id="p-end" readonly style="opacity:.55;cursor:default"></div>
    </div>
    <div class="panel-audit" id="panel-audit" style="display:none"></div>
    <div class="prog-ring" id="prog-ring"></div>
    <div class="stabs-wrap" id="stabs-wrap">
      <button class="stabs-chev l" type="button" onclick="nudgeTabs(-1)" title="Scroll left">&#9664;</button>
      <div class="stabs" id="stabs"></div>
      <button class="stabs-chev r" type="button" onclick="nudgeTabs(1)" title="Scroll right">&#9654;</button>
    </div>
    <div class="cklist" id="cklist"></div>
    <div class="tasklist" id="tasklist"></div>
  </div>
</div>

<!-- ADD JOB MODAL -->
<div class="overlay" id="add-modal" style="display:none">
  <div class="modal add-umb">
    <h2 class="add-title">Create Work Order</h2>

    <div class="fgrp">
      <label class="flbl">Workflow Template <span class="req">*</span></label>
      <div class="tpl-grid" id="tpl-grid"></div>
    </div>
    <div id="custom-stage-area" style="display:none;margin-bottom:10px">
      <label class="flbl">Custom Stages <span class="opt">(comma separated)</span></label>
      <input class="finput" id="f-custom-stages" placeholder="e.g. Kickoff, Design, Approval, Build, Punch List, Closed" style="margin-top:3px">
    </div>

    <div class="fgrp">
      <label class="flbl">Client <span class="req">*</span></label>
      <input class="finput" id="f-client" list="add-clients" placeholder="Pilot Travel Centers">
      <datalist id="add-clients"></datalist>
    </div>

    <div class="fgrp">
      <label class="flbl">Location <span class="req">*</span></label>
      <div class="frow">
        <input class="finput" id="f-city" placeholder="City" style="flex:2">
        <input class="finput" id="f-state" placeholder="State" style="flex:1">
        <input class="finput" id="f-loc" placeholder="Loc #" style="flex:1">
      </div>
    </div>

    <div class="frow">
      <div class="fgrp"><label class="flbl">WO #</label><input class="finput" id="f-wo" placeholder="W-303502"></div>
      <div class="fgrp"><label class="flbl">Vendor</label><input class="finput" id="f-vendor" list="add-vendors" placeholder="Vendor name"><datalist id="add-vendors"></datalist></div>
    </div>

    <div class="fgrp">
      <label class="flbl">Scope of Work</label>
      <textarea class="finput ftext" id="f-notes" placeholder="Describe the work to be performed…"></textarea>
    </div>

    <div class="frow">
      <div class="fgrp"><label class="flbl">Type <span class="req">*</span></label>
        <select class="fselect" id="f-type">
          <option>Retrofit</option><option>Survey</option><option>Reactive Service</option>
          <option>Preventative Maintenance</option><option>Project</option><option>Other</option>
        </select>
      </div>
      <div class="fgrp"><label class="flbl">Priority</label>
        <select class="fselect" id="f-priority">
          <option value="">-</option><option>P1</option><option>P2</option><option>P3</option><option>P4</option>
        </select>
      </div>
    </div>

    <div class="frow">
      <div class="fgrp"><label class="flbl">Source Job #</label><input class="finput" id="f-srcjob" placeholder="1913139"></div>
      <div class="fgrp"><label class="flbl">Source PO #</label><input class="finput" id="f-srcpo" placeholder="PO-…"></div>
    </div>

    <div class="fgrp"><label class="flbl">Start Date</label><input class="finput" type="date" id="f-start"></div>

    <div class="mact">
      <button class="btn btn-g" onclick="addJob()">Create Work Order</button>
      <button class="btn btn-ghost" style="flex:1;padding:9px;justify-content:center" onclick="closeAdd()">Cancel</button>
    </div>
  </div>
</div>

// ══════════════════════════════════════════════════════
// PERSISTENCE - jobs survive page reloads via localStorage.
// Older Job Board exports (xlsx) don't carry stageHistory or auditHint, and
// that's fine: those fields are populated lazily when the user next touches
// a job, so existing data isn't disrupted by the schema additions.
// ══════════════════════════════════════════════════════
const LS_KEY_JOBS    = 'broadway_jobboard_jobs_v1';
const LS_KEY_AUDIT   = 'broadway_jobboard_audit_v1';
const LS_KEY_TARGETS = 'broadway_jobboard_targets_v1';
const LS_KEY_STATMAP = 'broadway_jobboard_statmap_v1';
let auditByWo = {};   // wo -> { status, statusHrs, importedAt }
let stageTargets = {}; // tplKey -> { stageId -> days } - user overrides, layered on template defaults
let statusToStage = {}; // lowercased audit status -> board stage label (Title-case as shown in UI)

function saveJobs()    { try { localStorage.setItem(LS_KEY_JOBS, JSON.stringify(jobs)); } catch(e){ console.warn('saveJobs', e); } }
function loadJobs()    { try { const s = localStorage.getItem(LS_KEY_JOBS); if(s) jobs = JSON.parse(s) || []; } catch(e){ jobs = []; } }
function saveAudit()   { try { localStorage.setItem(LS_KEY_AUDIT, JSON.stringify(auditByWo)); } catch(e){} }
function loadAudit()   { try { const s = localStorage.getItem(LS_KEY_AUDIT); if(s) auditByWo = JSON.parse(s) || {}; } catch(e){ auditByWo = {}; } }
function saveTargets() { try { localStorage.setItem(LS_KEY_TARGETS, JSON.stringify(stageTargets)); } catch(e){} }
function loadTargets() { try { const s = localStorage.getItem(LS_KEY_TARGETS); if(s) stageTargets = JSON.parse(s) || {}; } catch(e){ stageTargets = {}; } }
function saveStatMap() { try { localStorage.setItem(LS_KEY_STATMAP, JSON.stringify(statusToStage)); } catch(e){} }
function loadStatMap() { try { const s = localStorage.getItem(LS_KEY_STATMAP); if(s) statusToStage = JSON.parse(s) || {}; } catch(e){ statusToStage = {}; } }

// Effective time-in-stage target (days) for a given template+stage. User
// overrides via stageTargets win; falls back to the template stage's `dur`,
// then to the per-job stageDur, then 0 (meaning "no target - don't flag stuck").
// This is the single source of truth for "stuck" detection and Gantt segment
// duration. Template `dur` values are reasonable defaults but rarely match a
// shop's actual cycle time, hence the override layer.
function effectiveTarget(tplKey, stageId, fallbackDur){
  const t = stageTargets[tplKey];
  if(t && typeof t[stageId] === 'number' && t[stageId] >= 0) return t[stageId];
  if(typeof fallbackDur === 'number' && fallbackDur > 0) return fallbackDur;
  return 0;
}

// Default audit-status → board-stage synonyms, derived from the Tracker's
// DEFAULT_STAGE_MAP and the actual statuses Mike's audits use. Lower-cased
// keys; values are the board stage label as displayed (the audit's status
// can be anything, but the target label must match what's on a Retrofit /
// Reactive / Project template stage). This is editable from Reports.
const STATMAP_DEFAULTS = {
  // Audit status                                    -> Board stage label
  'pending dispatch':                                   'Survey',
  'survey':                                             'Survey',
  'survey scheduled':                                   'Survey',
  'survey complete':                                    'Photometrics',
  'photometrics':                                       'Photometrics',
  'photometrics submitted':                             'Photometrics',
  'heatmap':                                            'Photometrics',
  'quote':                                              'Proposal',
  'pricing':                                            'Proposal',
  'proposal':                                           'Proposal',
  'proposal submitted':                                 'Proposal',
  'pending approval':                                   'Proposal',
  'awaiting client approval':                           'Proposal',
  'po issued':                                          'PO Issued',
  'materials ordered':                                  'PO Issued',
  'materials':                                          'PO Issued',
  'materials received':                                 'PO Issued',
  'scheduled':                                          'Installation',
  'install scheduled':                                  'Installation',
  'installation':                                       'Installation',
  'in progress':                                        'Installation',
  'install in progress':                                'Installation',
  'on-site':                                            'Installation',
  'on site':                                            'Installation',
  'clocked in':                                         'Installation',
  'clocked out: in progress':                           'Installation',
  'work complete':                                      'Closed',
  'completed':                                          'Closed',
  'invoiced':                                           'Closed',
  'closed':                                             'Closed',
  'paid':                                               'Closed',
};
function effectiveStatusMap(){
  // User overrides win, but always layered on the defaults so the picker
  // always shows a coverage baseline.
  return Object.assign({}, STATMAP_DEFAULTS, statusToStage);
}

// Does the audit status for a given board stage label count as "aligned"?
// We accept three signals: explicit synonym match, substring either way,
// or a normalized equality check after stripping non-alphanumerics. This
// is intentionally permissive - false alignment is annoying but
// recoverable (user sees no flag); false divergence trains people to
// ignore the flag, which is worse.
function auditAligned(auditStatus, stageLabel){
  if(!auditStatus || !stageLabel) return true;  // nothing to disagree about
  const a = String(auditStatus).toLowerCase().trim();
  const b = String(stageLabel).toLowerCase().trim();
  if(!a) return true;
  const synonym = effectiveStatusMap()[a];
  if(synonym && synonym.toLowerCase() === b) return true;
  if(a === b) return true;
  if(a.includes(b) || b.includes(a)) return true;
  const norm = s => s.replace(/[^a-z0-9]+/g, '');
  if(norm(a) === norm(b)) return true;
  return false;
}

// Move a job to a stage, recording when it entered. All stage transitions
// (arrows, drag, ctx-menu, auto-advance, edit-stages) go through this so the
// history stays consistent. enteredAt is ISO; older jobs missing history get
// a synthesized "now" entry for their current stage the first time they move.
function setJobStage(job, newStageId){
  if(!job || !newStageId) return;
  if(!Array.isArray(job.stageHistory)){
    // Synthesize one entry for whatever stage they were on, so we don't
    // pretend they entered the new stage from nothing.
    job.stageHistory = job.stage ? [{stageId: job.stage, enteredAt: job.added || new Date().toISOString()}] : [];
  }
  if(job.stage !== newStageId){
    job.stageHistory.push({stageId: newStageId, enteredAt: new Date().toISOString()});
    job.stage = newStageId;
  }
  saveJobs();
}

// Days the job has been in its current stage. Falls back to age-since-added
// for jobs imported before stageHistory existed. Returns null if we have no
// reasonable basis (no history, no added date).
function timeInStageDays(job){
  if(Array.isArray(job.stageHistory) && job.stageHistory.length){
    const last = job.stageHistory[job.stageHistory.length-1];
    if(last && last.enteredAt){
      const ms = Date.now() - new Date(last.enteredAt).getTime();
      return ms / 86400000;
    }
  }
  if(job.added){
    const ms = Date.now() - new Date(job.added).getTime();
    return ms / 86400000;
  }
  return null;
}

function pct(job){
  const si = job.stages.findIndex(s => s.id === job.stage);
  let tot = 0, done = 0;
  job.stages.forEach((s,i) => {
    const steps = job.ck[s.id] || [];
    tot += steps.length;
    if(i < si) done += steps.length;
    else if(i === si) done += steps.filter(x => x.d).length;
  });
  return tot ? Math.round(done/tot*100) : 0;
}
function spct(job, sid){
  const steps = job.ck[sid] || [];
  return steps.length ? Math.round(steps.filter(s=>s.d).length/steps.length*100) : 0;
}

let scheduleHolidays = [];
function loadHolidays(){ try{ scheduleHolidays=JSON.parse(localStorage.getItem('broadway_jobboard_holidays')||'[]')||[]; }catch(e){ scheduleHolidays=[]; } }
function saveHolidays(){ try{ localStorage.setItem('broadway_jobboard_holidays', JSON.stringify(scheduleHolidays)); }catch(e){} }
function isWorkday(d){ const g=d.getDay(); if(g===0||g===6) return false; return scheduleHolidays.indexOf(d.toISOString().slice(0,10))<0; }

function bizAdd(ds, n){
  let d = new Date(ds+'T00:00:00');
  for(let a=0;a<n;){ d.setDate(d.getDate()+1); if(isWorkday(d)) a++; }
  return d.toISOString().slice(0,10);
}
function computeSegs(job){
  if(!job.startDate) return [];
  const out = []; let cur = job.startDate;
  job.stages.forEach(s => {
    // Effective target layers user overrides on top of the template default;
    // per-job stageDur takes precedence over both as a manual one-off.
    const override = job.stageDur && job.stageDur[s.id];
    const dur = (typeof override === 'number' && override > 0)
      ? override
      : (effectiveTarget(job.tplKey, s.id, s.dur) || 3);
    const end = bizAdd(cur, dur);
    out.push({sid:s.id, start:cur, end});
    cur = end;
  });
  return out;
}
function projEnd(job){ const s=computeSegs(job); return s.length?s[s.length-1].end:null; }

// Timeline segments from ACTUAL stage-entry history (used when a job has no
// manual start date). Each history entry → a bar running until the next entry;
// the current/last stage runs to today. Gives the Gantt real data to draw even
// for audit-imported jobs that were never given a start date.
function histSegs(job){
  const h = Array.isArray(job.stageHistory) ? job.stageHistory.filter(e=>e&&e.enteredAt) : [];
  if(!h.length) return [];
  const pts = h.map(e=>({sid:e.stageId, t:new Date(e.enteredAt)})).filter(e=>!isNaN(e.t.getTime()))
               .sort((a,b)=>a.t-b.t);
  if(!pts.length) return [];
  const iso = d => d.toISOString().slice(0,10);
  const today = new Date(); today.setHours(0,0,0,0);
  const out = [];
  for(let i=0;i<pts.length;i++){
    const start = pts[i].t;
    const end = (i+1<pts.length) ? pts[i+1].t : today;
    out.push({sid:pts[i].sid, start:iso(start), end:iso(end < start ? start : end)});
  }
  return out;
}

// Whichever timeline applies: projected (manual start date) or historical.
function ganttSegs(job){ return job.startDate ? computeSegs(job) : histSegs(job); }
function hasTimeline(job){ return !!job.startDate || histSegs(job).length>0; }

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
// Reveal hidden rows for a "+N more" footer (render all rows, mark overflow with
// class "bn-row-hidden", footer cell calls bnExpandRows(this)).
function bnExpandRows(cell){
  var tbl=cell.closest('table'); if(!tbl) return;
  tbl.querySelectorAll('tr.bn-row-hidden').forEach(function(tr){ tr.classList.remove('bn-row-hidden'); });
  var fr=cell.closest('tr'); if(fr&&fr.parentNode) fr.parentNode.removeChild(fr);
}

function getGroupValue(job, field) {
  if(field==='client')      return job.client||'No Client';
  if(field==='vendor')      return job.vendor||'No Vendor';
  if(field==='projectType') return job.projectType||'Other';
  if(field==='stage')       { const s=job.stages.find(x=>x.id===job.stage); return s?s.label:'Unknown'; }
  if(field==='state')       return job.state||'Unknown';
  if(field==='tplKey')      return TPL_LABELS[job.tplKey]||job.tplKey||'Retrofit';
  return '';
}

function onSearch(q){
  searchQ = q.toLowerCase().trim();
  if(view==='prospects'){ renderProspects(prospBoard()); return; }   // filter the pipeline in place - skip the hidden jobs chrome
  render();
