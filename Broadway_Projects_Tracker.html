// ── CUMULATIVE FLOW DIAGRAM ──
// Reconstructs stage occupancy over time from each job's stageHistory.
// For each sample date we count, per stage, how many jobs were sitting in that
// stage at that moment, then stack them. This is an approximation built from
// stage-entry timestamps, not true daily snapshots.
function buildCFD(list){
  // Collect all history-bearing jobs and the global time range.
  const jobsH = list.map(j => ({ job:j, hist: (Array.isArray(j.stageHistory)&&j.stageHistory.length)
      ? j.stageHistory.filter(e=>e&&e.enteredAt).map(e=>({stageId:e.stageId, t:new Date(e.enteredAt).getTime()})).filter(e=>isFinite(e.t))
      : [] }))
    .filter(o => o.hist.length);
  if(!jobsH.length) return { empty:true };
  let minT = Infinity;
  jobsH.forEach(o => { if(o.hist[0].t < minT) minT = o.hist[0].t; });
  const maxT = Date.now();
  if(!isFinite(minT) || maxT <= minT) return { empty:true };
  // ~36 sample buckets across the range.
  const N = 36;
  const dates = [];
  for(let i=0;i<=N;i++) dates.push(minT + (maxT-minT)*(i/N));
  // Canonical stage order + colors from the union of stages across the list.
  const stageMeta = allStageKeys(list); // [{id,label,color,...}] in board order
  const order = stageMeta.map(s=>s.id);
  // Map each job's stage label->id can differ across templates; CFD groups by
  // stage *label* so semantically-equal stages stack together.
  const labelOf = {}; stageMeta.forEach(s=>labelOf[s.id]=s.label);
  // Build series keyed by label.
  const labels = []; const labelColor = {};
  stageMeta.forEach(s=>{ if(!labels.includes(s.label)){ labels.push(s.label); labelColor[s.label]=s.color; } });
  const series = {}; labels.forEach(l=> series[l] = new Array(dates.length).fill(0));
  // For each job, determine the stage label active at each sample date.
  jobsH.forEach(o => {
    const h = o.hist;
    for(let di=0; di<dates.length; di++){
      const t = dates[di];
      if(t < h[0].t) continue; // job didn't exist yet
      // find last history entry with entered <= t
      let cur = h[0];
      for(let k=0;k<h.length;k++){ if(h[k].t <= t) cur = h[k]; else break; }
      const lbl = labelOf[cur.stageId] || (o.job.stages.find(s=>s.id===cur.stageId)?.label) || 'Unknown';
      if(!(lbl in series)){ series[lbl]=new Array(dates.length).fill(0); if(!labels.includes(lbl)){labels.push(lbl); labelColor[lbl]='#94a3b8';} }
      series[lbl][di]++;
    }
  });
  return { empty:false, dates, labels, labelColor, series, jobCount: jobsH.length, excluded: list.length - jobsH.length };
}

function cfdSVG(data){
  if(data.empty) return `<div class="rpt-empty">Not enough stage history yet to reconstruct flow. Move jobs through stages (or import history) and the curve will build over time.</div>`;
  const W=720, H=280, padL=34, padR=12, padT=12, padB=40;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const dates=data.dates, n=dates.length;
  // stack order: reverse board order so earliest stage is at the BOTTOM and
  // closed accumulates on top (standard CFD reading).
  const stackLabels = data.labels.slice();
  // totals per date for y-scale
  let maxTotal=1;
  for(let di=0; di<n; di++){ let s=0; stackLabels.forEach(l=> s+=data.series[l][di]); if(s>maxTotal) maxTotal=s; }
  const x = i => padL + (n===1?plotW/2:(i/(n-1))*plotW);
  const y = v => padT + plotH - (v/maxTotal)*plotH;
  // build stacked areas (bottom-up)
  let cum = new Array(n).fill(0);
  let bands='';
  stackLabels.forEach(lbl => {
    const top = cum.map((c,di)=> c + data.series[lbl][di]);
    // polygon: top edge left->right, bottom edge right->left
    let d='M';
    for(let i=0;i<n;i++) d += `${i?'L':''}${x(i).toFixed(1)},${y(top[i]).toFixed(1)} `;
    for(let i=n-1;i>=0;i--) d += `L${x(i).toFixed(1)},${y(cum[i]).toFixed(1)} `;
    d+='Z';
    const col = data.labelColor[lbl]||'#94a3b8';
    bands += `<path d="${d}" fill="${col}" fill-opacity="0.82" stroke="#fff" stroke-width="0.5"><title>${esc(lbl)}</title></path>`;
    cum = top;
  });
  // y gridlines
  let grid='';
  for(let g=0;g<=4;g++){ const v=maxTotal*g/4; const yy=y(v); grid+=`<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${padL+plotW}" y2="${yy.toFixed(1)}" stroke="#eef2f7" stroke-width="1"/><text x="${padL-5}" y="${(yy+3).toFixed(1)}" text-anchor="end" font-size="9" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">${v.toFixed(0)}</text>`; }
  const xlabels=[0,Math.floor((n-1)/2),n-1].filter((v,i,a)=>a.indexOf(v)===i)
    .map(i=>`<text x="${x(i).toFixed(1)}" y="${H-padB+15}" text-anchor="middle" font-size="9" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">${fmtShortDate(new Date(dates[i]))}</text>`).join('');
  // legend
  const legend = stackLabels.map(l=>`<span class="cfd-leg"><span class="cfd-swatch" style="background:${data.labelColor[l]||'#94a3b8'}"></span>${esc(l)}</span>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Cumulative flow diagram">${grid}${bands}${xlabels}</svg>
    <div class="cfd-legend">${legend}</div>`;
}

// ── PHASE 3: cross-job lookahead + master schedule (portfolio level) ──
let lookaheadDays = 14;
function setLookahead(n){ lookaheadDays=parseInt(n,10)||14; renderContent(); }
function scheduledJobs(){ return jobs.filter(j=>j.schedule && j.schedule.tasks && j.schedule.tasks.length); }
// Flat list of tasks (across all scheduled jobs) starting or finishing within the window.
function lookaheadData(days){
  const today=new Date(); today.setHours(0,0,0,0);
  const end=new Date(today); end.setDate(end.getDate()+days);
  const ts=today.toISOString().slice(0,10), es=end.toISOString().slice(0,10);
  const out=[];
  scheduledJobs().forEach(job=>{
    computeSchedule(job.schedule);
    job.schedule.tasks.forEach(t=>{
      if(t.summary||!t._start||!t._finish) return;
      const starting = t._start>=ts && t._start<=es;
      const finishing = t._finish>=ts && t._finish<=es;
      const inprog = t._start<ts && t._finish>es;
      if(starting||finishing||inprog){
        out.push({job, task:t, start:t._start, finish:t._finish,
          status: starting?'Starting':(finishing?'Finishing':'In progress'),
          critical:!!t._critical, key: (starting?t._start:(finishing?t._finish:ts))});
      }
    });
  });
  out.sort((a,b)=> a.key<b.key?-1:a.key>b.key?1:0);
  return out;
}
// Per-job project span + progress for the master timeline.
function masterScheduleData(){
  return scheduledJobs().map(job=>{
    computeSchedule(job.schedule);
    const reg=job.schedule.tasks.filter(t=>!t.summary&&t._start);
    if(!reg.length) return null;
    const start=reg.reduce((a,t)=>t._start<a?t._start:a,reg[0]._start);
    const finish=reg.reduce((a,t)=>t._finish>a?t._finish:a,reg[0]._finish);
    const base=job.schedule.baseline&&job.schedule.baseline.finish;
    let behind=0; if(base){ behind = finish>base?bizDiff(base,finish):(finish<base?-bizDiff(finish,base):0); }
    return {job, start, finish, pct:scheduleProgress(job.schedule), behind, hasBase:!!base};
  }).filter(Boolean);
}

// ── PHASE 8: vendor conflict detection + budget vs. actual ──
// Cross-job double-bookings: same crew/vendor on date-overlapping tasks in different jobs.
function vendorConflicts(){
  const tasks=[];
  scheduledJobs().forEach(job=>{ computeSchedule(job.schedule); job.schedule.tasks.forEach(t=>{ if(!t.summary && t.vendor && t.vendor.trim() && t._start && t._finish) tasks.push({job, t, vendor:t.vendor.trim(), start:t._start, finish:t._finish}); }); });
  const byV={}; tasks.forEach(x=>{ const k=x.vendor.toLowerCase(); (byV[k]=byV[k]||[]).push(x); });
  const out=[];
  Object.values(byV).forEach(arr=>{ if(arr.length<2) return;
    for(let i=0;i<arr.length;i++) for(let j=i+1;j<arr.length;j++){
      const a=arr[i], b=arr[j];
      if(a.job.id===b.job.id) continue; // cross-job only
      if(a.start<=b.finish && b.start<=a.finish){
        const os=a.start>b.start?a.start:b.start, oe=a.finish<b.finish?a.finish:b.finish;
        out.push({vendor:a.vendor, a, b, os, oe});
      }
    }
  });
  out.sort((x,y)=>x.os<y.os?-1:1);
  return out;
}
// Per-job financials: revised contract = original + approved COs; margin vs actual cost.
function jobFinance(job){
  const fin=job.fin||{};
  const contract=parseFloat(fin.contract)||0;
  const cost=parseFloat(fin.cost)||0;
  const approvedCO=(job.logs&&job.logs.cos?job.logs.cos:[]).filter(c=>c.status==='Approved').reduce((a,c)=>a+(parseFloat(c.amount)||0),0);
  const revised=contract+approvedCO;
  const margin=revised-cost;
  const marginPct=revised?Math.round(margin/revised*1000)/10:0;
  return {contract, cost, approvedCO, revised, margin, marginPct, set: !!(fin.contract||fin.cost)};
}

// ── PHASE 9: at-risk rollup - aggregate every risk signal across active jobs ──
// Per-job compact attention flags for board cards / list rows. Read-only and
// fully derived from existing data - adds no new stored fields. Mirrors the
// per-job signals in atRiskItems() but deliberately EXCLUDES "Blocked" (already
// shown on the card via jcard-blockflag) and cross-job vendor conflicts. This is
// intentionally a separate, lightweight function rather than a refactor of the
// tested atRiskItems(), to keep the at-risk rollup untouched.
// Returns [{sev:'high'|'med', t:'short label'}].
function jobRiskFlags(job){
  const out=[]; if(!job || isJobClosed(job)) return out;
  const hasSched = job.schedule && job.schedule.tasks && job.schedule.tasks.length;
  if(hasSched) computeSchedule(job.schedule);
  const reg = hasSched ? job.schedule.tasks.filter(t=>!t.summary&&t._finish) : [];
  const curFinish = reg.length ? reg.reduce((a,t)=>t._finish>a?t._finish:a,reg[0]._finish) : null;
  if(hasSched && job.schedule.baseline && job.schedule.baseline.finish && curFinish && curFinish>job.schedule.baseline.finish){
    const dd=bizDiff(job.schedule.baseline.finish,curFinish); out.push({sev:dd>10?'high':'med', t:dd+'d behind baseline'});
  }
  if(hasSched && curFinish){ const du=daysUntil(curFinish), pc=scheduleProgress(job.schedule);
    if(du!=null && du<0 && pc<100) out.push({sev:'high', t:'Past finish · '+pc+'%'});
    else if(du!=null && du>=0 && du<=14 && pc<100) out.push({sev:du<=5?'high':'med', t:'Due in '+du+'d · '+pc+'%'});
  }
  if(job.closeout && Array.isArray(job.closeout.inspections)){ const f=job.closeout.inspections.filter(i=>i.result==='Fail').length; if(f) out.push({sev:'high', t:f+' failed inspection'+(f>1?'s':'')}); }
  if(job.closeout && Array.isArray(job.closeout.punch)){ const op=job.closeout.punch.filter(p=>p.status!=='Done').length; if(op) out.push({sev:'med', t:op+' open punch item'+(op>1?'s':'')}); }
  if(job.logs && Array.isArray(job.logs.permits)) job.logs.permits.forEach(p=>{ const r=permitRisk(p); if(r==='expired') out.push({sev:'high', t:(p.type||'Permit')+' expired'}); else if(r==='expiring') out.push({sev:'med', t:(p.type||'Permit')+' expiring'}); });
  if(job.logs && Array.isArray(job.logs.rfis)){ const ag=job.logs.rfis.filter(r=>r.status==='Open'&&r.submitted&&daysUntil(r.submitted)<-7).length; if(ag) out.push({sev:'med', t:ag+' aging RFI'+(ag>1?'s':'')}); }
  const F=jobFinance(job); if(F.set){ if(F.margin<0) out.push({sev:'high', t:'Negative margin'}); else if(F.marginPct<10) out.push({sev:'med', t:'Thin margin '+F.marginPct+'%'}); }
  const t0=todayStr();
  const odTasks=(Array.isArray(job.tasks)?job.tasks:[]).filter(t=>!t.done&&t.due&&t.due<t0).length;
  if(odTasks) out.push({sev:'high', t:odTasks+' overdue task'+(odTasks>1?'s':'')});
  const hasOpenDatedTask=(Array.isArray(job.tasks)?job.tasks:[]).some(t=>!t.done&&t.due);
  if(job.actionDate && job.actionDate<t0 && !hasOpenDatedTask) out.push({sev:'med', t:'Next Touch overdue'});
  return out;
}

function atRiskItems(){
  const items=[];
  jobs.forEach(job=>{
    if(isJobClosed(job)) return;
    const hasSched = job.schedule && job.schedule.tasks && job.schedule.tasks.length;
    if(hasSched) computeSchedule(job.schedule);
    const reg = hasSched ? job.schedule.tasks.filter(t=>!t.summary&&t._finish) : [];
    const curFinish = reg.length ? reg.reduce((a,t)=>t._finish>a?t._finish:a,reg[0]._finish) : null;
    // behind baseline
    if(hasSched && job.schedule.baseline && job.schedule.baseline.finish && curFinish && curFinish>job.schedule.baseline.finish){
      const dd=bizDiff(job.schedule.baseline.finish,curFinish);
      items.push({job, sev:dd>10?'high':'med', cat:'Schedule', detail:dd+' working days behind baseline (finish '+fmtSchedDate(curFinish)+')', action:`openSchedule('${job.id}')`});
    }
    // approaching / past finish
    if(hasSched && curFinish){ const du=daysUntil(curFinish), pct=scheduleProgress(job.schedule);
      if(du!=null && du<0 && pct<100) items.push({job, sev:'high', cat:'Deadline', detail:'Past projected finish ('+fmtSchedDate(curFinish)+'), '+pct+'% complete', action:`openSchedule('${job.id}')`});
      else if(du!=null && du>=0 && du<=14 && pct<100) items.push({job, sev:du<=5?'high':'med', cat:'Deadline', detail:'Finishes in '+du+' days, '+pct+'% complete', action:`openSchedule('${job.id}')`});
    }
    // blocked aging
    if(isBlocked(job)){ const age=blockedAgeDays(job); if(age!=null && age>7) items.push({job, sev:age>14?'high':'med', cat:'Blocked', detail:'Blocked '+age.toFixed(0)+' days', action:`selJob('${job.id}')`}); }
    // failed inspections
    if(job.closeout && job.closeout.inspections){ const f=job.closeout.inspections.filter(i=>i.result==='Fail'); if(f.length) items.push({job, sev:'high', cat:'Inspection', detail:f.length+' failed inspection'+(f.length>1?'s':'')+(f[0].name?' ('+esc(f[0].name)+')':''), action:`openCloseout('${job.id}')`}); }
    // permits
    if(job.logs && job.logs.permits) job.logs.permits.forEach(p=>{ const r=permitRisk(p); if(r==='expired') items.push({job, sev:'high', cat:'Permit', detail:(esc(p.type)||'Permit')+' expired', action:`openLogs('${job.id}')`}); else if(r==='expiring') items.push({job, sev:'med', cat:'Permit', detail:(esc(p.type)||'Permit')+' expires in '+daysUntil(p.expiration)+'d', action:`openLogs('${job.id}')`}); });
    // aging RFIs
    if(job.logs && job.logs.rfis){ const ag=job.logs.rfis.filter(r=>r.status==='Open'&&r.submitted&&daysUntil(r.submitted)<-7); if(ag.length) items.push({job, sev:'med', cat:'RFI', detail:ag.length+' RFI'+(ag.length>1?'s':'')+' open >7 days', action:`openLogs('${job.id}')`}); }
    // margin
    const F=jobFinance(job); if(F.set){ if(F.margin<0) items.push({job, sev:'high', cat:'Budget', detail:'Negative margin ($'+F.margin.toLocaleString()+', '+F.marginPct+'%)', action:`openLogs('${job.id}')`}); else if(F.marginPct<10) items.push({job, sev:'med', cat:'Budget', detail:'Thin margin ('+F.marginPct+'%)', action:`openLogs('${job.id}')`}); }
    // overdue tasks (escalations) + lapsed Next Touch
    const t0=todayStr();
    const odt=(Array.isArray(job.tasks)?job.tasks:[]).filter(t=>!t.done&&t.due&&t.due<t0);
    if(odt.length) items.push({job, sev:'high', cat:'Task', detail:odt.length+' overdue task'+(odt.length>1?'s':'')+(odt[0].text?' ('+esc(odt[0].text)+')':''), action:`selJob('${job.id}')`});
    const hasOpenDated=(Array.isArray(job.tasks)?job.tasks:[]).some(t=>!t.done&&t.due);
    if(job.actionDate && job.actionDate<t0 && !hasOpenDated) items.push({job, sev:'med', cat:'Next Touch', detail:'Next Touch overdue (was '+job.actionDate+')', action:`selJob('${job.id}')`});
  });
  // cross-job vendor conflicts
  vendorConflicts().forEach(c=>{ items.push({job:c.a.job, sev:'high', cat:'Conflict', detail:esc(c.vendor)+' double-booked with '+esc(c.b.job.city||'another job')+' ('+fmtSchedDate(c.os)+'–'+fmtSchedDate(c.oe)+')', action:`openSchedule('${c.a.job.id}')`}); });
  const rank={high:0,med:1};
  items.sort((a,b)=>(rank[a.sev]-rank[b.sev]) || a.cat.localeCompare(b.cat));
  return items;
}

function renderReports(el, list){
  const active = list.filter(j => !isJobClosed(j));
  const closed = list.filter(j =>  isJobClosed(j));
  const withStart = active.filter(j => j.startDate);
  const noStart   = active.filter(j => !j.startDate);

  // Per-stage rollup across the filtered list.
  // Group active jobs by (stage label) since "id" varies across templates.
  // For the target, we use the effective target from the FIRST job's template
  // that lands in this bucket. Stages with the same label across templates
  // generally share semantics ("Materials" means roughly the same thing in
  // Retrofit and Project), and mixing targets from different templates would
  // produce a misleading single number. If you want per-template numbers,
  // filter the board to one template via the sidebar before reading reports.
  const byStage = new Map();
  active.forEach(j => {
    const s = j.stages.find(x => x.id === j.stage);
    if(!s) return;
    if(!byStage.has(s.label)){
      byStage.set(s.label, {
        label:s.label, color:s.color, items:[],
        target: effectiveTarget(j.tplKey, s.id, s.dur),
        sourceTpl: j.tplKey, sourceStageId: s.id
      });
    }
    byStage.get(s.label).items.push(j);
  });

  const stageRows = Array.from(byStage.values()).map(b => {
    const times = b.items.map(j => timeInStageDays(j)).filter(x => x !== null).sort((a,b)=>a-b);
    const median = percentile(times, 0.5);
    const p90    = percentile(times, 0.9);
    const mean = times.length ? times.reduce((s,v)=>s+v,0)/times.length : null;
    const pastTarget = b.target ? times.filter(t => t > b.target).length : 0;
    // Health flag: red if median > 2× target, amber if > target, green otherwise.
    let flag = 'green';
    if(b.target && median !== null){
      if(median > 2*b.target) flag = 'red';
      else if(median > b.target) flag = 'amber';
    }
    return {label:b.label, color:b.color, count:b.items.length, target:b.target, mean, median, p90, pastTarget, flag, sourceTpl:b.sourceTpl, sourceStageId:b.sourceStageId};
  }).sort((a,b) => (b.median||0) - (a.median||0));

  // Per-template counts for the overview strip.
  const byTpl = new Map();
  active.forEach(j => {
    const k = TPL_LABELS[j.tplKey] || j.tplKey || 'Other';
    byTpl.set(k, (byTpl.get(k)||0) + 1);
  });

  // Jobs flagged "stuck" (past effective target time-in-stage). Per-job
  // stageDur overrides (rare) take precedence over the per-template target.
  const stuck = active.map(j => {
    const s = j.stages.find(x => x.id === j.stage);
    const jobOverride = j.stageDur && j.stageDur[s?.id];
    const tgt = (typeof jobOverride === 'number' && jobOverride > 0)
      ? jobOverride
      : effectiveTarget(j.tplKey, s?.id, s?.dur);
    const t = timeInStageDays(j);
    return {job:j, stage:s, target:tgt, days:t};
  }).filter(r => r.target && r.days !== null && r.days > r.target).sort((a,b) => b.days - a.days);

  // Audit divergences - WOs that exist in both Job Board and audit, where the
  // audit status meaningfully disagrees with the current stage label. Uses the
  // synonym-aware auditAligned() check so "Materials Ordered" matches "PO Issued"
  // and similar real-world synonyms don't show up as false divergences.
  const auditDiverged = active.filter(j => {
    if(!j.wo || !auditByWo[j.wo]) return false;
    const stageLbl = j.stages.find(s=>s.id===j.stage)?.label || '';
    const auditStatus = auditByWo[j.wo].status || '';
    if(!auditStatus) return false;
    return !auditAligned(auditStatus, stageLbl);
  });

  const auditStatus = Object.keys(auditByWo).length
    ? `Audit hints loaded for ${Object.keys(auditByWo).length} WO${Object.keys(auditByWo).length===1?'':'s'} · ${auditDiverged.length} diverged from board`
    : 'No audit hints loaded. Use "Sync Audit" to import WO statuses for reference.';

  let h = '<div class="rpt-wrap">';

  // Added flow analytics (all derived from the board's own data)
  const wip = wipByStage(list);
  const blocked = list.filter(isBlocked).map(j => ({job:j, age:blockedAgeDays(j)})).sort((a,b)=>(b.age||0)-(a.age||0));
  const cc = buildControlChart(list);
  const cfd = buildCFD(list);
  const unmapped = unmappedStatuses();
  const overrideCount = Object.keys(statusToStage).length;
  // Stage distribution across the whole filtered list (counts + %).
  const stageDist = (() => {
    const m = new Map();
    list.forEach(j => { const s=j.stages.find(x=>x.id===j.stage); const lbl=s?s.label:'Unknown'; if(!m.has(lbl)) m.set(lbl,{label:lbl,color:s?s.color:'#64748b',count:0}); m.get(lbl).count++; });
    return Array.from(m.values()).sort((a,b)=>b.count-a.count);
  })();

  // AT-RISK ROLLUP (leadership: surfaces everything needing attention)
  const risks = atRiskItems();
  const hi = risks.filter(r=>r.sev==='high').length, md = risks.length-hi;
  h += '<div class="rpt-section">';
  h += `<div class="rpt-section-hdr">At-Risk &mdash; Needs Attention ${risks.length?`<span class="ar-count"><span class="ar-pill high">${hi} high</span><span class="ar-pill med">${md} watch</span></span>`:''}</div>`;
  if(!risks.length){
    h += '<div class="rpt-empty" style="color:var(--green-d)">&#10003; Nothing flagged. No behind-baseline schedules, looming deadlines, blocked jobs, failed inspections, expiring permits, aging RFIs, margin issues, or crew conflicts on active jobs.</div>';
  } else {
    h += '<div class="ar-list">';
    risks.forEach(r=>{
      h += `<div class="ar-item ${r.sev}" onclick="${r.action}">
        <span class="ar-dot"></span>
        <span class="ar-cat">${r.cat}</span>
        <span class="ar-job">${esc(r.job.city||'Unknown')}${r.job.state?', '+esc(r.job.state):''}<span class="ar-wo">${esc(r.job.wo||'')}</span></span>
        <span class="ar-detail">${r.detail}</span>
      </div>`;
    });
    h += '</div>';
  }
  h += '</div>';

  // OVERVIEW / DATA SUMMARY
  h += '<div class="rpt-section">';
  h += `<div class="rpt-section-hdr">Data Summary
    <span style="display:flex;gap:6px">
      <button class="btn btn-ghost" style="font-size:9px;padding:3px 8px" onclick="exportReportCSV()">&#8595; CSV</button>
      <button class="btn btn-ghost" style="font-size:9px;padding:3px 8px" onclick="gotoMapping()">Go to Mapping</button>
    </span>
  </div>`;
  h += '<div class="rpt-stats">';
  h += `<div class="rpt-stat"><div class="rpt-stat-num">${list.length}</div><div class="rpt-stat-lbl">Total Jobs</div><div class="rpt-stat-sub">${active.length} active · ${closed.length} closed</div></div>`;
  h += `<div class="rpt-stat"><div class="rpt-stat-num">${wip.total}</div><div class="rpt-stat-lbl">WIP</div><div class="rpt-stat-sub">active in flow</div></div>`;
  h += `<div class="rpt-stat"><div class="rpt-stat-num" style="color:${blocked.length?'#dc2626':'#39b54a'}">${blocked.length}</div><div class="rpt-stat-lbl">Blocked</div><div class="rpt-stat-sub">${blocked.length?'see aging below':'none blocked'}</div></div>`;
  h += `<div class="rpt-stat"><div class="rpt-stat-num">${withStart.length}</div><div class="rpt-stat-lbl">Scheduled</div><div class="rpt-stat-sub">have start date</div></div>`;
  h += `<div class="rpt-stat"><div class="rpt-stat-num" style="color:${noStart.length?'#d97706':'#39b54a'}">${noStart.length}</div><div class="rpt-stat-lbl">Missing Start</div><div class="rpt-stat-sub">${noStart.length?'no ECD possible':'all scheduled'}</div></div>`;
  h += `<div class="rpt-stat"><div class="rpt-stat-num" style="color:${stuck.length?'#dc2626':'#39b54a'}">${stuck.length}</div><div class="rpt-stat-lbl">Stuck</div><div class="rpt-stat-sub">past stage target</div></div>`;
  h += `<div class="rpt-stat"><div class="rpt-stat-num" style="color:${unmapped.length?'#d97706':'#39b54a'}">${unmapped.length}</div><div class="rpt-stat-lbl">Unmapped Status</div><div class="rpt-stat-sub">${overrideCount} mapping override${overrideCount===1?'':'s'}</div></div>`;
  Array.from(byTpl.entries()).forEach(([k,n]) => {
    h += `<div class="rpt-stat"><div class="rpt-stat-num">${n}</div><div class="rpt-stat-lbl">${esc(k)}</div><div class="rpt-stat-sub">active</div></div>`;
  });
  h += '</div>';
  // Stage distribution (counts + %)
  if(stageDist.length){
    h += '<div class="rpt-dist">';
    stageDist.forEach(s => {
      const p = list.length ? Math.round(100*s.count/list.length) : 0;
      h += `<span class="rpt-dist-item"><span class="rpt-dist-dot" style="background:${s.color}"></span>${esc(s.label)} <strong>${s.count}</strong> <span class="rpt-dist-pct">${p}%</span></span>`;
    });
    h += '</div>';
  }
  // Unmapped status chips - clicking opens the status-map editor.
  if(unmapped.length){
    h += '<div class="rpt-unmapped"><span class="rpt-unmapped-lbl">Unmapped audit statuses:</span> ';
    h += unmapped.map(u => `<button class="rpt-chip" onclick="gotoMapping('${esc(u.status).replace(/'/g,'&#39;')}')" title="Map this status">${esc(u.status)} <span class="rpt-chip-cnt">${u.count}</span></button>`).join('');
    h += '</div>';
  }
  h += `<div class="rpt-audit-status">${esc(auditStatus)}</div>`;
  h += '</div>';

  // WIP + BLOCKED AGING
  h += '<div class="rpt-section">';
  h += '<div class="rpt-section-hdr">Work In Progress &amp; Blocked</div>';
  h += '<div class="rpt-dist" style="margin-bottom:10px">';
  wip.stages.forEach(s => {
    h += `<span class="rpt-dist-item"><span class="rpt-dist-dot" style="background:${s.color}"></span>${esc(s.label)} <strong>${s.count}</strong></span>`;
  });
  if(!wip.stages.length) h += '<span style="font-size:11px;color:var(--t3)">No active jobs in flow.</span>';
  h += '</div>';
  if(blocked.length){
    h += '<table class="rpt-table"><thead><tr><th>WO</th><th>City</th><th>Stage</th><th class="num">Blocked (days)</th></tr></thead><tbody>';
    blocked.slice(0,50).forEach(r => {
      const st = r.job.stages.find(s=>s.id===r.job.stage);
      const sev = (r.age||0) > 14 ? 'red' : (r.age||0) > 7 ? 'amber' : 'green';
      h += `<tr style="cursor:pointer" onclick="selJob('${r.job.id}')">
        <td style="color:var(--green-d);font-weight:600">${esc(r.job.wo||'-')} <span class="rpt-flag amber">⛔ blocked</span></td>
        <td>${esc(r.job.city||'-')}${r.job.state?', '+esc(r.job.state):''}</td>
        <td><span class="badge" style="background:${st?.color||'#64748b'}22;color:${st?.color||'#64748b'}">${esc(st?.label||'-')}</span></td>
        <td class="num"><span class="rpt-flag ${sev}">${r.age!=null?r.age.toFixed(1):'-'}</span></td>
      </tr>`;
    });
    h += '</tbody></table>';
  } else {
    h += '<div class="rpt-empty">Nothing blocked. Right-click a card (or use its ⋯ menu) to mark one blocked.</div>';
  }
  h += '</div>';

  // CROSS-JOB LOOKAHEAD
  const look = lookaheadData(lookaheadDays);
  h += '<div class="rpt-section">';
  h += `<div class="rpt-section-hdr">Lookahead
    <select class="rpt-editor-input" style="font-size:10px;width:auto" onchange="setLookahead(this.value)">
      ${[7,14,21,28].map(n=>`<option value="${n}" ${lookaheadDays===n?'selected':''}>Next ${n} days</option>`).join('')}
    </select></div>`;
  if(!scheduledJobs().length){
    h += '<div class="rpt-empty">No job schedules yet. Open a job\'s Timeline and build a schedule to populate the lookahead.</div>';
  } else if(!look.length){
    h += `<div class="rpt-empty">No scheduled tasks start or finish in the next ${lookaheadDays} days.</div>`;
  } else {
    h += '<table class="rpt-table"><thead><tr><th>When</th><th>Job</th><th>Task</th><th>Start</th><th>Finish</th><th>Status</th></tr></thead><tbody>';
    look.forEach(r=>{
      const badge = r.status==='Starting'?'green':r.status==='Finishing'?'amber':'';
      h += `<tr style="cursor:pointer" onclick="openSchedule('${r.job.id}')">
        <td style="font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;font-size:10px;color:var(--t3)">${fmtShortDate(new Date(r.key+'T00:00:00'))}</td>
        <td style="font-weight:600">${esc(r.job.city||'-')}${r.job.state?', '+esc(r.job.state):''}<div style="font-size:9px;color:var(--t3)">${esc(r.job.wo||'')}</div></td>
        <td>${r.critical?'<span class="rpt-flag red">CP</span> ':''}${esc(r.task.name)}</td>
        <td style="font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;font-size:10px">${fmtSchedDate(r.start)}</td>
        <td style="font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;font-size:10px">${fmtSchedDate(r.finish)}</td>
        <td>${badge?`<span class="rpt-flag ${badge}">${r.status}</span>`:`<span style="font-size:10px;color:var(--t3)">${r.status}</span>`}</td>
      </tr>`;
    });
    h += '</tbody></table>';
    h += `<div class="rpt-note" style="margin-top:8px">${look.length} task${look.length===1?'':'s'} across ${new Set(look.map(r=>r.job.id)).size} job${new Set(look.map(r=>r.job.id)).size===1?'':'s'} in the window. <span class="rpt-flag red" style="vertical-align:middle">CP</span> = on that job's critical path.</div>`;
  }
  h += '</div>';

  // MASTER SCHEDULE (all projects)
  const master = masterScheduleData();
  h += '<div class="rpt-section">';
  h += '<div class="rpt-section-hdr">Master Schedule <span style="color:var(--t3);font-weight:600">(all project schedules)</span></div>';
  if(!master.length){
    h += '<div class="rpt-empty">No job schedules yet to chart.</div>';
  } else {
    const today=new Date().toISOString().slice(0,10);
    let mn=master.reduce((a,m)=>m.start<a?m.start:a,master[0].start);
    let mx=master.reduce((a,m)=>m.finish>a?m.finish:a,master[0].finish);
    if(today<mn)mn=today; if(today>mx)mx=today;
    const ps=new Date(mn+'T00:00:00'); ps.setDate(ps.getDate()-5);
    const pe=new Date(mx+'T00:00:00'); pe.setDate(pe.getDate()+5);
    const sp=Math.max(1,(pe-ps)/86400000);
    const xp=d=>((new Date(d+'T00:00:00')-ps)/86400000/sp*100);
    const wp=(a,b)=>Math.max(0.5,(new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000/sp*100);
    let mo=''; const dm=new Date(ps); dm.setDate(1);
    while(dm<=pe){ const l=((dm-ps)/86400000/sp*100); if(l>=0&&l<=100) mo+=`<div class="ms-month" style="left:${l.toFixed(2)}%">${dm.toLocaleString('default',{month:'short'})} ${String(dm.getFullYear()).slice(2)}</div>`; dm.setMonth(dm.getMonth()+1); }
    const tx=xp(today);
    h += `<div class="ms-wrap"><div class="ms-axis">${mo}${tx>=0&&tx<=100?`<div class="ms-today" style="left:${tx.toFixed(2)}%"><span>Today</span></div>`:''}</div><div class="ms-rows">`;
    master.sort((a,b)=>a.finish<b.finish?-1:1).forEach(m=>{
      const col = m.behind>0?'#e74c3c':(m.pct>=100?'#16a34a':'#3498db');
      h += `<div class="ms-row" onclick="openSchedule('${m.job.id}')" title="${esc(m.job.city||'')}: ${fmtSchedDate(m.start)} → ${fmtSchedDate(m.finish)}${m.hasBase?(m.behind>0?' · '+m.behind+'d behind':m.behind<0?' · '+(-m.behind)+'d ahead':' · on baseline'):''}">
        <div class="ms-lbl">${esc(m.job.city||'Unknown')}${m.job.state?', '+esc(m.job.state):''}<span class="ms-wo">${esc(m.job.wo||'')}</span></div>
        <div class="ms-track">${tx>=0&&tx<=100?`<div class="ms-today-line" style="left:${tx.toFixed(2)}%"></div>`:''}<div class="ms-bar" style="left:${xp(m.start).toFixed(2)}%;width:${wp(m.start,m.finish).toFixed(2)}%;background:${col}"><div class="ms-bar-fill" style="width:${Math.min(100,m.pct)}%"></div><span class="ms-bar-lbl">${m.pct}%${m.behind>0?' · '+m.behind+'d behind':''}</span></div></div>
      </div>`;
    });
    h += '</div></div>';
    h += `<div class="rpt-note" style="margin-top:8px">${master.length} project${master.length===1?'':'s'} scheduled. Blue = in progress, green = complete, red = behind baseline. Click a row to open its schedule.</div>`;
  }
  h += '</div>';

  // VENDOR / CREW CONFLICTS

// ── AUDIT IMPORT ──
// Supplemental: reads a WO Audit-shaped sheet, keyed by WO # (matches against
// existing job.wo or job.srcJob). Stores a hint per WO. Does NOT touch
// job.stage, job.ck, or job.stageHistory - those stay manual.
function processAuditFile(inputEl){
  const f = inputEl.files && inputEl.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onerror = () => toast('Error reading audit file');
  reader.onload = function(e){
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      // Prefer a sheet whose name looks like an audit, else use the first one.
      const wantedNames = ['WO Audit','WorkOrders','Work Orders','Audit','Sheet1'];
      let sheet = null;
      for(const n of wantedNames){ if(wb.Sheets[n]){ sheet = wb.Sheets[n]; break; } }
      if(!sheet) sheet = wb.Sheets[wb.SheetNames[0]];
      if(!sheet) throw new Error('No usable sheet found in audit file');
      const rows = XLSX.utils.sheet_to_json(sheet);
      let matched = 0, unmatched = 0;
      const existingByWo = new Map();
      const existingBySrc = new Map();
      jobs.forEach(j => { if(j.wo) existingByWo.set(String(j.wo).trim(), j); if(j.srcJob) existingBySrc.set(String(j.srcJob).trim(), j); });
      const stamp = new Date().toISOString();
      rows.forEach(r => {
        // Audit ID column may be 'Source Job #' / 'WO #' / 'Job #'.
        const wo = String(r['WO #']||r['WO#']||r['WO Number']||'').trim();
        const sj = String(r['Source Job #']||r['Source Job#']||r['Job #']||r['Job#']||'').trim();
        const status = String(r['Status']||r['Current Status']||r['WO Status']||'').trim();
        const hrs = Number(r['Time in Status (hrs.)']||r['Time in Status (hrs)']||r['Status Hrs']||0) || null;
        // Extended capture: pull additional columns so the expanded panel view
        // has real data to render. Defensive against missing/renamed columns.
        const coord = String(r['Coordinator']||r['Coord']||r['Assigned To']||r['Operations Coordinator']||'').trim();
        const fm = String(r['FM']||r['Facility Manager']||r['Client FM']||r['Pilot FM']||'').trim();
        const lastNote = String(r['Notes']||r['Last Note Text']||r['Most Recent Note Text']||r['Note Detail']||'').trim();
        const lastNoteDate = String(r['Last Note Date']||r['Last Note']||r['Latest Note']||r['Most Recent Note']||'').trim();
        const nextOnsite = String(r['Next Onsite Date']||r['Next Onsite']||r['Scheduled Date']||r['Next Visit']||'').trim();
        const trade = String(r['Trade']||r['Service Trade']||r['Service Line']||r['Category']||'').trim();
        const age = Number(r['# Days']||r['Days']||r['Age']||r['Age (days)']||r['Days Open']||0) || null;
        const amount = Number(String(r['Approved Amount']||r['Approved $']||r['Approved']||r['Amount']||r['Total Approved']||r['NTE']||0).toString().replace(/[$,]/g,'')) || null;
        const key = wo || sj;
        if(!key || !status) return;
        // Try to match against an existing job. If WO column had a value, match
        // on WO; otherwise try src job; finally fall back to either index.
        let job = null;
        if(wo) job = existingByWo.get(wo) || existingBySrc.get(wo);
        if(!job && sj) job = existingBySrc.get(sj) || existingByWo.get(sj);
        if(job){
          auditByWo[job.wo || sj || key] = {
            status, statusHrs:hrs, importedAt:stamp, srcKey:key,
            coord, fm, lastNote, lastNoteDate, nextOnsite, trade, age, amount
          };
          matched++;
        } else {
          unmatched++;
        }
      });
      saveAudit();
      inputEl.value = '';
      render();
      toast(`Audit synced - ${matched} matched, ${unmatched} unmatched (no override)`);
    } catch(err){ toast('Audit import failed: '+err.message); console.error(err); }
  };
  reader.readAsArrayBuffer(f);
}

(function(){
  const dz=document.getElementById('drop-zone');
  const dzi=document.getElementById('xlfile-dz');
  const ov=document.getElementById('drag-overlay');
  dz.addEventListener('click',()=>dzi.click());
  dz.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='copy';dz.classList.add('over');});
  dz.addEventListener('dragleave',e=>{if(!dz.contains(e.relatedTarget))dz.classList.remove('over');});
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');processDropFiles(e.dataTransfer.files);});
  let n=0;
  document.addEventListener('dragenter',e=>{if(!e.dataTransfer||!e.dataTransfer.types.includes('Files'))return;n++;if(jobs.length>0)ov.classList.add('show');else dz.classList.add('over');});
  document.addEventListener('dragleave',e=>{n=Math.max(0,n-1);if(n===0){ov.classList.remove('show');dz.classList.remove('over');}});
  document.addEventListener('dragover',e=>{if(jobs.length>0)e.preventDefault();});
  document.addEventListener('drop',e=>{n=0;ov.classList.remove('show');dz.classList.remove('over');if(!jobs.length)return;e.preventDefault();processDropFiles(e.dataTransfer.files);});
})();

// PER-JOB CONSTRUCTION SCHEDULE (MS-Project-style)
// Template-seeded, auto-cascading from durations + predecessors (business days),
// with manual date overrides on individual tasks. Stored on job.schedule and
// persisted with the job. Opened from the Timeline (click a job) or the panel.
// ══════════════════════════════════════════════════════

function bizSnap(ds){ let d=new Date(ds+'T00:00:00'); while(!isWorkday(d))d.setDate(d.getDate()+1); return d.toISOString().slice(0,10); }
function bizAddDays(ds,n){ return n<=0?bizSnap(ds):bizAdd(ds,n); }
function bizSubDays(ds,n){ let d=new Date(ds+'T00:00:00'); for(let a=0;a<n;){ d.setDate(d.getDate()-1); if(isWorkday(d))a++; } while(!isWorkday(d))d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); }
// Working days from a (exclusive) to b (inclusive). bizDiff(a,a)=0.
function bizDiff(a,b){ if(!a||!b||b<=a) return 0; let d=new Date(a+'T00:00:00'); const end=new Date(b+'T00:00:00'); let n=0; while(d<end){ d.setDate(d.getDate()+1); if(isWorkday(d))n++; } return n; }

// Topological-ish fixpoint: recompute start/finish until stable. Manual override
// pins a task's start (and successors cascade from it). Summary tasks span all.
function computeSchedule(sched){
  if(!sched || !sched.tasks) return sched;
  const start0=bizSnap(sched.start||new Date().toISOString().slice(0,10));
  const byId={}; sched.tasks.forEach(t=>byId[t.id]=t);
  sched.tasks.forEach(t=>{ t._start=t._finish=null; });
  let changed=true,guard=0;
  while(changed&&guard++<400){ changed=false;
    sched.tasks.forEach(t=>{
      if(t.summary) return;
      let s;
      if(t.manualStart) s=bizSnap(t.manualStart);
      else if(!t.preds||!t.preds.length) s=start0;
      else { let cand=null,ready=true;
        t.preds.forEach(p=>{ const pt=byId[p.id]; if(!pt||pt._start==null||pt._finish==null){ready=false;return;}
          const type=p.type||'FS',lag=p.lag||0; let ps;
          if(type==='SS') ps=bizAddDays(pt._start,lag);
          else if(type==='FF') ps=bizSubDays(bizAddDays(pt._finish,lag),(t.dur||1)-1);
          else if(type==='SF') ps=bizSubDays(bizAddDays(pt._start,lag),(t.dur||1)-1);
          else ps=bizAddDays(pt._finish,1+lag); // FS
          if(cand==null||ps>cand) cand=ps;
        });
        if(!ready) return; s=cand;
      }
      const f=bizAddDays(s,(t.dur||1)-1);
      if(t._start!==s||t._finish!==f){ t._start=s; t._finish=f; changed=true; }
    });
  }
  const reg=sched.tasks.filter(t=>!t.summary&&t._start);
  // ── CPM backward pass: latest start/finish, total float, critical path ──
  if(reg.length){
    const projEF = reg.reduce((a,t)=>t._finish>a?t._finish:a, reg[0]._finish);
    // successors: for each task, which tasks list it as a predecessor (+type)
    const succ={}; reg.forEach(t=>succ[t.id]=[]);
    reg.forEach(t=>(t.preds||[]).forEach(p=>{ if(succ[p.id]) succ[p.id].push({t, type:p.type||'FS', lag:p.lag||0}); }));
    reg.forEach(t=>{ t._lf=null; t._ls=null; });
    let bchanged=true, bguard=0;
    while(bchanged && bguard++<400){ bchanged=false;
      reg.forEach(t=>{
        let lf;
        const sl=succ[t.id]||[];
        if(!sl.length){ lf=projEF; }
        else { let cand=null, ready=true;
          sl.forEach(({t:s,type,lag})=>{ if(s._ls==null){ready=false;return;}
            let c;
            if(type==='SS') c=bizAddDays(s._ls, (t.dur||1)-1); // t.LS>=s.LS → t.LF
            else if(type==='FF') c=s._lf; // finish together
            else if(type==='SF') c=s._lf;
            else c=bizSubDays(s._ls, 1+lag); // FS: t finishes 1 biz day before s.LS
            if(cand==null||c<cand) cand=c;
          });
          if(!ready) return; lf=cand;
        }
        const ls=bizSubDays(lf,(t.dur||1)-1);
        if(t._lf!==lf||t._ls!==ls){ t._lf=lf; t._ls=ls; bchanged=true; }
      });
    }
    reg.forEach(t=>{ t._float = bizDiff(t._start, t._ls); t._critical = (t._float<=0); });
  }
  if(reg.length){ const mn=reg.reduce((a,t)=>t._start<a?t._start:a,reg[0]._start); const mx=reg.reduce((a,t)=>t._finish>a?t._finish:a,reg[0]._finish);
    sched.tasks.filter(t=>t.summary).forEach(t=>{t._start=mn;t._finish=mx;t._critical=true;}); }
  return sched;
}

// Duration-weighted project % complete (0-100).
function scheduleProgress(sched){
  if(!sched||!sched.tasks) return 0;
  const reg=sched.tasks.filter(t=>!t.summary);
  let wsum=0, psum=0;
  reg.forEach(t=>{ const w=Math.max(1,t.dur||1); wsum+=w; psum+=w*(Math.min(100,Math.max(0,t.pct||0))); });
  return wsum? Math.round(psum/wsum) : 0;
}

function parsePreds(str){
  if(!str||!String(str).trim()) return [];
  return String(str).split(',').map(tok=>{ tok=tok.trim(); if(!tok) return null;
    const m=tok.match(/^(\d+)\s*(FS|SS|FF|SF)?\s*([+-]\s*\d+)?/i); if(!m) return null;
    return {id:parseInt(m[1],10), type:(m[2]||'FS').toUpperCase(), lag:m[3]?parseInt(m[3].replace(/\s/g,''),10):0};
  }).filter(Boolean);
}
function predsToStr(preds){ return (preds||[]).map(p=>p.id+(p.type&&p.type!=='FS'?p.type:'')+(p.lag?(p.lag>0?'+'+p.lag:String(p.lag)):'')).join(', '); }

// ── PHASE 5: holiday / non-working calendar (opt-in; applies to all schedules) ──
function usHolidays(y){
  const iso=d=>d.toISOString().slice(0,10);
  const nth=(month,weekday,n)=>{ let d=new Date(Date.UTC(y,month,1)),c=0; for(;;){ if(d.getUTCDay()===weekday){c++; if(c===n)break;} d.setUTCDate(d.getUTCDate()+1);} return d; };
  const last=(month,weekday)=>{ let d=new Date(Date.UTC(y,month+1,0)); while(d.getUTCDay()!==weekday)d.setUTCDate(d.getUTCDate()-1); return d; };
  const fixed=(m,day)=>new Date(Date.UTC(y,m,day));
  const thanks=nth(10,4,4); const dayAfter=new Date(thanks); dayAfter.setUTCDate(dayAfter.getUTCDate()+1);
  return [fixed(0,1),last(4,1),fixed(5,19),fixed(6,4),nth(8,1,1),thanks,dayAfter,fixed(11,25)].map(iso);
}
function loadUSHolidays(){
  const y0=new Date().getFullYear(); const set=new Set(scheduleHolidays);
  for(let y=y0;y<=y0+2;y++) usHolidays(y).forEach(h=>set.add(h));
  scheduleHolidays=[...set].sort(); saveHolidays();
  renderHolidays(); refreshScheduleAfterHolidays(); toast('US holidays loaded');
}
function refreshScheduleAfterHolidays(){ const job=getJob(schedJobId); if(job&&job.schedule) renderScheduleModal(job); }
function openHolidays(){ document.getElementById('hol-overlay').style.display='flex'; renderHolidays(); }

function addHoliday(ds){ if(!ds) return; if(scheduleHolidays.indexOf(ds)<0){ scheduleHolidays.push(ds); scheduleHolidays.sort(); saveHolidays(); renderHolidays(); refreshScheduleAfterHolidays(); } }
function removeHoliday(ds){ scheduleHolidays=scheduleHolidays.filter(h=>h!==ds); saveHolidays(); renderHolidays(); refreshScheduleAfterHolidays(); }
function clearHolidays(){ if(!scheduleHolidays.length||!confirm('Remove all '+scheduleHolidays.length+' holidays?')) return; scheduleHolidays=[]; saveHolidays(); renderHolidays(); refreshScheduleAfterHolidays(); }

// Baseline = frozen snapshot of the approved plan. Variance compares the live
// (current) computed schedule against it, so slips are visible per task and at
// the project finish.
function schedSetBaseline(){
  const job=getJob(schedJobId); if(!job||!job.schedule||!job.schedule.tasks.length) return;
  computeSchedule(job.schedule);
  const tasks={}; job.schedule.tasks.forEach(t=>{ if(!t.summary&&t._start) tasks[t.id]={start:t._start, finish:t._finish}; });
  const reg=job.schedule.tasks.filter(t=>!t.summary&&t._finish);
  const finish=reg.length?reg.reduce((a,t)=>t._finish>a?t._finish:a,reg[0]._finish):null;
  job.schedule.baseline={setAt:new Date().toISOString(), tasks, finish};
  saveJobs(); renderScheduleModal(job); toast('Baseline saved');
}
function schedClearBaseline(){
  const job=getJob(schedJobId); if(!job||!job.schedule) return;
  if(!confirm('Clear the saved baseline?')) return;
  delete job.schedule.baseline; saveJobs(); renderScheduleModal(job); toast('Baseline cleared');
}
// Signed working-day variance of current finish vs baseline (+ = behind).
function taskVariance(sched, t){
  if(!sched.baseline||!sched.baseline.tasks[t.id]||!t._finish) return null;
  const bf=sched.baseline.tasks[t.id].finish;
  if(t._finish>=bf) return bizDiff(bf, t._finish);
  return -bizDiff(t._finish, bf);
}

// ── PHASE 4: export the schedule to Excel and to a printable (PDF) sheet ──
function exportScheduleExcel(){
  const job=getJob(schedJobId); if(!job||!job.schedule||!job.schedule.tasks.length){ toast('Nothing to export'); return; }
  const sched=job.schedule; computeSchedule(sched);
  const hasBase=!!(sched.baseline&&sched.baseline.finish);
  const head=['ID','Task Name','Duration (days)','Start','Finish','Float (days)','% Complete'];
  if(hasBase) head.push('Variance (days)');
  head.push('Predecessors');
  const reg=sched.tasks.filter(t=>!t.summary&&t._finish);
  const projFinish=reg.length?reg.reduce((a,t)=>t._finish>a?t._finish:a,reg[0]._finish):'';
  const meta=[
    ['Broadway National - Project Schedule'],
    ['Job', (job.city||'')+(job.state?', '+job.state:'')],
    ['WO', job.wo||''],
    ['Project Start', sched.start||''],
    ['Projected Finish', projFinish],
    ['% Complete', scheduleProgress(sched)+'%'],
  ];
  if(hasBase) meta.push(['Baseline Finish', sched.baseline.finish]);
  meta.push([]);
  const rows=[head];
  sched.tasks.forEach(t=>{
    const r=[t.id, t.name, t.summary?'':(t.dur||1), t._start||'', t._finish||'', t.summary?'':(t._float==null?'':t._float), t.summary?scheduleProgress(sched):(t.pct||0)];
    if(hasBase){ const v=t.summary?'':taskVariance(sched,t); r.push(v==null?'':v); }
    r.push(t.summary?'':predsToStr(t.preds));
    rows.push(r);
  });
  const ws=XLSX.utils.aoa_to_sheet(meta.concat(rows));
  ws['!cols']=[{wch:6},{wch:42},{wch:14},{wch:12},{wch:12},{wch:12},{wch:12},{wch:14},{wch:18}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Schedule');
  XLSX.writeFile(wb, 'Schedule_'+((job.city||'job').replace(/[^a-z0-9]/gi,'_'))+'_'+new Date().toISOString().slice(0,10)+'.xlsx');
  toast('Schedule exported to Excel');
}

function printSchedule(){

  if(!allD.length){ toast('Nothing to print'); return; }

  const ps=new Date(mn+'T00:00:00'); ps.setDate(ps.getDate()-2);
  const pe=new Date(mx+'T00:00:00'); pe.setDate(pe.getDate()+2);
  const span=Math.max(1,(pe-ps)/86400000);
  const xp=d=>((new Date(d+'T00:00:00')-ps)/86400000/span*100);
  const wp=(a,b)=>Math.max(0.5,(new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000/span*100);

    const col=t.summary?'#1a5f3e':(t._critical?'#e74c3c':'#3498db');
    grows+=`<div class="gr"><div class="gl">${esc(t.name)}</div><div class="gt"><div class="gb" style="left:${xp(t._start).toFixed(2)}%;width:${wp(t._start,t._finish).toFixed(2)}%;background:${col}"></div></div></div>`;
  });
  const win=window.open('','_blank');
  if(!win){ toast('Allow pop-ups to print'); return; }
  win.document.write(`<!doctype html><html><head><title>Schedule - ${esc(job.city||'')}</title><style>
    body{font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;margin:22px;color:#1e293b}
    h1{font-size:17px;margin:0 0 2px;color:#1a5f3e} h2{font-size:13px;margin:18px 0 6px}
    .meta{font-size:12px;color:#475569;margin-bottom:14px}
    table{width:100%;border-collapse:collapse;font-size:11px}
    th{background:#1a5f3e;color:#fff;text-align:left;padding:5px 6px;font-size:10px}
    td{padding:4px 6px;border-bottom:1px solid #e2e8f0}
    tr.sum td{font-weight:600;background:#f0fdf4}
    tr.crit td:nth-child(2){color:#b91c1c;font-weight:600}
    .gr{display:flex;align-items:center;height:18px;border-bottom:1px solid #eee}
    .gl{width:230px;font-size:9px;overflow:hidden;white-space:nowrap;padding-right:8px;flex-shrink:0}
    .gt{flex:1;position:relative;height:100%}
    .gb{position:absolute;top:50%;transform:translateY(-50%);height:9px;border-radius:2px}
    @media print{button{display:none}}
  </style></head><body>
    <h1>Broadway National - Project Schedule</h1>
    <div class="meta"><b>${esc((job.city||'')+(job.state?', '+job.state:''))}</b> &nbsp;·&nbsp; WO ${esc(job.wo||'-')} &nbsp;·&nbsp; Start ${fmtSchedDate(sched.start)} &nbsp;·&nbsp; Finish ${fmtSchedDate(mx)} &nbsp;·&nbsp; ${scheduleProgress(sched)}% complete${hasBase?' &nbsp;·&nbsp; Baseline finish '+fmtSchedDate(sched.baseline.finish):''}</div>
    <table><thead><tr><th>ID</th><th>Task</th><th>Dur</th><th>Start</th><th>Finish</th><th>Float</th><th>%</th>${hasBase?'<th>Var</th>':''}<th>Predecessors</th></tr></thead><tbody>${trows}</tbody></table>
    <h2>Gantt</h2>${grows}
    <button onclick="window.print()" style="margin-top:16px;padding:8px 16px;cursor:pointer">Print / Save as PDF</button>
  </body></html>`);
  win.document.close();
  setTimeout(()=>{ try{win.focus(); win.print();}catch(e){} }, 400);

function schedSetStart(val){ const job=getJob(schedJobId); if(!job||!job.schedule) return; job.schedule.start=val; saveJobs(); renderScheduleModal(job); }
function schedEditTask(taskId, field, val){
  const job=getJob(schedJobId); if(!job||!job.schedule) return;
  const t=job.schedule.tasks.find(x=>x.id===taskId); if(!t) return;
  if(field==='name') t.name=val;
  else if(field==='dur') t.dur=Math.max(1, parseInt(val,10)||1);
  else if(field==='preds') t.preds=parsePreds(val);
  else if(field==='manualStart'){ if(val) t.manualStart=val; else delete t.manualStart; }
  else if(field==='pct') t.pct=Math.min(100, Math.max(0, parseInt(val,10)||0));
  else if(field==='vendor') t.vendor=val;
  saveJobs(); renderScheduleModal(job);
}
function schedPinTask(taskId){ const job=getJob(schedJobId); if(!job) return; const t=job.schedule.tasks.find(x=>x.id===taskId); if(!t) return; computeSchedule(job.schedule); t.manualStart=t._start; saveJobs(); renderScheduleModal(job); }
function schedClearPin(taskId){ const job=getJob(schedJobId); if(!job) return; const t=job.schedule.tasks.find(x=>x.id===taskId); if(t){ delete t.manualStart; saveJobs(); renderScheduleModal(job);} }
