function fmtSchedDate(ds){ if(!ds) return '-'; const d=new Date(ds+'T00:00:00'); return d.toLocaleDateString('en-US',{weekday:'short',month:'numeric',day:'numeric'}); }

function renderScheduleModal(job){
  const m=document.getElementById('sched-modal'); if(!m) return;
  // No schedule yet → template picker
  if(!jobHasSchedule(job)){
    let opts=Object.entries(SCHEDULE_TEMPLATES).map(([k,v])=>`<option value="${k}">${esc(v.label)}</option>`).join('');
    m.innerHTML=`<div class="sched-hdr"><div><div class="exp-eye">Schedule</div><div class="exp-title">${esc(job.city||'Job')}${job.state?', '+esc(job.state):''}</div><div class="exp-meta"><span>${esc(job.wo||'')}</span></div></div><button class="exp-close" onclick="minimizeSchedule()" title="Minimize">&#128469;</button><button class="exp-close" onclick="closeSchedule()" title="Close">&#10005;</button></div>
      <div class="sched-empty">
        <p style="margin-bottom:14px;color:var(--t2);font-size:13px">No schedule yet for this job. Start from a template, then add, edit, or delete tasks.</p>
        <div style="display:flex;gap:8px;align-items:center;justify-content:center">
          <select id="sched-tpl-pick" class="rpt-editor-input" style="min-width:220px">${opts}</select>
          <button class="btn btn-g" onclick="applyScheduleTemplate(schedJobId, document.getElementById('sched-tpl-pick').value)">Apply Template</button>
        </div>
      </div>`;
    return;
  }
  const sched=job.schedule;
  computeSchedule(sched);
  const tasks=sched.tasks.slice();
  // Time span for the gantt
  const allDates=[]; tasks.forEach(t=>{ if(t._start)allDates.push(t._start); if(t._finish)allDates.push(t._finish); });
  const today=new Date().toISOString().slice(0,10);
  let mn=allDates.length?allDates.reduce((a,b)=>b<a?b:a):today, mx=allDates.length?allDates.reduce((a,b)=>b>a?b:a):today;
  const ps=new Date(mn+'T00:00:00'); ps.setDate(ps.getDate()-3);
  const pe=new Date(mx+'T00:00:00'); pe.setDate(pe.getDate()+3);
  const span=Math.max(1,(pe-ps)/86400000);
  const xp=d=>((new Date(d+'T00:00:00')-ps)/86400000/span*100);
  const wpct=(a,b)=>Math.max(0.4,(new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000/span*100);
  // month ticks
  let months=''; const dm=new Date(ps); dm.setDate(1);
  while(dm<=pe){ const l=((dm-ps)/86400000/span*100); if(l>=0&&l<=100) months+=`<div class="sg-month" style="left:${l.toFixed(2)}%">${dm.toLocaleString('default',{month:'short'})} ${String(dm.getFullYear()).slice(2)}</div>`; dm.setMonth(dm.getMonth()+1); }
  const todayX=xp(today);

  const projPct = scheduleProgress(sched);
  const critCount = tasks.filter(t=>!t.summary && t._critical).length;
  const hasBase = !!(sched.baseline && sched.baseline.finish);
  // project finish + variance vs baseline
  const regF = tasks.filter(t=>!t.summary&&t._finish);
  const curFinish = regF.length?regF.reduce((a,t)=>t._finish>a?t._finish:a,regF[0]._finish):null;
  let baseVarStr='';
  if(hasBase && curFinish){
    const v = curFinish>=sched.baseline.finish ? bizDiff(sched.baseline.finish,curFinish) : -bizDiff(curFinish,sched.baseline.finish);
    baseVarStr = v===0 ? `<span><strong style="color:var(--green-d)">on baseline</strong></span>`
      : `<span><strong style="color:${v>0?'var(--red)':'var(--green)'}">${v>0?v+'d behind':(-v)+'d ahead of'} baseline</strong></span>`;
  }
  // Header
  let tplOpts=Object.entries(allSchedTemplates()).map(([k,v])=>`<option value="${k}" ${sched.tplKey===k?'selected':''}>${esc(v.label)}</option>`).join('');
  let h=`<div class="sched-hdr">
    <div><div class="exp-eye">Schedule</div><div class="exp-title">${esc(job.city||'Job')}${job.state?', '+esc(job.state):''}</div><div class="exp-meta"><span>${esc(job.wo||'')}</span> <span>${tasks.filter(t=>!t.summary).length} tasks</span> <span><strong style="color:var(--green-d)">${projPct}%</strong> complete</span> <span><strong style="color:var(--red)">${critCount}</strong> on critical path</span> ${baseVarStr}</div></div>
    <div class="sched-controls">
      <label class="sched-ctl-lbl">Project Start</label>
      <input type="date" class="rpt-editor-input" value="${sched.start||''}" onchange="schedSetStart(this.value)">
      <button class="btn btn-ghost" onclick="schedAddTask()" style="font-size:10px;padding:5px 10px">+ Task</button>
      ${hasBase?`<button class="btn btn-ghost" style="font-size:10px;padding:5px 10px" onclick="schedClearBaseline()" title="Baseline set ${new Date(sched.baseline.setAt).toLocaleDateString()}">Clear Baseline</button>`:`<button class="btn btn-ghost" style="font-size:10px;padding:5px 10px" onclick="schedSetBaseline()" title="Freeze the current plan as the baseline">&#9873; Set Baseline</button>`}
      <select class="rpt-editor-input" id="sched-reapply" style="font-size:10px"><option value="">Load template…</option>${tplOpts}</select>
      <button class="btn btn-ghost" style="font-size:10px;padding:5px 10px" onclick="if(document.getElementById('sched-reapply').value)applyScheduleTemplate(schedJobId,document.getElementById('sched-reapply').value)">Load</button>
      <button class="btn btn-ghost" style="font-size:10px;padding:5px 10px" onclick="saveAsTemplate()" title="Save current tasks as a reusable template">&#128190; Save as Template</button>
      <button class="btn btn-ghost" style="font-size:10px;padding:5px 10px" onclick="exportScheduleExcel()" title="Export schedule to Excel">&#8595; Excel</button>
      <button class="btn btn-ghost" style="font-size:10px;padding:5px 10px" onclick="printSchedule()" title="Print / Save as PDF">&#128424; Print</button>
      <button class="btn btn-ghost" style="font-size:10px;padding:5px 10px" onclick="openHolidays()" title="Manage non-working days">&#127359; Holidays</button>
      <button class="exp-close" onclick="minimizeSchedule()" title="Minimize">&#128469;</button>
      <button class="exp-close" onclick="closeSchedule()" title="Close">&#10005;</button>
    </div>
  </div>`;

  const ROW=28;
  // Table rows
  let rows='';
  tasks.forEach((t,i)=>{
    const pinned=!!t.manualStart;
    const fl = t._float==null?'':t._float;
    rows+=`<div class="sg-trow${t.summary?' summary':''}${(!t.summary&&t._critical)?' critical':''}" style="height:${ROW}px">
      <div class="sg-c sg-id">${t.id}</div>
      <div class="sg-c sg-name">${(!t.summary&&t._critical)?'<span class="sg-crit-dot" title="On critical path"></span>':''}<input value="${esc(t.name)}" onchange="schedEditTask(${t.id},'name',this.value)" ${t.summary?'style="font-weight:600"':''}></div>
      <div class="sg-c sg-dur"><input type="number" min="1" value="${t.dur||1}" onchange="schedEditTask(${t.id},'dur',this.value)" ${t.summary?'disabled':''}></div>
      <div class="sg-c sg-date">${t.summary?fmtSchedDate(t._start):`<span class="sg-startwrap${pinned?' pinned':''}">${pinned?`<input type="date" value="${t.manualStart}" onchange="schedEditTask(${t.id},'manualStart',this.value)"><button class="sg-pin" title="Clear override" onclick="schedClearPin(${t.id})">&#10005;</button>`:`${fmtSchedDate(t._start)}<button class="sg-pin" title="Pin / override date" onclick="schedPinTask(${t.id})">&#128204;</button>`}</span>`}</div>
      <div class="sg-c sg-date">${fmtSchedDate(t._finish)}</div>
      <div class="sg-c sg-float${(!t.summary&&t._critical)?' crit':''}">${t.summary?'':(fl===''?'-':(fl+'d'))}</div>
      <div class="sg-c sg-pct">${t.summary?(projPct+'%'):`<input type="number" min="0" max="100" value="${t.pct||0}" onchange="schedEditTask(${t.id},'pct',this.value)">`}</div>
      ${hasBase?`<div class="sg-c sg-var">${(()=>{ if(t.summary){ const v=baseVarStr?(curFinish>=sched.baseline.finish?bizDiff(sched.baseline.finish,curFinish):-bizDiff(curFinish,sched.baseline.finish)):null; return v==null?'-':(v>0?'<span class="var-late">+'+v+'d</span>':v<0?'<span class="var-early">'+v+'d</span>':'<span class="var-on">0</span>'); } const vv=taskVariance(sched,t); return vv==null?'-':(vv>0?'<span class="var-late">+'+vv+'d</span>':vv<0?'<span class="var-early">'+vv+'d</span>':'<span class="var-on">0</span>'); })()}</div>`:''}
      <div class="sg-c sg-crew">${t.summary?'':`<input list="sched-vendors" value="${esc(t.vendor||'')}" placeholder="-" onchange="schedEditTask(${t.id},'vendor',this.value)">`}</div>
      <div class="sg-c sg-preds">${t.summary?'':`<input value="${esc(predsToStr(t.preds))}" placeholder="-" onchange="schedEditTask(${t.id},'preds',this.value)">`}</div>
      <div class="sg-c sg-del">${t.summary?'':`<button onclick="schedDeleteTask(${t.id})" title="Delete task">&#10005;</button>`}</div>
    </div>`;
  });

  // Gantt bars
  let bars='';
  tasks.forEach((t,i)=>{
    if(!t._start||!t._finish) return;
    const y=i*ROW;
    if(t.summary){
      bars+=`<div class="sg-bar-row" style="top:${y}px;height:${ROW}px"><div class="sg-summary-bar" style="left:${xp(t._start).toFixed(2)}%;width:${wpct(t._start,t._finish).toFixed(2)}%"></div></div>`;
    } else {
      const dur=(new Date(t._finish+'T00:00:00')-new Date(t._start+'T00:00:00'))/86400000;
      const isMile=!!t.milestone;
      const base = (sched.baseline && sched.baseline.tasks[t.id]) ? sched.baseline.tasks[t.id] : null;
      const ghost = base ? `<div class="sg-baseline" style="left:${xp(base.start).toFixed(2)}%;width:${wpct(base.start,base.finish).toFixed(2)}%" title="Baseline: ${fmtSchedDate(base.start)} → ${fmtSchedDate(base.finish)}"></div>` : '';
      bars+=`<div class="sg-bar-row" style="top:${y}px;height:${ROW}px" id="sgrow-${t.id}">
        ${ghost}
        ${isMile?`<div class="sg-milestone" style="left:${xp(t._start).toFixed(2)}%" title="${esc(t.name)}: ${fmtSchedDate(t._start)}"></div>`
        :`<div class="sg-bar${t.manualStart?' pinned':''}${t._critical?' critical':''}" id="gbar-${t.id}" style="left:${xp(t._start).toFixed(2)}%;width:${wpct(t._start,t._finish).toFixed(2)}%" title="${esc(t.name)}: ${fmtSchedDate(t._start)} → ${fmtSchedDate(t._finish)}${t._float!=null?' · float '+t._float+'d':''}${t.pct?' · '+t.pct+'% done':''}" onclick="selJob('${job.id}')">${t.pct?`<div class="sg-bar-prog" style="width:${Math.min(100,t.pct)}%"></div>`:''}<span class="sg-bar-lbl">${esc(t.name)}</span></div>`}
      </div>`;
    }
  });
  const totalH=tasks.length*ROW;

  h+=`<div class="sched-body">
    <datalist id="sched-vendors">${[...new Set(jobs.map(j=>j.vendor).filter(Boolean))].map(v=>`<option value="${esc(v)}">`).join('')}</datalist>
    <div class="sched-table">
      <div class="sg-thead"><div class="sg-c sg-id">ID</div><div class="sg-c sg-name">Task Name</div><div class="sg-c sg-dur">Dur</div><div class="sg-c sg-date">Start</div><div class="sg-c sg-date">Finish</div><div class="sg-c sg-float">Float</div><div class="sg-c sg-pct">%</div>${hasBase?'<div class="sg-c sg-var">Var</div>':''}<div class="sg-c sg-crew">Crew</div><div class="sg-c sg-preds">Pred.</div><div class="sg-c sg-del"></div></div>
      <div class="sg-tbody">${rows || '<div class="sched-emptyrow">No tasks yet. Click <strong>+ Task</strong> to add one, or <strong>Load template</strong> to start from a prebuilt schedule.</div>'}</div>
    </div>
    <div class="sched-gantt" id="sched-gantt">
      <div class="sg-axis">${months}${todayX>=0&&todayX<=100?`<div class="sg-today" style="left:${todayX.toFixed(2)}%"><span>Today</span></div>`:''}</div>
      <div class="sg-bars" style="height:${totalH}px">
        ${todayX>=0&&todayX<=100?`<div class="sg-today-line" style="left:${todayX.toFixed(2)}%"></div>`:''}
        <svg class="sg-arrows" id="sg-arrows" width="100%" height="${totalH}" style="position:absolute;inset:0;pointer-events:none;overflow:visible"></svg>
        ${bars}
      </div>
    </div>
  </div>`;
  m.innerHTML=h;
  setTimeout(drawScheduleArrows, 0);
}

// Dependency arrows drawn in pixel space from measured bar positions (FS = pred
// right → succ left). Skipped silently where layout isn't available (e.g. tests).
function drawScheduleArrows(){
  const job=getJob(schedJobId); if(!job||!job.schedule) return;
  const svg=document.getElementById('sg-arrows'); const bars=document.getElementById('sg-bars')||document.querySelector('.sg-bars'); const wrap=document.querySelector('.sched-gantt');
  if(!svg||!bars) return;
  const base=bars.getBoundingClientRect(); if(!base.width) return;
  const byId={}; job.schedule.tasks.forEach(t=>byId[t.id]=t);
  let paths='';
  job.schedule.tasks.forEach(t=>{
    if(t.summary||!t.preds) return;
    const tb=document.getElementById('gbar-'+t.id)||document.querySelector('#sgrow-'+t.id+' .sg-milestone'); if(!tb) return;
    const tr=tb.getBoundingClientRect();
    const tx=tr.left-base.left, ty=tr.top-base.top+tr.height/2;
    t.preds.forEach(p=>{
      const pb=document.getElementById('gbar-'+p.id)||document.querySelector('#sgrow-'+p.id+' .sg-milestone'); if(!pb) return;
      const pr=pb.getBoundingClientRect();
      const px=pr.right-base.left, py=pr.top-base.top+pr.height/2;
      const midx=Math.max(px+8, tx-10);
      paths+=`<path d="M${px},${py} H${midx} V${ty} H${tx}" fill="none" stroke="#94a3b8" stroke-width="1.2"/>`;
      paths+=`<path d="M${tx-5},${ty-3} L${tx},${ty} L${tx-5},${ty+3}" fill="none" stroke="#94a3b8" stroke-width="1.2"/>`;
    });
  });
  svg.innerHTML=paths;
}


// ══════════════════════════════════════════════════════
// PHASE 6: CLOSEOUT SUITE (per-job punch list, inspections, closeout docs)
// ══════════════════════════════════════════════════════
const CLOSEOUT_DOCS=[
  {key:'asbuilt',label:'As-Built Drawings'},
  {key:'warranty',label:'Warranties'},
  {key:'coi',label:'Certificates of Insurance (COI)'},
  {key:'om',label:'O&M Manuals'},
  {key:'permits',label:'Permits Closed'},
  {key:'signoff',label:'Client Sign-Off'},
  {key:'invoice',label:'Final Invoice Submitted'},
];
// ── NOTES THREAD (Umbrava-style timestamped, typed communication log) ──
// Backward compatible: job.notes (Scope of Work) is untouched. The thread lives
// in job.noteLog = [{id, ts(ISO), type, text, pinned}]. Legacy jobs get [].
const NOTE_TYPES=['Internal','Vendor','Client','Recap','Action','Proposal Approved'];
const NOTE_COLORS={Internal:'#64748b',Vendor:'#0891b2',Client:'#7c3aed',Recap:'#1a5f3e',Action:'#d97706','Proposal Approved':'#059669'};
let notesJobId=null;
function ensureNoteLog(job){ if(!Array.isArray(job.noteLog)) job.noteLog=[]; return job.noteLog; }
// Latest note timestamp (the staleness signal) + count.
function noteSummary(job){ const log=Array.isArray(job&&job.noteLog)?job.noteLog:[]; if(!log.length) return {count:0,lastTs:null,days:null}; const last=log.reduce((a,n)=>new Date(n.ts)>new Date(a.ts)?n:a); const days=Math.floor((Date.now()-new Date(last.ts).getTime())/86400000); return {count:log.length,lastTs:last.ts,days}; }
function relTime(ts){ if(!ts) return ''; const ms=Date.now()-new Date(ts).getTime(); const m=Math.floor(ms/60000),h=Math.floor(ms/3600000),d=Math.floor(ms/86400000); if(m<1) return 'just now'; if(m<60) return m+'m ago'; if(h<24) return h+'h ago'; if(d<30) return d+'d ago'; return new Date(ts).toLocaleDateString(); }
function openNotes(jobId){ const job=getJob(jobId); if(!job) return; notesJobId=jobId; ensureNoteLog(job); document.getElementById('notes-overlay').style.display='flex'; renderNotes(job); setTimeout(()=>{const t=document.getElementById('note-text'); if(t)t.focus();},60); }
function closeNotes(){ document.getElementById('notes-overlay').style.display='none'; notesJobId=null; renderContent(); }
function addNote(){
  const job=getJob(notesJobId); if(!job) return;
  const txt=document.getElementById('note-text').value.trim(); if(!txt){ document.getElementById('note-text').focus(); return; }
  const type=document.getElementById('note-type').value; const pin=document.getElementById('note-pin').checked;
  ensureNoteLog(job).push({id:uid(), ts:new Date().toISOString(), type, text:txt, pinned:pin});
  saveJobs(); renderNotes(job);
}
function toggleNotePin(id){ const job=getJob(notesJobId); if(!job) return; const n=job.noteLog.find(x=>x.id===id); if(n){ n.pinned=!n.pinned; saveJobs(); renderNotes(job); } }
function delNote(id){ const job=getJob(notesJobId); if(!job) return; if(!confirm('Delete this note?')) return; job.noteLog=job.noteLog.filter(x=>x.id!==id); saveJobs(); renderNotes(job); }
function renderNotes(job){
  const m=document.getElementById('notes-modal'); if(!m) return;
  const log=ensureNoteLog(job);
  const sum=noteSummary(job);
  // Pinned first, then newest-first.
  const sorted=[...log].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0) || new Date(b.ts)-new Date(a.ts));
  let h=`<div class="sched-hdr" style="padding:14px 20px">
    <div><div class="exp-eye">Notes</div><div class="exp-title">${esc(job.city||'Job')}${job.state?', '+esc(job.state):''}</div>
      <div class="exp-meta"><span>${esc(job.wo||'')}</span> <span><strong>${sum.count}</strong> note${sum.count===1?'':'s'}</span> ${sum.lastTs?`<span>Last note ${relTime(sum.lastTs)}</span>`:''}</div></div>
    <button class="exp-close" onclick="closeNotes()" title="Close">&#10005;</button>
  </div><div class="closeout-body">`;
  // Composer
  h+=`<div class="note-composer">
    <div class="note-comp-row">
      <select id="note-type" class="note-type-sel">${NOTE_TYPES.map(t=>`<option value="${t}"${t==='Recap'?' selected':''}>${t}</option>`).join('')}</select>
      <label class="note-pin-lbl"><input type="checkbox" id="note-pin"> Pin to top</label>
    </div>
    <textarea id="note-text" class="note-text" placeholder="Add a note - vendor update, client approval, or a Recap (current status / next step / blocker)…" onkeydown="if((event.metaKey||event.ctrlKey)&&event.key==='Enter')addNote()"></textarea>
    <div class="note-comp-actions"><span class="note-hint">Tip: pin a Recap to keep current status / next step / blocker at the top.</span><button class="btn btn-g" onclick="addNote()">Add Note</button></div>
  </div>`;
  // Thread
  if(!sorted.length){ h+='<div class="rpt-empty" style="margin:0 4px">No notes yet.</div>'; }
  else {
    h+='<div class="note-thread">';
    sorted.forEach(n=>{ const tc=NOTE_COLORS[n.type]||'#64748b';
      h+=`<div class="note-item${n.pinned?' pinned':''}">
        <div class="note-meta">
          <span class="note-tag" style="background:${tc}1f;color:${tc}">${esc(n.type)}</span>
          ${n.pinned?'<span class="note-pin-ico" title="Pinned">&#128204;</span>':''}
          <span class="note-ts">${expFmtDateTime(n.ts)}</span>
          <span class="note-actions">
            <button onclick="toggleNotePin('${n.id}')">${n.pinned?'Unpin':'Pin'}</button>
            <button onclick="delNote('${n.id}')" title="Delete">&#10005;</button>
          </span>
        </div>
        <div class="note-body">${esc(n.text).replace(/\n/g,'<br>')}</div>
      </div>`; });
    h+='</div>';
  }
  h+='</div>';
  m.innerHTML=h;
}

let closeoutJobId=null;
function ensureCloseout(job){ if(!job.closeout)job.closeout={}; const c=job.closeout; if(!c.punch)c.punch=[]; if(!c.inspections)c.inspections=[]; if(!c.docs)c.docs={}; return c; }
function closeoutReady(job){ if(!job.closeout) return null; const c=job.closeout; const op=c.punch.filter(p=>p.status!=='Done').length; const fi=c.inspections.filter(i=>i.result==='Fail').length; const dd=CLOSEOUT_DOCS.filter(d=>c.docs[d.key]).length; return {openPunch:op, failedInsp:fi, docsDone:dd, docsTotal:CLOSEOUT_DOCS.length, complete: op===0&&fi===0&&dd===CLOSEOUT_DOCS.length}; }

function openCloseout(jobId){ const job=getJob(jobId); if(!job) return; closeoutJobId=jobId; ensureCloseout(job); document.getElementById('closeout-overlay').style.display='flex'; renderCloseout(job); }
function closeCloseout(){ document.getElementById('closeout-overlay').style.display='none'; closeoutJobId=null; renderContent(); }

function coAddPunch(){ const job=getJob(closeoutJobId); const c=ensureCloseout(job); c.punch.push({id:'p'+Date.now(),item:'',location:'',vendor:job.vendor||'',status:'Open'}); saveJobs(); renderCloseout(job); }
function coEditPunch(id,f,v){ const job=getJob(closeoutJobId); const c=ensureCloseout(job); const p=c.punch.find(x=>x.id===id); if(p){p[f]=v; saveJobs(); renderCloseout(job);} }
function coDelPunch(id){ const job=getJob(closeoutJobId); const c=ensureCloseout(job); c.punch=c.punch.filter(x=>x.id!==id); saveJobs(); renderCloseout(job); }
function coAddInsp(){ const job=getJob(closeoutJobId); const c=ensureCloseout(job); c.inspections.push({id:'i'+Date.now(),name:'',date:'',result:'Pending',reinspectDate:''}); saveJobs(); renderCloseout(job); }
function coEditInsp(id,f,v){ const job=getJob(closeoutJobId); const c=ensureCloseout(job); const it=c.inspections.find(x=>x.id===id); if(it){it[f]=v; if(f==='result'&&v!=='Fail') it.reinspectDate=''; saveJobs(); renderCloseout(job);} }
function coDelInsp(id){ const job=getJob(closeoutJobId); const c=ensureCloseout(job); c.inspections=c.inspections.filter(x=>x.id!==id); saveJobs(); renderCloseout(job); }
function coToggleDoc(key){ const job=getJob(closeoutJobId); const c=ensureCloseout(job); c.docs[key]=c.docs[key]?null:new Date().toISOString().slice(0,10); saveJobs(); renderCloseout(job); }

function renderCloseout(job){
  const m=document.getElementById('closeout-modal'); if(!m) return;
  const c=ensureCloseout(job); const r=closeoutReady(job);
  let h=`<div class="sched-hdr" style="padding:14px 20px">
    <div><div class="exp-eye">Closeout</div><div class="exp-title">${esc(job.city||'Job')}${job.state?', '+esc(job.state):''}</div>
      <div class="exp-meta"><span>${esc(job.wo||'')}</span> <span><strong style="color:${r.openPunch?'var(--amber)':'var(--green-d)'}">${r.openPunch}</strong> open punch</span> <span><strong style="color:${r.failedInsp?'var(--red)':'var(--t2)'}">${r.failedInsp}</strong> failed insp.</span> <span><strong style="color:${r.docsDone===r.docsTotal?'var(--green-d)':'var(--t2)'}">${r.docsDone}/${r.docsTotal}</strong> docs</span> ${r.complete?'<span class="co-ready">&#10003; Ready to close</span>':''}</div></div>
    <button class="exp-close" onclick="closeCloseout()">&#10005;</button>
  </div><div class="closeout-body">`;

  // Punch list
  h+=`<div class="co-sect"><div class="co-sect-hdr">Punch List <button class="btn btn-ghost co-add" onclick="coAddPunch()">+ Item</button></div>`;
  if(!c.punch.length){ h+='<div class="rpt-empty">No punch items.</div>'; }
  else { h+='<table class="co-table"><thead><tr><th>Item</th><th>Location</th><th>Responsible</th><th>Status</th><th></th></tr></thead><tbody>';
    c.punch.forEach(p=>{ const done=p.status==='Done';
      h+=`<tr class="${done?'co-done':''}"><td><input value="${esc(p.item)}" placeholder="Describe defect…" onchange="coEditPunch('${p.id}','item',this.value)"></td>
        <td><input value="${esc(p.location)}" placeholder="-" onchange="coEditPunch('${p.id}','location',this.value)"></td>
        <td><input value="${esc(p.vendor)}" placeholder="-" onchange="coEditPunch('${p.id}','vendor',this.value)"></td>
        <td><select onchange="coEditPunch('${p.id}','status',this.value)">${['Open','In Progress','Done'].map(s=>`<option ${p.status===s?'selected':''}>${s}</option>`).join('')}</select></td>
        <td class="co-del"><button onclick="coDelPunch('${p.id}')" title="Delete">&#10005;</button></td></tr>`; });
    h+='</tbody></table>'; }
  h+='</div>';

  // Inspections
  h+=`<div class="co-sect"><div class="co-sect-hdr">Inspections <button class="btn btn-ghost co-add" onclick="coAddInsp()">+ Inspection</button></div>`;
  if(!c.inspections.length){ h+='<div class="rpt-empty">No inspections logged.</div>'; }
  else { h+='<table class="co-table"><thead><tr><th>Inspection</th><th>Date</th><th>Result</th><th>Re-inspection</th><th></th></tr></thead><tbody>';
    c.inspections.forEach(it=>{ const fail=it.result==='Fail', pass=it.result==='Pass';
      h+=`<tr class="${fail?'co-fail':pass?'co-pass':''}"><td><input value="${esc(it.name)}" placeholder="e.g. Final CO" onchange="coEditInsp('${it.id}','name',this.value)"></td>
        <td><input type="date" value="${it.date||''}" onchange="coEditInsp('${it.id}','date',this.value)"></td>
        <td><select onchange="coEditInsp('${it.id}','result',this.value)">${['Pending','Pass','Fail'].map(s=>`<option ${it.result===s?'selected':''}>${s}</option>`).join('')}</select></td>
        <td>${fail?`<input type="date" value="${it.reinspectDate||''}" onchange="coEditInsp('${it.id}','reinspectDate',this.value)">`:'<span class="co-na">-</span>'}</td>
        <td class="co-del"><button onclick="coDelInsp('${it.id}')" title="Delete">&#10005;</button></td></tr>`; });
    h+='</tbody></table>'; }
  h+='</div>';

  // Closeout docs
  h+=`<div class="co-sect"><div class="co-sect-hdr">Closeout Documents</div><div class="co-docs">`;
  CLOSEOUT_DOCS.forEach(dd=>{ const date=c.docs[dd.key];
    h+=`<label class="co-doc${date?' done':''}"><input type="checkbox" ${date?'checked':''} onchange="coToggleDoc('${dd.key}')"><span class="co-doc-lbl">${esc(dd.label)}</span>${date?`<span class="co-doc-date">${new Date(date+'T00:00:00').toLocaleDateString()}</span>`:''}</label>`; });
  h+='</div></div>';

  h+='</div>';
  m.innerHTML=h;
}


// ══════════════════════════════════════════════════════
// PHASE 7: PROJECT CONTROLS - submittals, RFIs, change orders, permits
// ══════════════════════════════════════════════════════
let logsJobId=null;
function ensureLogs(job){ if(!job.logs)job.logs={}; const L=job.logs; if(!L.submittals)L.submittals=[]; if(!L.rfis)L.rfis=[]; if(!L.cos)L.cos=[]; if(!L.permits)L.permits=[]; if(!L.vendorPOs)L.vendorPOs=[]; if(!L.supplierPOs)L.supplierPOs=[]; return L; }
function daysUntil(ds){ if(!ds) return null; const t=new Date(); t.setHours(0,0,0,0); return Math.round((new Date(ds+'T00:00:00')-t)/86400000); }
function permitRisk(p){ if(p.status==='Closed') return null; if(p.status!=='Issued'){ if(p.status==='Expired') return 'expired'; }
  const du=daysUntil(p.expiration); if(du==null) return null; if(du<0) return 'expired'; if(du<=30) return 'expiring'; return null; }
function logsSummary(job){ if(!job.logs) return null; const L=job.logs;
  return { openRFI:L.rfis.filter(r=>r.status==='Open').length,
    pendSub:L.submittals.filter(s=>s.status!=='Approved'&&s.status!=='Rejected').length,
    pendCO:L.cos.filter(c=>c.status==='Pending').length,
    coApproved:L.cos.filter(c=>c.status==='Approved').reduce((a,c)=>a+(parseFloat(c.amount)||0),0),
    permitRisk:L.permits.filter(p=>permitRisk(p)).length }; }

function openLogs(jobId){ const job=getJob(jobId); if(!job) return; logsJobId=jobId; ensureLogs(job); document.getElementById('logs-overlay').style.display='flex'; renderLogs(job); }
function closeLogs(){ document.getElementById('logs-overlay').style.display='none'; logsJobId=null; renderContent(); }

function lgAdd(kind){ const job=getJob(logsJobId); const L=ensureLogs(job); const id=kind[0]+Date.now();
  if(kind==='submittals') L.submittals.push({id,item:'',ref:'',status:'Draft',submitted:'',returned:''});
  else if(kind==='rfis') L.rfis.push({id,subject:'',status:'Open',submitted:new Date().toISOString().slice(0,10),answered:''});
  else if(kind==='cos') L.cos.push({id,desc:'',amount:'',status:'Pending',date:new Date().toISOString().slice(0,10)});
  else if(kind==='permits') L.permits.push({id,type:'',number:'',status:'Not Applied',issued:'',expiration:''});
  else if(kind==='vendorPOs') L.vendorPOs.push({id,party:'',nte:'',scope:'',date:'',status:'Open'});
  else if(kind==='supplierPOs') L.supplierPOs.push({id,party:'',nte:'',scope:'',date:'',status:'Open'});
  saveJobs(); renderLogs(job); }
function lgEdit(kind,id,f,v){ const job=getJob(logsJobId); const L=ensureLogs(job); const it=L[kind].find(x=>x.id===id); if(it){it[f]=v; saveJobs(); renderLogs(job);} }
function finEdit(f,v){ const job=getJob(logsJobId); if(!job.fin)job.fin={}; job.fin[f]=v; saveJobs(); renderLogs(job); }
function lgDel(kind,id){ const job=getJob(logsJobId); const L=ensureLogs(job); L[kind]=L[kind].filter(x=>x.id!==id); saveJobs(); renderLogs(job); }

function sel(kind,id,f,cur,opts){ return `<select onchange="lgEdit('${kind}','${id}','${f}',this.value)">${opts.map(o=>`<option ${cur===o?'selected':''}>${o}</option>`).join('')}</select>`; }
function inp(kind,id,f,val,ph,type){ return `<input ${type?`type="${type}"`:''} value="${esc(val||'')}" placeholder="${ph||''}" onchange="lgEdit('${kind}','${id}','${f}',this.value)">`; }

function renderLogs(job){
  const m=document.getElementById('logs-modal'); if(!m) return;
  const L=ensureLogs(job); const s=logsSummary(job);
  let h=`<div class="sched-hdr" style="padding:14px 20px">
    <div><div class="exp-eye">Project Controls</div><div class="exp-title">${esc(job.city||'Job')}${job.state?', '+esc(job.state):''}</div>
      <div class="exp-meta"><span>${esc(job.wo||'')}</span> <span><strong style="color:${s.openRFI?'var(--amber)':'var(--t2)'}">${s.openRFI}</strong> open RFI</span> <span><strong>${s.pendSub}</strong> pending submittals</span> <span><strong>${s.pendCO}</strong> pending CO${s.coApproved?` · $${s.coApproved.toLocaleString()} appr.`:''}</span> <span><strong style="color:${s.permitRisk?'var(--red)':'var(--t2)'}">${s.permitRisk}</strong> permit at-risk</span></div></div>
    <button class="exp-close" onclick="closeLogs()">&#10005;</button>
  </div><div class="closeout-body">`;

  // Budget vs. Actual
  const F=jobFinance(job);
  const committed = [...(L.vendorPOs||[]),...(L.supplierPOs||[])].filter(p=>p.status!=='Canceled').reduce((a,p)=>a+(parseFloat(p.nte)||0),0);
  h+=`<div class="co-sect"><div class="co-sect-hdr">Budget vs. Actual</div>
    <div class="fin-grid">
      <div class="fin-cell"><label>Original Contract</label><div class="fin-in">$<input type="number" value="${(job.fin&&job.fin.contract)||''}" placeholder="0" onchange="finEdit('contract',this.value)"></div></div>
      <div class="fin-cell"><label>Approved COs</label><div class="fin-ro">$${F.approvedCO.toLocaleString()}</div></div>
      <div class="fin-cell"><label>Revised Contract</label><div class="fin-ro strong">$${F.revised.toLocaleString()}</div></div>
      <div class="fin-cell"><label>Committed (NTE)</label><div class="fin-ro strong" style="color:${committed>F.revised&&F.revised?'var(--red)':'var(--t1)'}">$${committed.toLocaleString()}</div></div>
      <div class="fin-cell"><label>Actual Cost</label><div class="fin-in">$<input type="number" value="${(job.fin&&job.fin.cost)||''}" placeholder="0" onchange="finEdit('cost',this.value)"></div></div>
      <div class="fin-cell"><label>Margin</label><div class="fin-ro strong" style="color:${F.margin<0?'var(--red)':'var(--green-d)'}">$${F.margin.toLocaleString()}</div></div>
      <div class="fin-cell"><label>Margin %</label><div class="fin-ro strong" style="color:${F.marginPct<0?'var(--red)':'var(--green-d)'}">${F.marginPct}%</div></div>
    </div></div>`;

  // Vendor POs - trade contractor assignments (NTE, scope, scheduled, status)
  h+=`<div class="co-sect"><div class="co-sect-hdr">Vendor POs <button class="btn btn-ghost co-add" onclick="lgAdd('vendorPOs')">+ Vendor PO</button></div>`;
  if(!L.vendorPOs.length) h+='<div class="rpt-empty">No vendor POs.</div>';
  else { h+='<table class="co-table"><thead><tr><th>Vendor</th><th>NTE ($)</th><th>Scope</th><th>Scheduled</th><th>Status</th><th></th></tr></thead><tbody>';
    L.vendorPOs.forEach(x=>{ h+=`<tr class="${x.status==='Complete'?'co-pass':x.status==='Canceled'?'co-fail':''}"><td>${inp('vendorPOs',x.id,'party',x.party,'Vendor')}</td><td>${inp('vendorPOs',x.id,'nte',x.nte,'0','number')}</td><td>${inp('vendorPOs',x.id,'scope',x.scope,'Scope of work…')}</td><td>${inp('vendorPOs',x.id,'date',x.date,'','date')}</td><td>${sel('vendorPOs',x.id,'status',x.status,['Open','Pending Schedule','Complete','Canceled'])}</td><td class="co-del"><button onclick="lgDel('vendorPOs','${x.id}')">&#10005;</button></td></tr>`; });
    h+='</tbody></table>'; }
  h+='</div>';

  // Supplier POs - materials/supplier orders (NTE, items, needed-by, status)
  h+=`<div class="co-sect"><div class="co-sect-hdr">Supplier POs <button class="btn btn-ghost co-add" onclick="lgAdd('supplierPOs')">+ Supplier PO</button></div>`;
  if(!L.supplierPOs.length) h+='<div class="rpt-empty">No supplier POs.</div>';
  else { h+='<table class="co-table"><thead><tr><th>Supplier</th><th>NTE ($)</th><th>Items / Scope</th><th>Needed</th><th>Status</th><th></th></tr></thead><tbody>';
    L.supplierPOs.forEach(x=>{ h+=`<tr class="${x.status==='Received'?'co-pass':x.status==='Canceled'?'co-fail':''}"><td>${inp('supplierPOs',x.id,'party',x.party,'Supplier')}</td><td>${inp('supplierPOs',x.id,'nte',x.nte,'0','number')}</td><td>${inp('supplierPOs',x.id,'scope',x.scope,'Materials…')}</td><td>${inp('supplierPOs',x.id,'date',x.date,'','date')}</td><td>${sel('supplierPOs',x.id,'status',x.status,['Open','Ordered','Received','Canceled'])}</td><td class="co-del"><button onclick="lgDel('supplierPOs','${x.id}')">&#10005;</button></td></tr>`; });
    h+='</tbody></table>'; }
  h+='</div>';

  h+=`<div class="co-sect"><div class="co-sect-hdr">Submittals <button class="btn btn-ghost co-add" onclick="lgAdd('submittals')">+ Submittal</button></div>`;
  if(!L.submittals.length) h+='<div class="rpt-empty">No submittals.</div>';
  else { h+='<table class="co-table"><thead><tr><th>Item</th><th>Spec / Ref</th><th>Status</th><th>Submitted</th><th>Returned</th><th></th></tr></thead><tbody>';
    L.submittals.forEach(x=>{ const late=x.status!=='Approved'&&x.status!=='Rejected'&&x.submitted&&daysUntil(x.submitted)<-14;
      h+=`<tr class="${x.status==='Approved'?'co-pass':x.status==='Rejected'?'co-fail':''}"><td>${inp('submittals',x.id,'item',x.item,'Describe…')}</td><td>${inp('submittals',x.id,'ref',x.ref,'-')}</td><td>${sel('submittals',x.id,'status',x.status,['Draft','Submitted','Approved','Rejected','Revise & Resubmit'])}${late?' <span class="lg-flag red">aging</span>':''}</td><td>${inp('submittals',x.id,'submitted',x.submitted,'','date')}</td><td>${inp('submittals',x.id,'returned',x.returned,'','date')}</td><td class="co-del"><button onclick="lgDel('submittals','${x.id}')">&#10005;</button></td></tr>`; });
    h+='</tbody></table>'; }
  h+='</div>';

  // RFIs
  h+=`<div class="co-sect"><div class="co-sect-hdr">RFIs <button class="btn btn-ghost co-add" onclick="lgAdd('rfis')">+ RFI</button></div>`;
  if(!L.rfis.length) h+='<div class="rpt-empty">No RFIs.</div>';
  else { h+='<table class="co-table"><thead><tr><th>Subject</th><th>Status</th><th>Submitted</th><th>Answered</th><th></th></tr></thead><tbody>';
    L.rfis.forEach(x=>{ const aging=x.status==='Open'&&x.submitted&&daysUntil(x.submitted)<-7;
      h+=`<tr class="${x.status==='Closed'||x.status==='Answered'?'co-pass':''}"><td>${inp('rfis',x.id,'subject',x.subject,'Question…')}</td><td>${sel('rfis',x.id,'status',x.status,['Open','Answered','Closed'])}${aging?' <span class="lg-flag amber">aging</span>':''}</td><td>${inp('rfis',x.id,'submitted',x.submitted,'','date')}</td><td>${inp('rfis',x.id,'answered',x.answered,'','date')}</td><td class="co-del"><button onclick="lgDel('rfis','${x.id}')">&#10005;</button></td></tr>`; });
    h+='</tbody></table>'; }
  h+='</div>';

  // Change Orders
  h+=`<div class="co-sect"><div class="co-sect-hdr">Change Orders <button class="btn btn-ghost co-add" onclick="lgAdd('cos')">+ Change Order</button></div>`;
  if(!L.cos.length) h+='<div class="rpt-empty">No change orders.</div>';
  else { h+='<table class="co-table"><thead><tr><th>Description</th><th>Amount ($)</th><th>Status</th><th>Date</th><th></th></tr></thead><tbody>';
    L.cos.forEach(x=>{ h+=`<tr class="${x.status==='Approved'?'co-pass':x.status==='Rejected'?'co-fail':''}"><td>${inp('cos',x.id,'desc',x.desc,'Describe change…')}</td><td>${inp('cos',x.id,'amount',x.amount,'0','number')}</td><td>${sel('cos',x.id,'status',x.status,['Pending','Approved','Rejected'])}</td><td>${inp('cos',x.id,'date',x.date,'','date')}</td><td class="co-del"><button onclick="lgDel('cos','${x.id}')">&#10005;</button></td></tr>`; });
    h+='</tbody></table>'; }
  h+='</div>';

  // Permits
  h+=`<div class="co-sect"><div class="co-sect-hdr">Permits <button class="btn btn-ghost co-add" onclick="lgAdd('permits')">+ Permit</button></div>`;
  if(!L.permits.length) h+='<div class="rpt-empty">No permits.</div>';
  else { h+='<table class="co-table"><thead><tr><th>Type</th><th>Permit #</th><th>Status</th><th>Issued</th><th>Expiration</th><th></th></tr></thead><tbody>';
    L.permits.forEach(x=>{ const risk=permitRisk(x); const du=daysUntil(x.expiration);
      h+=`<tr class="${risk==='expired'?'co-fail':risk==='expiring'?'':''}"><td>${inp('permits',x.id,'type',x.type,'e.g. Building')}</td><td>${inp('permits',x.id,'number',x.number,'-')}</td><td>${sel('permits',x.id,'status',x.status,['Not Applied','Applied','Issued','Closed','Expired'])}</td><td>${inp('permits',x.id,'issued',x.issued,'','date')}</td><td>${inp('permits',x.id,'expiration',x.expiration,'','date')}${risk==='expired'?' <span class="lg-flag red">expired</span>':risk==='expiring'?` <span class="lg-flag amber">${du}d</span>`:''}</td><td class="co-del"><button onclick="lgDel('permits','${x.id}')">&#10005;</button></td></tr>`; });
    h+='</tbody></table>'; }
  h+='</div>';

  h+='</div>';
  m.innerHTML=h;
}

loadJobs();
loadAudit();
loadTargets();
loadStatMap();
loadSchedTpls();
loadHolidays();
render();
routeInit();   // open the view named in the URL (/board, /dashboard, ...) + wire back/forward

/* ============================================================================
   BWN LAUNCHER RECEIVER v2 - Projects Job Board
   Lives at the VERY END of the big inline <script> in
   Broadway_Projects_Tracker.html. Inert unless launcher params are present.

   Reads:  ?tracking=&wo=&client=&location=&loc=&city=&state=&addr=&status=&dne=&gpPct=
   Does:   opens the Create Work Order form pre-filled from the Umbrava WO.

   v2 fixes (field-tested 6/12):
   - tracking arrives as raw header text ("Tracking # 1212705") -> digits only
   - explicit city/state/loc/addr params win when the launcher provides them
   - fallback: pulls "City, ST" from addr or location tail; Loc # from the
     last digit-bearing token of the site label ("Flying J PFJ 0677" -> "0677")
   - full site label preserved in the Scope context line so nothing is lost
   ========================================================================== */
(function () {
  'use strict';
  var q = new URLSearchParams(window.location.search);
  if (!q.get('wo') && !q.get('tracking')) return;   // not a launcher handoff

  function set(id, v) {
    var el = document.getElementById(id);
    if (!el || !v) return;
    el.value = v;
    el.dispatchEvent(new Event('input', { bubbles: true }));
  }
  function cityStateFrom(s) {
    var m = (s || '').match(/([A-Za-z .'-]+?),\s*([A-Z]{2})(?:\s+\d{5}(?:-\d{4})?)?\s*$/);
    return m ? { city: m[1].trim(), state: m[2] } : null;
  }

  function run() {
    try {
      if (typeof openAdd === 'function') openAdd();

      set('f-wo', q.get('wo'));
      set('f-client', q.get('client'));

      // ---- Location -------------------------------------------------------
      // Explicit params (launcher >= 1.2.1) win; otherwise derive from the
      // site label, e.g. "Flying J PFJ 0677" -> Loc # "0677".
      var site = q.get('location') || '';
      var loc = q.get('loc') || '';
      if (!loc && site) {
        var toks = site.trim().split(/\s+/).filter(function (t) { return /\d/.test(t); });
        loc = toks.length ? toks[toks.length - 1] : site;
      }
      set('f-loc', loc);

      var city = q.get('city') || '', state = q.get('state') || '';
      if (!city || !state) {
        var cs = cityStateFrom(q.get('addr')) || cityStateFrom(site);
        if (cs) { city = city || cs.city; state = state || cs.state; }
      }
      set('f-city', city);
      set('f-state', state);

      // ---- Context line in Scope of Work -----------------------------------
      var trk = (q.get('tracking') || '').replace(/\D+/g, '') || q.get('tracking');
      var ctx = [];
      if (trk)              ctx.push('Umbrava Tracking #' + trk);
      if (site)             ctx.push('Site: ' + site);
      if (q.get('status'))  ctx.push('Status at import: ' + q.get('status'));
      if (q.get('dne'))     ctx.push('Client DNE: $' + String(q.get('dne')).replace(/^\$+/, ''));
      if (q.get('gpPct'))   ctx.push('GP at import: ' + q.get('gpPct') + '%');
      if (ctx.length) {
        var notes = document.getElementById('f-notes');
        if (notes) {
          notes.value = ctx.join(' | ') + (notes.value ? '\n' + notes.value : '');
          notes.dispatchEvent(new Event('input', { bubbles: true }));
        }
      }

      console.info('[BWN RECEIVER v2] pre-filled Create Work Order from Umbrava context');
      // One-shot: drop the launcher query now that it is consumed, so in-app navigation (which
      // preserves location.search via routeSync) and reloads do not re-fire this prefill and risk
      // a duplicate WO. Keeps the path; only strips the query.
      try { history.replaceState(history.state, '', location.pathname); } catch (e2) {}
    } catch (e) {
      console.warn('[BWN RECEIVER] pre-fill failed:', e);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', run);
  } else {
    run();
  }
})();
</script>
