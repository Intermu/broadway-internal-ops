// GLOBAL SEARCH BRIDGE - when a tool tab (Dashboard/Agent/Diagnostic/Check-In) is
// active, forward the top-bar query into the embedded tool via postMessage. The
// Dashboard listens (bwn:gsearch) and drives its own popup job search; tools
// without a listener simply ignore it. Payload is just the search string.
const GS_TGT = (location.origin && location.origin !== 'null') ? location.origin : '*';  // '*' only under file:// testing
function gsearchForward(q){
  if(!EMBED_TOOLS[view] || !_toolFrames[view]) return;
  try{ _toolFrames[view].contentWindow.postMessage({type:'bwn:gsearch', q:String(q)}, GS_TGT); }catch(e){ /* frame not ready */ }
}

function matchesSearch(job){
  if(!searchQ) return true;
  const fields = [job.wo, job.city, job.state, job.client, job.vendor, job.notes, job.srcJob, job.loc, job.projectType, job.stage,
    job.stages.map(s=>s.label).join(' '), Object.values(job.ck).flat().map(s=>s.l).join(' ')].join(' ').toLowerCase();
  return searchQ.split(' ').every(word => fields.includes(word));
}

// ══════════════════════════════════════════════════════
// ACTION-DATE DAILY MODEL + ROLE-GATED TASKS
// "Next touch" date drives a daily "Today" view that empties as dates are
// pushed out. Tasks are directive action items only supervisors+ can add.
// Role is a SOFT toggle (no backend auth yet) - maps to an Entra ID security
// group claim once Azure SWA sign-in is wired. Backward compatible: legacy jobs
// have no actionDate / tasks and behave exactly as before.
// ══════════════════════════════════════════════════════
let currentRole = (typeof localStorage!=='undefined' && localStorage.getItem('broadway_jobboard_role')) || 'supervisor';
let todayOnly = false;
function isSupervisor(){ return currentRole==='supervisor'; }
function setRole(r){ currentRole=r; try{localStorage.setItem('broadway_jobboard_role',r);}catch(e){} render(); if(selId) updatePanel(getJob(selId)); }
function toggleRole(){ setRole(isSupervisor()?'coordinator':'supervisor'); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function actionStatus(job){ if(!job||!job.actionDate||isJobClosed(job)) return null; const t=todayStr(); if(job.actionDate<t) return {state:'overdue'}; if(job.actionDate===t) return {state:'today'}; return {state:'upcoming'}; }
function isActionDue(job){ const s=actionStatus(job); return !!s && (s.state==='overdue'||s.state==='today'); }
function toggleTodayOnly(){ todayOnly=!todayOnly; render(); }
function setActionDate(val){ const job=getJob(selId); if(!job) return; job.actionDate=val; const overridden=syncActionDateFromTasks(job) && job.actionDate!==val; saveJobs(); updatePanel(job); renderContent(); updateStatBar(); if(overridden) toast('Next Touch follows the open task (due '+job.actionDate+')'); }

// Tasks - supervisor-add-only directive items. Anyone can mark done.
function ensureTasks(job){ if(!Array.isArray(job.tasks)) job.tasks=[]; return job.tasks; }
function openTaskCount(job){ return (Array.isArray(job&&job.tasks)?job.tasks:[]).filter(t=>!t.done).length; }
// Default due date for a new task: align to the job's Next Touch if set,
// else the next business day (weekends skipped). Stays editable.
function defaultTaskDue(job){
  if(job && job.actionDate) return job.actionDate;
  const d=new Date(); d.setDate(d.getDate()+1);
  while(d.getDay()===0 || d.getDay()===6) d.setDate(d.getDate()+1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
// Earliest due date among OPEN (not done) tasks that have a due date.
function earliestOpenTaskDue(job){ const ts=(Array.isArray(job&&job.tasks)?job.tasks:[]).filter(t=>!t.done&&t.due); return ts.length ? ts.reduce((m,t)=>t.due<m?t.due:m, ts[0].due) : null; }
// An open task's due date is AUTHORITATIVE and overrides the manual Next Touch
// in either direction - a task means an escalation or a missed item, so it
// governs when the job must be touched. When no open dated task exists, the
// manual Next Touch is left as-is (never cleared). Returns true if it changed.
function syncActionDateFromTasks(job){ const e=earliestOpenTaskDue(job); if(e && job.actionDate!==e){ job.actionDate=e; return true; } return false; }
function reflectActionDate(job){ const pa=document.getElementById('p-action'); if(pa && job.id===selId) pa.value=job.actionDate||''; }
function addTask(){ if(!isSupervisor()) return; const job=getJob(selId); if(!job) return; ensureTasks(job).push({id:uid(), text:'', due:defaultTaskDue(job), assignee:'', done:false, createdAt:new Date().toISOString()}); syncActionDateFromTasks(job); saveJobs(); reflectActionDate(job); renderPanelTasks(job); renderContent(); updateStatBar(); }
function editTask(id,f,v){ const job=getJob(selId); if(!job) return; if(!isSupervisor()) return; const t=ensureTasks(job).find(x=>x.id===id); if(!t) return; t[f]=v; if(f==='due') syncActionDateFromTasks(job); saveJobs(); renderContent(); updateStatBar(); if(f==='due'){ reflectActionDate(job); renderPanelTasks(job); } }
function toggleTask(id){ const job=getJob(selId); if(!job) return; const t=ensureTasks(job).find(x=>x.id===id); if(!t) return; t.done=!t.done; syncActionDateFromTasks(job); saveJobs(); reflectActionDate(job); renderPanelTasks(job); renderContent(); updateStatBar(); }
function delTask(id){ if(!isSupervisor()) return; const job=getJob(selId); if(!job) return; job.tasks=ensureTasks(job).filter(x=>x.id!==id); saveJobs(); renderPanelTasks(job); renderContent(); updateStatBar(); }
function renderPanelTasks(job){
  const el=document.getElementById('tasklist'); if(!el) return;
  const tasks=ensureTasks(job); const sup=isSupervisor(); const t0=todayStr();
  let h=`<div class="tl-hdr"><span class="tl-title">Tasks${tasks.length?` <span class="tl-cnt">${openTaskCount(job)} open</span>`:''}</span>${sup?`<button class="btn btn-ghost tl-add" onclick="addTask()">+ Task</button>`:`<span class="tl-locked" title="Only supervisors and above can add tasks">&#128274; Supervisor+ to add</span>`}</div>`;
  if(!tasks.length){ h+=`<div class="tl-empty">${sup?'No tasks. Add a directive action item for this job.':'No tasks assigned.'}</div>`; }
  else { tasks.forEach(t=>{ const overdue=!t.done&&t.due&&t.due<t0;
    h+=`<div class="tl-item${t.done?' done':''}">
      <input type="checkbox" class="tl-ck" ${t.done?'checked':''} onchange="toggleTask('${t.id}')" title="Mark done">
      <div class="tl-main">
        <input class="tl-text" value="${esc(t.text)}" placeholder="Task…" ${sup?'':'readonly'} onchange="editTask('${t.id}','text',this.value)">
        <div class="tl-sub">
          <input class="tl-due${overdue?' overdue':''}" type="date" value="${esc(t.due||'')}" ${sup?'':'disabled'} onchange="editTask('${t.id}','due',this.value)" title="Due date">
          <input class="tl-asg" value="${esc(t.assignee||'')}" placeholder="Assignee" ${sup?'':'readonly'} onchange="editTask('${t.id}','assignee',this.value)">
        </div>
      </div>
      ${sup?`<button class="tl-del" onclick="delTask('${t.id}')" title="Delete">&#10005;</button>`:''}
    </div>`; }); }
  el.innerHTML=h;
}

function filteredJobs(){
  let list = jobs.filter(matchesSearch);
  // Faceted filters: AND across fields, OR within a field.
  for(const f of FACETS){
    const vals = activeFilters[f.field];
    if(vals && vals.length){
      list = list.filter(j => vals.includes(getGroupValue(j, f.field)));
    }
  }
  if(todayOnly){ list = list.filter(j => !isJobClosed(j) && isActionDue(j)); }
  return list;
}

// ══════════════════════════════════════════════════════
// FACETED SIDEBAR FILTERS
// Chips (active selections) + collapsible facet sections with
// multi-select checkboxes, live faceted counts, and per-facet search.
// Behavior: OR within a field, AND across fields.
// ══════════════════════════════════════════════════════

// Faceted counts for a field = apply search + all OTHER active facets,
// then count this field's values. (So counts reflect the rest of the filter
// state, the standard faceted-search behavior.) Currently-selected values are
// always included even if they'd resolve to 0 under the other filters.
function facetCounts(field){
  let base = jobs.filter(matchesSearch);
  for(const f of FACETS){
    if(f.field === field) continue;
    const vals = activeFilters[f.field];
    if(vals && vals.length) base = base.filter(j => vals.includes(getGroupValue(j, f.field)));
  }
  const counts = {};
  base.forEach(j => { const v = getGroupValue(j, field); if(v) counts[v] = (counts[v]||0)+1; });
  (activeFilters[field]||[]).forEach(v => { if(!(v in counts)) counts[v] = 0; });
  return counts;
}

function hasAnyFilter(){
  return Object.values(activeFilters).some(v => v && v.length);
}

function toggleFacet(field){
  if(expandedFacets.has(field)) expandedFacets.delete(field);
  else expandedFacets.add(field);
  renderFacets();
}

function toggleFacetValue(field, val){
  if(!activeFilters[field]) activeFilters[field] = [];
  const i = activeFilters[field].indexOf(val);
  if(i === -1) activeFilters[field].push(val);
  else activeFilters[field].splice(i, 1);
  if(!activeFilters[field].length) delete activeFilters[field];
  renderFacets();
  renderContent();
  updateStatBar();
}

function clearAllFilters(){
  activeFilters = {};
  facetSearch = {};
  renderFacets();
  renderContent();
  updateStatBar();
}

// Live-filter a facet's value list without re-rendering (preserves input focus).
function filterFacetList(field, q){
  q = (q||'').toLowerCase();
  facetSearch[field] = q;
  const container = document.getElementById('facet-vals-'+field);
  if(!container) return;
  container.querySelectorAll('.facet-val').forEach(el => {
    const lbl = (el.dataset.label||'').toLowerCase();
    el.style.display = lbl.includes(q) ? '' : 'none';
  });
}

function renderFacets(){
  // --- Top: title + active-filter chips (pinned) ---
  const top = document.getElementById('sb-facet-top');
  if(top){
    const chips = [];
    for(const f of FACETS){
      (activeFilters[f.field]||[]).forEach(v => {
        const safe = esc(v).replace(/'/g,'&#39;');
        chips.push(`<span class="fchip"><span class="fchip-f">${esc(f.label)}:</span> ${esc(v)} <button class="fchip-x" title="Remove" onclick="toggleFacetValue('${f.field}','${safe}')">&#215;</button></span>`);
      });
    }
    let th = `<div class="facet-hdr-row">
      <span class="sb-title">Filters</span>
      ${chips.length?`<button class="facet-clear" onclick="clearAllFilters()">Clear all</button>`:''}
    </div>`;
    th += chips.length ? `<div class="fchips">${chips.join('')}</div>`
                       : `<div class="fchips-empty">No filters applied &mdash; pick from below</div>`;
    top.innerHTML = th;
  }

  // --- List: collapsible facet sections (scrollable) ---
  const el = document.getElementById('sb-facet-list');
  if(!el) return;
  if(!jobs.length){ el.innerHTML = '<div class="facet-noload">No jobs loaded</div>'; return; }

  let h = '';
  for(const f of FACETS){
    const counts = facetCounts(f.field);
    const values = Object.entries(counts).sort((a,b)=> b[1]-a[1] || a[0].localeCompare(b[0]));
    const selectedCount = (activeFilters[f.field]||[]).length;
    const open = expandedFacets.has(f.field);
    const totalVals = values.length;

    h += `<div class="facet${open?' open':''}">
      <button class="facet-hdr" onclick="toggleFacet('${f.field}')">
        <span class="facet-chev">${open?'&#9662;':'&#9656;'}</span>
        <span class="facet-ico">${f.icon}</span>
        <span class="facet-lbl">${esc(f.label)}</span>
        ${selectedCount?`<span class="facet-badge">${selectedCount}</span>`:`<span class="facet-tot">${totalVals}</span>`}
      </button>`;

    if(open){
      h += `<div class="facet-body">`;
      if(totalVals > 8){
        const sv = facetSearch[f.field]||'';
        h += `<input class="facet-search" type="text" placeholder="Search ${esc(f.label.toLowerCase())}\u2026" value="${esc(sv)}" oninput="filterFacetList('${f.field}',this.value)">`;
      }
      h += `<div class="facet-vals" id="facet-vals-${f.field}">`;
      if(values.length){
        const sv = (facetSearch[f.field]||'');
        values.forEach(([val,cnt]) => {
          const checked = (activeFilters[f.field]||[]).includes(val);
          const safe = esc(val).replace(/'/g,'&#39;');
          const hidden = sv && !val.toLowerCase().includes(sv) ? ' style="display:none"' : '';
          h += `<button class="facet-val${checked?' on':''}" data-label="${esc(val)}"${hidden} onclick="toggleFacetValue('${f.field}','${safe}')">
            <span class="facet-box">${checked?'&#10003;':''}</span>
            <span class="facet-val-lbl" title="${esc(val)}">${esc(val)}</span>
            <span class="facet-val-cnt">${cnt}</span>
          </button>`;
        });
      } else {
        h += `<div class="facet-empty">No matching jobs</div>`;
      }
      h += `</div></div>`;
    }
    h += `</div>`;
  }
  el.innerHTML = h;
}

// IMPORT
// ══════════════════════════════════════════════════════
function processFile(inputEl){
  const f = inputEl.files&&inputEl.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onerror = () => toast('Error reading file');
  reader.onload = function(e){
    try{
      const wb = XLSX.read(e.target.result,{type:'array'});
      const imported = [], seen = new Map();
      const s1 = wb.Sheets['Broadway 26 Surveys']||wb.Sheets[wb.SheetNames[0]];
      if(s1){
        XLSX.utils.sheet_to_json(s1).forEach(r => {
          const wo = String(r['WO #']||r['WO#']||r['wo']||'').trim(); if(!wo) return;
          const tplKey = String(r['Stage Template']||'retrofit').trim().toLowerCase().replace(/\s+/g,'_') || 'retrofit';
          const customStr = String(r['Custom Stages']||r['custom_stages']||r['Stages']||'').trim();
          const stages = makeStages(tplKey, customStr);
          const statusRaw = String(r['Status']||r['status']||'Open').toLowerCase();
          let stageId = stages[0]?.id || 'survey';
          if(statusRaw.includes('complet')||statusRaw.includes('closed')||statusRaw.includes('paid')||statusRaw.includes('invoiced')){
            stageId = stages[stages.length-1]?.id || stageId;
          } else if(statusRaw.includes('install')||statusRaw.includes('progress')||statusRaw.includes('on-site')||statusRaw.includes('on site')){
            stageId = stages.find(s=>s.label.toLowerCase().includes('install')||s.label.toLowerCase().includes('progress')||s.label.toLowerCase().includes('site'))?.id || stageId;
          } else if(statusRaw.includes('proposal')||statusRaw.includes('quote')){
            stageId = stages.find(s=>s.label.toLowerCase().includes('proposal')||s.label.toLowerCase().includes('quote'))?.id || stageId;
          }
          if(!stages.find(s=>s.id===stageId)) stageId = stages[0]?.id;
          const id = uid();
          seen.set(wo, id);
          imported.push({id, wo, srcJob:String(r['Source Job #']||r['srcJob']||''), city:r['City']||r['city']||'', state:r['State']||r['state']||'', loc:String(r['Location #']||r['loc']||''), client:r['Client']||r['client']||'Unknown', vendor:r['Vendor(s)']||r['Vendor']||r['vendor']||'', notes:r['Notes']||r['notes']||'', projectType:r['Project Type']||r['Type']||'Retrofit', stages, stage:stageId, ck:mkCk(stages,tplKey), stageDur:{}, startDate:r['Start Date']||'', tplKey, added:new Date().toISOString(), stageHistory:[{stageId, enteredAt:new Date().toISOString()}]});
        });
      }
      const existWOs = new Set(jobs.map(j=>j.wo));
      const added = imported.filter(j=>!existWOs.has(j.wo)||!j.wo);
      jobs = [...jobs,...added];
      saveJobs();
      inputEl.value = '';
      render(); toast('Imported '+added.length+' jobs from '+f.name);
    }catch(err){ toast('Import failed: '+err.message); console.error(err); }
  };
  reader.readAsArrayBuffer(f);
}

function processDropFiles(files){
  const f = files&&Array.from(files).find(f=>/\.(xlsx|xlsm|xls)$/i.test(f.name));
  if(!f){ toast('Drop an .xlsx or .xlsm file'); return; }
  processFile({files:[f], value:''});
}

function expSetStage(stageId){

function expFmtDate(s){
  if(!s) return '';
  try {
    const d = new Date(s);
    if(isNaN(d.getTime())) return String(s);
    return d.toLocaleDateString('en-US', {year:'numeric', month:'short', day:'numeric'});
  } catch(e){ return String(s); }
}
function expFmtDateTime(s){
  if(!s) return '';
  try {
    const d = new Date(s);
    if(isNaN(d.getTime())) return String(s);
    return d.toLocaleDateString('en-US', {year:'numeric', month:'short', day:'numeric'}) +
      ' · ' + d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
  } catch(e){ return String(s); }
}
function expField(lbl, val){

}
// Editable contenteditable field - bound to a job key on the currently selected job.

    <div class="exp-fld-lbl">${esc(lbl)}</div>
    <div class="exp-fld-val editable" contenteditable="true" data-exp-key="${esc(key)}" spellcheck="false">${empty?'':esc(String(val))}</div>

// Save a job field edited from the expanded modal. Updates job, persists,
// refreshes side panel + board content, and re-renders the modal header so
// edits are visible immediately without a full re-render.
function saveJobFieldFromExp(key, val){
  const job = getJob(selId);
  if(!job) return;
  if(job[key] === val) return;
  job[key] = val;
  saveJobs();
  // Update side panel header (the minimized view stays in sync)
  document.getElementById('p-client').textContent = job.client || 'Unknown';
  document.getElementById('p-city').textContent = (job.city||'Unknown') + (job.state ? ', ' + job.state : '');
  // Update side panel edit fields too if visible
  const sideEl = document.getElementById('ef-' + key);
  if (sideEl && document.activeElement !== sideEl) {
    sideEl.textContent = job[key] || '';
    sideEl.classList.toggle('ph', !job[key]);
  }
  // Update modal header
  document.getElementById('exp-eye').textContent = job.client || 'Unknown';
  document.getElementById('exp-title').textContent = (job.city||'Unknown') + (job.state ? ', ' + job.state : '');
  renderContent();
  renderFacets();
}
function renderExpandedView(job){
  // Header
  document.getElementById('exp-eye').textContent = job.client || 'Unknown';
  document.getElementById('exp-title').textContent = (job.city||'Unknown') + (job.state ? ', ' + job.state : '');
  const stage = job.stages.find(s => s.id === job.stage);
  const p = pct(job);
  const meta = [
    `<strong>Stage:</strong> ${esc(stage?.label||'-')}`,
    `<strong>Progress:</strong> ${p}%`,
    job.wo ? `<strong>WO:</strong> ${esc(job.wo)}` : '',
    job.srcJob ? `<strong>Source Job:</strong> ${esc(job.srcJob)}` : '',
    job.loc ? `<strong>Loc:</strong> ${esc(job.loc)}` : '',
  ].filter(Boolean).join(' · ');
  document.getElementById('exp-meta').innerHTML = meta;

  // Stage tabs - click to move the job to that stage (the maximized-view stage selector)
  const stEl = document.getElementById('exp-stagetabs');
  if(stEl){
    stEl.innerHTML = job.stages.map(s=>`<button class="exp-stab${s.id===job.stage?' active':''}" style="${s.id===job.stage?`border-bottom-color:${s.color};color:${s.color}`:''}" onclick="expSetStage('${s.id}')">${esc(s.label)}</button>`).join('');
  }

  // Audit hint lookup (same logic as updatePanel)
  const auditKey = (job.wo && auditByWo[job.wo]) ? job.wo
                : (job.srcJob && auditByWo[job.srcJob]) ? job.srcJob
                : null;
  const hint = auditKey ? auditByWo[auditKey] : null;

  // Build body
  let body = '';

  // ── Section: Job Identification (editable) ──
  // Project type list - matches the dropdown used in the Add Job modal.
  const PROJECT_TYPES = ['Retrofit','Wifi','RF','Q/R','New Install','Service','Other'];
  body += `<div class="exp-section">
    <div class="exp-sec-hdr">Job Identification <span class="exp-sec-cnt">editable</span></div>
    <div class="exp-grid">
      ${expEditField('City', 'city', job.city)}
      ${expEditField('State', 'state', job.state)}
      ${expEditField('Location #', 'loc', job.loc)}
      ${expEditField('WO #', 'wo', job.wo)}
      ${expEditField('Source Job #', 'srcJob', job.srcJob)}
      ${expEditField('Client', 'client', job.client)}
      ${expEditField('Vendor', 'vendor', job.vendor)}
      ${expSelectField('Project Type', 'projectType', job.projectType || 'Retrofit', PROJECT_TYPES)}
      ${expDateField('Start Date', 'startDate', job.startDate)}
      ${expField('Proj. End', expFmtDate(projEnd(job)))}
      ${expField('Template', job.tplKey)}
      ${expField('Added', expFmtDateTime(job.added))}
    </div>
  </div>`;

  // ── Section: Audit Snapshot ──
  body += `<div class="exp-section">
    <div class="exp-sec-hdr">Audit Snapshot ${hint ? `<span class="exp-sec-cnt">imported ${expFmtDate(hint.importedAt)}</span>` : ''}</div>`;
  if(hint){
    const aligned = auditAligned(hint.status, stage?.label||'');
    body += `<div class="exp-grid">
      ${expField('Audit Status', hint.status + (aligned ? '' : '  · DIVERGED from board'))}
      ${expField('Time in Status', hint.statusHrs ? `${(hint.statusHrs/24).toFixed(1)}d (${hint.statusHrs.toFixed(0)} hrs)` : null)}
      ${expField('Age (days)', hint.age)}
      ${expField('Trade', hint.trade)}
      ${expField('Coordinator', hint.coord)}
      ${expField('FM', hint.fm)}
      ${expField('Last Note Date', expFmtDate(hint.lastNoteDate))}
      ${expField('Next Onsite', expFmtDate(hint.nextOnsite))}
      ${expField('Approved $', hint.amount ? '$' + Math.round(hint.amount).toLocaleString() : null)}
      ${expField('Match Key', hint.srcKey)}
    </div>`;
    if(hint.lastNote){
      body += `<div style="margin-top:10px"><div class="exp-fld-lbl" style="margin-bottom:5px">Last Note Text</div>
        <div class="exp-notes-box">${esc(hint.lastNote)}</div></div>`;
    }
    // If audit was imported before the new field-capture upgrade, prompt re-sync.
    const stale = (!('coord' in hint) && !('fm' in hint) && !('lastNote' in hint));
    if(stale){
      body += `<div style="margin-top:10px" class="exp-empty">⚠ Extended audit fields (Coordinator, FM, Last Note, Next Onsite) aren't populated. Re-run "Sync Audit" to pull these in.</div>`;
    }
  } else {
    body += `<div class="exp-empty">No audit data matched to this job. Use "Sync Audit" to import a WO Audit workbook - the tool will match by WO # or Source Job #.</div>`;
  }
  body += `</div>`;

  // ── Section: Stage Timeline ──
  body += `<div class="exp-section">
    <div class="exp-sec-hdr">Stage Timeline <span class="exp-sec-cnt">${(job.stageHistory||[]).length} entries</span></div>`;
  if(Array.isArray(job.stageHistory) && job.stageHistory.length){
    body += '<div class="exp-tl">';
    job.stageHistory.forEach((h, idx) => {
      const sObj = job.stages.find(s => s.id === h.stageId);
      const next = job.stageHistory[idx+1];
      const enteredMs = new Date(h.enteredAt).getTime();
      const exitedMs = next ? new Date(next.enteredAt).getTime() : Date.now();
      const durDays = isFinite(enteredMs) && isFinite(exitedMs) ? Math.max(0, (exitedMs - enteredMs) / 86400000) : null;
      const isCurrent = !next;
      body += `<div class="exp-tl-item${isCurrent?' current':''}">
        <div class="exp-tl-stage">${esc(sObj?.label || h.stageId)}${isCurrent ? ' <span style="color:var(--green);font-weight:600">· current</span>' : ''}</div>
        <div class="exp-tl-date">Entered ${expFmtDateTime(h.enteredAt)}</div>
        ${durDays !== null ? `<div class="exp-tl-dur">${durDays.toFixed(1)}d in stage${isCurrent?' so far':''}</div>` : ''}
      </div>`;
    });
    body += '</div>';
  } else {
    body += `<div class="exp-empty">No stage history recorded yet.</div>`;
  }
  body += `</div>`;

  // ── Section: All Checklists (clickable to toggle) ──
  const totalSteps = job.stages.reduce((acc, s) => acc + ((job.ck[s.id]||[]).length), 0);
  const doneSteps = job.stages.reduce((acc, s) => acc + (job.ck[s.id]||[]).filter(i => i.d).length, 0);
  body += `<div class="exp-section">
    <div class="exp-sec-hdr">All Checklists <span class="exp-sec-cnt">${doneSteps}/${totalSteps} complete · click to toggle</span></div>`;
  job.stages.forEach(s => {
    const items = job.ck[s.id] || [];
    if(!items.length) return;
    const done = items.filter(i => i.d).length;
    const pctStage = items.length ? Math.round(100*done/items.length) : 0;
    body += `<div class="exp-ckbox">
      <div class="exp-ckbox-hdr">${esc(s.label)} <span class="exp-ckbox-pct">${pctStage}% · ${done}/${items.length}</span></div>
      ${items.map((i,idx) => `<div class="exp-ckline${i.d?' done':''}" data-exp-ck-stage="${esc(s.id)}" data-exp-ck-idx="${idx}"><div class="exp-ckmark">${i.d?'&#10003;':''}</div><span class="exp-cklbl">${esc(i.l)}</span></div>`).join('')}
    </div>`;
  });
  body += `</div>`;

  // ── Section: Related WOs at Same Location ──
  const related = jobs.filter(j => j.id !== job.id && j.city === job.city && j.state === job.state && (j.loc||'') === (job.loc||''));
  body += `<div class="exp-section">
    <div class="exp-sec-hdr">Related WOs at this Location <span class="exp-sec-cnt">${related.length} other${related.length===1?'':'s'}</span></div>`;
  if(related.length){
    body += `<div class="exp-related">${related.map(r => {
      const rStage = r.stages.find(s => s.id === r.stage);
      const rPct = pct(r);
      return `<div class="exp-rel-item" onclick="closeExpandedView();selJob('${r.id}')">
        <span class="exp-rel-wo">${esc(r.wo || r.srcJob || r.id)}</span>
        <span style="color:var(--t3);font-size:10px">${esc(r.client||'-')}</span>
        <span class="exp-rel-stage">${esc(rStage?.label||'-')}</span>
        <span class="exp-rel-pct">${rPct}%</span>
      </div>`;
    }).join('')}</div>`;
  } else {
    body += `<div class="exp-empty">No other tracked WOs at ${esc(job.city||'this location')}.</div>`;
  }
  body += `</div>`;

  // ── Section: Notes (editable) ──
  body += `<div class="exp-section" style="margin-bottom:0">
    <div class="exp-sec-hdr">Notes <span class="exp-sec-cnt">editable</span></div>
    <div class="exp-notes-box editable" contenteditable="true" data-exp-key="notes" spellcheck="false">${esc(job.notes||'')}</div>
  </div>`;

  document.getElementById('exp-body').innerHTML = body;
  // Scroll body to top on open
  document.getElementById('exp-body').scrollTop = 0;
  // Attach editable handlers (contenteditable text fields, date inputs, selects, checklist toggles)
  bindExpandedHandlers(job);
}

// Bind blur / change / click handlers to all editable elements in the modal.
// Called after each renderExpandedView. Re-renders the modal only on changes that
// alter section content (checklist toggles, project type changes); text edits
// stay live without re-render so the cursor doesn't lose its place.
function bindExpandedHandlers(job){
  const body = document.getElementById('exp-body');
  if(!body) return;
  // Contenteditable text fields
  body.querySelectorAll('[contenteditable="true"][data-exp-key]').forEach(el => {
    el.addEventListener('blur', () => {
      const key = el.dataset.expKey;
      // For notes, preserve line breaks; for everything else strip whitespace
      const val = key === 'notes' ? el.innerText.replace(/\r/g, '') : el.textContent.trim();
      saveJobFieldFromExp(key, val);
    });
    // Block Enter creating <div> tags in single-line fields
    if (el.dataset.expKey !== 'notes') {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
      });
    }
  });
  // Date inputs and selects
  body.querySelectorAll('input.exp-fld-input[data-exp-key], select.exp-fld-input[data-exp-key]').forEach(el => {
    el.addEventListener('change', () => {
      const key = el.dataset.expKey;
      const val = el.value;
      saveJobFieldFromExp(key, val);
      // For startDate, re-render to refresh the projected-end field that depends on it
      if (key === 'startDate' || key === 'projectType') {
        renderExpandedView(getJob(selId));
      }
    });
  });
  // Checklist toggles
  body.querySelectorAll('.exp-ckline[data-exp-ck-stage]').forEach(el => {
    el.addEventListener('click', () => {
      const stageId = el.dataset.expCkStage;
      const idx = parseInt(el.dataset.expCkIdx, 10);
      const j = getJob(selId);
      if (!j || !j.ck[stageId] || !j.ck[stageId][idx]) return;
      j.ck[stageId][idx].d = !j.ck[stageId][idx].d;
      saveJobs();
      // Re-render modal (checklist counts/% change) and update side panel + board
      renderExpandedView(j);
      if (typeof updatePanel === 'function') updatePanel(j);
      renderContent();
    });
  });
}
function setStartDate(val){ const job=getJob(selId); if(!job) return; job.startDate=val; saveJobs(); updatePanel(job); if(view==='gantt') renderContent(); }

function updatePanel(job){
  if(!job) return;
  const si = job.stages.findIndex(s=>s.id===job.stage);
  const stage = job.stages[si];
  document.getElementById('p-client').textContent = job.client||'Unknown';
  document.getElementById('p-city').textContent = (job.city||'Unknown')+(job.state?', '+job.state:'');
  document.getElementById('p-start').value = job.startDate||'';
  const pa=document.getElementById('p-action'); if(pa) pa.value = job.actionDate||'';
  document.getElementById('p-end').value = projEnd(job)||'';
  const slbl=document.getElementById('slbl'); slbl.textContent=stage?.label||''; slbl.style.color=stage?.color||'var(--green)';
  document.getElementById('sarr-back').disabled = si<=0;
  document.getElementById('sarr-fwd').disabled  = si>=job.stages.length-1;
  ['city','state','loc','wo','srcJob','client','vendor','notes'].forEach(k=>{
    const el=document.getElementById('ef-'+k); if(!el||document.activeElement===el) return;
    el.textContent=job[k]||''; el.classList.toggle('ph',!job[k]);
  });
  const p=pct(job), r=16, circ=2*Math.PI*r, col=stage?.color||'var(--green)';
  document.getElementById('prog-ring').innerHTML=`<div class="pring-wrap"><svg viewBox="0 0 40 40" width="40" height="40"><circle cx="20" cy="20" r="${r}" fill="none" stroke="#d1e5d1" stroke-width="4"/><circle cx="20" cy="20" r="${r}" fill="none" stroke="${col}" stroke-width="4" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${(circ*(1-p/100)).toFixed(1)}" transform="rotate(-90 20 20)" style="transition:stroke-dashoffset .4s"/></svg><div class="pring-pct" style="color:${col}">${p}%</div></div><div class="pring-info"><div class="pring-label">${p}% overall complete</div><div class="pring-sub">${job.projectType||''} &bull; ${job.startDate?'Start: '+job.startDate:'No start date'}${projEnd(job)?' &bull; ECD: '+projEnd(job):''}</div></div>`;
  // Audit row: shows the audit's status hint, with a dot indicating whether it
  // agrees with the current board stage. Synonym-aware (via auditAligned), so
  // "Materials Ordered" doesn't false-flag against "PO Issued". Match key is wo;
  // we also fall back to srcJob in case the user has the WO# blank.
  const auditEl = document.getElementById('panel-audit');
  const auditKey = (job.wo && auditByWo[job.wo]) ? job.wo
                : (job.srcJob && auditByWo[job.srcJob]) ? job.srcJob
                : null;
  const hint = auditKey ? auditByWo[auditKey] : null;
  if(hint && hint.status){
    const aligned = auditAligned(hint.status, stage?.label||'');
    const dotColor = aligned ? '#39b54a' : '#d97706';
    const hrs = (typeof hint.statusHrs === 'number' && hint.statusHrs > 0)
      ? `${(hint.statusHrs/24).toFixed(1)}d in audit status`
      : '';
    auditEl.style.display = 'flex';
    auditEl.classList.toggle('diverged', !aligned);
    auditEl.innerHTML = `
      <span class="panel-audit-dot" style="background:${dotColor}"></span>
      <span class="panel-audit-lbl">Audit:</span>
      <span class="panel-audit-val">${esc(hint.status)}</span>
      ${aligned ? '' : `<span class="rpt-flag amber" style="margin-left:auto">DIVERGED</span>`}
      ${hrs ? `<span class="panel-audit-hrs">${esc(hrs)}</span>` : ''}
    `;
  } else {
    auditEl.style.display = 'none';
    auditEl.innerHTML = '';
  }
  renderTabs(job); renderChecklist(job); renderPanelTasks(job);
}

document.querySelectorAll('.ef-val[data-key]').forEach(el=>{
  const key=el.dataset.key;
  el.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();el.blur();} if(e.key==='Escape'){const j=getJob(selId);if(j)el.textContent=j[key]||'';el.blur();} });

function renderTabs(job){
  document.getElementById('stabs').innerHTML=job.stages.map(s=>`<button class="stab${activeTab===s.id?' on':''}" style="color:${activeTab===s.id?s.color:'var(--t3)'}" onclick="setTab('${s.id}')">${s.label}</button>`).join('');
  // Defer the scroll/fade update until after the DOM paints, otherwise scrollWidth is stale.
  setTimeout(updateTabsScrollState, 0);
}
function setTab(id){ activeTab=id; const job=getJob(selId); if(job){renderTabs(job);renderChecklist(job);} }
function updateTabsScrollState(){
  const wrap = document.getElementById('stabs-wrap');
  const strip = document.getElementById('stabs');
  if(!wrap || !strip) return;
  const max = strip.scrollWidth - strip.clientWidth;
  // Fade indicators: left fade visible when scrolled away from left edge,
  // right fade visible when there's more content to the right.
  wrap.classList.toggle('fade-l', strip.scrollLeft > 4);
  wrap.classList.toggle('fade-r', max - strip.scrollLeft > 4);
  // Center the active tab in the visible window so the user always sees where they are.
  const active = strip.querySelector('.stab.on');
  if(active){
    const stripRect = strip.getBoundingClientRect();
    const activeRect = active.getBoundingClientRect();
    const offsetLeft = active.offsetLeft;
    const target = offsetLeft - (strip.clientWidth/2) + (active.offsetWidth/2);
    // Only re-scroll if the active tab is meaningfully off-center to avoid jitter.
    if(Math.abs(strip.scrollLeft - target) > 8) strip.scrollTo({left:Math.max(0, target), behavior:'smooth'});
  }
}
function nudgeTabs(dir){
  const strip = document.getElementById('stabs');
  if(!strip) return;
  strip.scrollBy({left: dir * Math.max(120, strip.clientWidth * 0.5), behavior:'smooth'});
  setTimeout(updateTabsScrollState, 250);
}
// Keep fade indicators in sync as the user scrolls the strip manually.
(function bindTabScroll(){
  const strip = document.getElementById('stabs');
  if(strip) strip.addEventListener('scroll', updateTabsScrollState, {passive:true});
  window.addEventListener('resize', updateTabsScrollState);
})();

function renderChecklist(job){
  const steps=job.ck[activeTab]||[];
  const stage=job.stages.find(s=>s.id===activeTab);
  const sp=spct(job,activeTab), isCur=job.stage===activeTab;
  let h=`<div class="cktitle">${stage?.label||''} Checklist<span class="ck-badge">${sp}%${isCur?' live':''}</span></div>`;
  steps.forEach((s,i)=>{ h+=`<div class="ckitem${s.d?' done':''}" onclick="toggleStep('${job.id}','${activeTab}',${i})"><div class="ckbox">${s.d?'&#10003;':''}</div><span class="cklbl">${s.l}</span></div>`; });
  if(job.notes) h+=`<div class="notes-blk"><div class="notes-lbl">Notes</div><div class="notes-txt">${esc(job.notes)}</div></div>`;
  document.getElementById('cklist').innerHTML = h;
}

function toggleStep(jid,sid,idx){
  const job=getJob(jid); if(!job) return;
  job.ck[sid][idx].d=!job.ck[sid][idx].d;
  if(sid===job.stage&&job.ck[sid].every(s=>s.d)){
    const ci=job.stages.findIndex(s=>s.id===job.stage);
    if(ci<job.stages.length-1){ setJobStage(job, job.stages[ci+1].id); activeTab=job.stage; toast('Stage complete - advanced to '+job.stages[ci+1].label); }
  }
  saveJobs();
  updatePanel(job); renderContent(); updateStatBar();
}

function moveStage(dir){
  const job=getJob(selId); if(!job) return;
  const ci=job.stages.findIndex(s=>s.id===job.stage);
  const ni=Math.max(0,Math.min(job.stages.length-1,ci+dir));
  setJobStage(job, job.stages[ni].id); activeTab=job.stage;
  updatePanel(job); renderContent(); updateStatBar();
}

function showCtx(e,id){

  const bb=document.getElementById('ctx-block');
  if(bb){ bb.innerHTML = isBlocked(job) ? '&#9989; Unblock Job' : '&#9940; Mark Blocked'; }
  // Position: use pointer coords, or fall back to the trigger's box for keyboard activation.
  let cx=e.clientX, cy=e.clientY;
  if(!cx && !cy){ const t=e.currentTarget||e.target; if(t&&t.getBoundingClientRect){ const r=t.getBoundingClientRect(); cx=r.right; cy=r.bottom; } }
  ctxEl.style.left=Math.min(cx||40,window.innerWidth-220)+'px';
  ctxEl.style.top=Math.min(cy||40,window.innerHeight-340)+'px';
  ctxEl.classList.add('show');
  const first=ctxEl.querySelector('.ctx-item'); if(first) first.focus();
}
function closeCtx(){ ctxEl.classList.remove('show'); ctxId=null; }
document.addEventListener('click',()=>closeCtx());
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeCtx(); });

function ctx(action){
  const job=getJob(ctxId); closeCtx(); if(!job) return;
  const sn=job.stages.find(s=>s.id===job.stage)?.label||'';
  if(action==='open'){ selJob(job.id); }
  else if(action==='clr-stage'){ if(confirm('Clear checklist for '+sn+'?')){ job.ck[job.stage].forEach(s=>s.d=false); saveJobs(); if(selId===job.id)updatePanel(job); render(); toast('Checklist cleared for '+sn); } }
  else if(action==='done-stage'){ job.ck[job.stage].forEach(s=>s.d=true); const ci=job.stages.findIndex(s=>s.id===job.stage); if(ci<job.stages.length-1){setJobStage(job, job.stages[ci+1].id);activeTab=job.stage;toast('Advanced to '+job.stages[ci+1].label);}else { saveJobs(); toast('All stages complete'); } if(selId===job.id)updatePanel(job); render(); }
  else if(action==='edit-stages'){ editStages(job); }
  else if(action==='reset-all'){ if(confirm('Reset ALL checklists for this job?')){ job.ck=mkCk(job.stages,job.tplKey); saveJobs(); if(selId===job.id)updatePanel(job); render(); toast('All checklists reset'); } }
  else if(action==='reset-full'){ if(confirm('Reset to first stage and clear all checklists?')){ job.ck=mkCk(job.stages,job.tplKey); setJobStage(job, job.stages[0]?.id); activeTab=job.stage; if(selId===job.id)updatePanel(job); render(); toast('Job fully reset'); } }
  else if(action==='toggle-block'){
    if(isBlocked(job)){ job.blocked=false; delete job.blockedAt; toast('Unblocked'); }
    else { job.blocked=true; job.blockedAt=new Date().toISOString(); toast('Marked blocked'); }
    saveJobs(); if(selId===job.id)updatePanel(job); render();
  }
  else if(action==='goto-mapping'){ gotoMapping(); }
  else if(action==='clr-dates'){ job.startDate=''; saveJobs(); if(selId===job.id)updatePanel(job); render(); toast('Dates cleared'); }
  else if(action==='delete'){ if(confirm('Remove "'+((job.city||'this job'))+'" from board?')){ if(selId===job.id)closePanel(); jobs=jobs.filter(j=>j.id!==job.id); saveJobs(); render(); toast('Job removed'); } }
}

// Export the current filtered job list as CSV (Excel export already exists).
function exportReportCSV(){
  const list=filteredJobs();
  const header=['WO','Source Job','City','State','Client','Vendor','Project Type','Stage','Blocked','Blocked Days','Days In Stage','Cycle Time (d)','Start Date','Closed'];
  const rows=[header];
  list.forEach(j=>{
    const st=j.stages.find(s=>s.id===j.stage);
    rows.push([
      j.wo||'', j.srcJob||'', j.city||'', j.state||'', j.client||'', j.vendor||'',
      j.projectType||'', st?st.label:'', isBlocked(j)?'Yes':'No',
      (isBlocked(j)&&blockedAgeDays(j)!=null)?blockedAgeDays(j).toFixed(1):'',
      timeInStageDays(j)!=null?timeInStageDays(j).toFixed(1):'',
      cycleTimeDays(j)!=null?cycleTimeDays(j).toFixed(1):'',
      j.startDate||'', isJobClosed(j)?'Yes':'No'
    ]);
  });
  const csv=rows.map(r=>r.map(c=>{const s=String(c);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='broadway_projects_report.csv'; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast('Report CSV exported');
}

function editStages(job){
  const newStr = prompt('Edit stages (comma separated):\n\nCurrent: '+job.stages.map(s=>s.label).join(', '), job.stages.map(s=>s.label).join(', '));
  if(!newStr) return;
  const newStages = makeStages('custom', newStr);
  if(!newStages.length){ toast('No valid stages entered'); return; }
  const oldCk = job.ck;
  job.stages = newStages;
  job.ck = {};
  newStages.forEach(s => { job.ck[s.id] = oldCk[s.id] || ['Step 1','Step 2','Step 3'].map(l=>({l,d:false})); });
  if(!newStages.find(s=>s.id===job.stage)) setJobStage(job, newStages[0].id);
  else saveJobs();
  activeTab = job.stage;
  if(selId===job.id) updatePanel(job);
  render(); toast('Stages updated');
}

// Embedded tools - the Job Board is the hub; these load inline as iframes.
const EMBED_TOOLS = { agent:'agent.html', dashboard:'Broadway_Unified_Ops_Dashboard.html', diagnostic:'Pilot_Proposal_Diagnostic.html', checkin:'Broadway_Coordinator_CheckIn.html' };
const _toolFrames = {};
if(window.self!==window.top) document.documentElement.classList.add('embedded');

// ── Signed-in user chip (SWA built-in /.auth/me) ──────────────────────────────
function toggleUserMenu(e){e.stopPropagation();document.getElementById('user-chip-menu').classList.toggle('open');}
document.addEventListener('click',()=>{const m=document.getElementById('user-chip-menu');if(m)m.classList.remove('open');});
setTimeout(()=>{ // deferred so a snapshot override appended before </body> has run first
  if(window.BROADWAY_SNAPSHOT) return;                       // saved copies: no live auth fetch

function ensureToolFrame(key){
  if(_toolFrames[key]) return _toolFrames[key];
  const host=document.getElementById('tool-host');
  const f=document.createElement('iframe'); f.src=EMBED_TOOLS[key]; f.className='tool-iframe'; f.title=key;
  // Bridge catch-up: if the user typed before this frame finished loading, replay the query.
  f.addEventListener('load', ()=>{ const s=document.getElementById('search-input'); if(s && s.value.trim() && view===key) gsearchForward(s.value); });
  host.appendChild(f); _toolFrames[key]=f; return f;
}
// ── Clean-URL routing ──────────────────────────────────────────────────────
// Each section has its own path (/board /list /timeline /reports /agent
// /dashboard /diagnostic /check-in) via SWA rewrites to this shell; the shell
// opens the matching view and reflects the current view in the address bar with
// pushState (no reload). Deep links + the browser back button work.
var SLUG_TO_VIEW = { board:'board', list:'list', timeline:'gantt', reports:'reports', prospects:'prospects', agent:'agent', dashboard:'dashboard', diagnostic:'diagnostic', 'check-in':'checkin' };
var VIEW_TO_SLUG = { board:'board', list:'list', gantt:'timeline', reports:'reports', prospects:'prospects', agent:'agent', dashboard:'dashboard', diagnostic:'diagnostic', checkin:'check-in' };
var _routing = false;   // true while APPLYING a route (init/popstate) - suppresses the URL push
function routeToView(){ var seg = (location.pathname.split('/').filter(Boolean).pop() || '').toLowerCase(); return SLUG_TO_VIEW[seg] || null; }
function routeSync(v){   // reflect the just-selected view in the address bar (preserve query string)
  if (_routing) return;
  var slug = VIEW_TO_SLUG[v]; if (!slug) return;
  if (location.pathname.toLowerCase() !== '/' + slug) { try { history.pushState({ v: v }, '', '/' + slug + location.search); } catch (e) {} }
}
function routeInit(){   // called once after the first render(): open the URL's view + wire back/forward
  var v = routeToView();
  if (v && v !== view) { _routing = true; setView(v); _routing = false; }
  var slug = VIEW_TO_SLUG[view];   // normalize the bar to the canonical slug (replaceState = no history entry)
  if (slug && location.pathname.toLowerCase() !== '/' + slug) { try { history.replaceState({ v: view }, '', '/' + slug + location.search); } catch (e) {} }
  window.addEventListener('popstate', function () { var pv = routeToView() || 'board'; if (pv !== view) { _routing = true; setView(pv); _routing = false; } });
}

function setView(v){
  view=v;
  const isTool = !!EMBED_TOOLS[v];
  const isProspects = (v==='prospects');   // native view, but it owns its chrome (no jobs stat bar / filter sidebar)
  ['board','list','gantt','reports','prospects'].forEach(x=>{ const el=document.getElementById('v'+x); if(el) el.classList.toggle('on',x===v); });
  Object.keys(EMBED_TOOLS).forEach(k=>{ const el=document.getElementById('v'+k); if(el) el.classList.toggle('on',k===v); });
  const host=document.getElementById('tool-host'), sbar=document.getElementById('sbar'),
        board=document.getElementById('board-area'), empty=document.getElementById('empty-state'),
        swrap=document.getElementById('sb-wrap');
  if(isTool){
    ensureToolFrame(v);
    Object.keys(_toolFrames).forEach(k=>_toolFrames[k].classList.toggle('active',k===v));
    host.style.display='flex';
    if(board) board.style.display='none';
    if(empty) empty.style.display='none';
    if(sbar) sbar.style.display='none';
    if(swrap) swrap.style.display='none';
    closePanel();
    const s=document.getElementById('search-input'); if(s) gsearchForward(s.value);   // unconditional: an empty box must also CLEAR a stale popup left in the frame
  } else {
    host.style.display='none';
    if(sbar) sbar.style.display = isProspects ? 'none' : '';   // Prospects isn't a jobs view - hide the jobs stat bar + filters
    if(swrap) swrap.style.display = isProspects ? 'none' : '';
    if(isProspects){ closePanel(); prospectsState.err=''; }   // clear a stale load error so re-entering retries (the lazy guard won't loop: the error re-render happens without re-entry)
    renderContent();
  }
  routeSync(v);
}

/* ============================================================================
   PROSPECTS VIEW - browse the shared vendor-prospect pipeline (api/vendor-prospects)
   and record recruiting outcomes. This is FREE: pure pipeline data saved by Bid-Out /
   Find Techs / Find Suppliers when they spend on discovery. Authorized by the AAD
   session (broadway_employee) - no shared key lives in this page. The top search bar
   doubles as the name/city/contact filter here.
   ============================================================================ */
var prospectsState = { loaded:false, loading:false, err:'', list:[], total:0, kind:'', status:'', sort:'recent' };
var PROSP_STATUSES = [['','Any outcome'],['none','No outcome yet'],['bid-sent','Bid sent'],['declined','Declined'],['no-response','No response'],['joined','Joined'],['do-not-contact','Do not contact'],['contacted','Contacted'],['note','Note']];
function prospBoard(){ return document.getElementById('board-area'); }
function setProspKind(v){ prospectsState.kind=v; if(view==='prospects') renderProspects(prospBoard()); }
function setProspStatus(v){ prospectsState.status=v; if(view==='prospects') renderProspects(prospBoard()); }
function setProspSort(v){ prospectsState.sort=v; if(view==='prospects') renderProspects(prospBoard()); }
function reloadProspects(){ fetchProspects(true); }

function fetchProspects(force){
  var s = prospectsState;
  if(s.loading) return;
  if(s.loaded && !force) return;
  s.loading=true; s.err='';
  if(view==='prospects') renderProspects(prospBoard());
  fetch('/api/vendor-prospects?all=1', { headers:{ 'Accept':'application/json' }, credentials:'same-origin' })
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(d){
      s.list = (d && d.prospects) || [];
      s.total = (d && d.total) || s.list.length;
      s.loaded=true; s.loading=false;
      if(view==='prospects') renderProspects(prospBoard());
    })
    .catch(function(e){ s.loading=false; s.err=String(e && e.message || e); if(s.loaded) toast('Prospects refresh failed: '+s.err); if(view==='prospects') renderProspects(prospBoard()); });
}

function prospFmtTs(ms){ if(!ms) return ''; var d=new Date(ms); if(isNaN(d.getTime())) return ''; return (d.getMonth()+1)+'/'+d.getDate()+'/'+String(d.getFullYear()).slice(2); }
function prospHttp(u){ return (u && /^https?:\/\//i.test(u)) ? u : ''; }
function prospChip(num,lbl){ return '<div class="prosp-chip"><div class="prosp-chip-num">'+num+'</div><div class="prosp-chip-lbl">'+esc(lbl)+'</div></div>'; }

function prospFiltered(){
  var s = prospectsState;
  var q = (typeof searchQ==='string' ? searchQ : '');   // unify with the top search bar
  return s.list.filter(function(p){
    if(s.kind && p.kind!==s.kind) return false;
    if(s.status){
      var st = p.lastOutcome && p.lastOutcome.status;
      if(s.status==='none'){ if(st) return false; }
      else if(st!==s.status) return false;
    }
    if(q){
      var hay = (p.name+' '+(p.city||'')+' '+(p.state||'')+' '+(p.contactName||'')+' '+(p.email||'')).toLowerCase();
      if(hay.indexOf(q)===-1) return false;
    }
    return true;
  }).sort(function(a,b){
    if(s.sort==='name') return (a.name||'').localeCompare(b.name||'');
    if(s.sort==='seen') return (b.seenCount||0)-(a.seenCount||0);
    return (b.lastSeen||0)-(a.lastSeen||0);
  });
}

function renderProspects(board){
  if(!board) return;
  var s = prospectsState;
  if(!s.loaded && !s.loading && !s.err) fetchProspects(false);   // lazy first load (a prior error is cleared on view re-entry so it retries, without a refetch loop)
  var _sc = board.querySelector('.prosp-wrap'); var _scTop = _sc ? _sc.scrollTop : 0;   // preserve scroll across the innerHTML rebuild (e.g. live search)
  var list = s.list;
  var contractors = list.filter(function(p){return p.kind!=='supplier';}).length;
  var suppliers   = list.filter(function(p){return p.kind==='supplier';}).length;
  var withEmail   = list.filter(function(p){return p.email;}).length;
  var joined      = list.filter(function(p){return p.lastOutcome && p.lastOutcome.status==='joined';}).length;
  var dnc         = list.filter(function(p){return p.lastOutcome && p.lastOutcome.status==='do-not-contact';}).length;

  var kindSel = '<select onchange="setProspKind(this.value)" title="Filter by type">'
    + '<option value="">All types</option>'
    + '<option value="contractor"'+(s.kind==='contractor'?' selected':'')+'>Contractors</option>'
    + '<option value="supplier"'+(s.kind==='supplier'?' selected':'')+'>Suppliers</option></select>';
  var statusSel = '<select onchange="setProspStatus(this.value)" title="Filter by last outcome">'
    + PROSP_STATUSES.map(function(o){ return '<option value="'+o[0]+'"'+(s.status===o[0]?' selected':'')+'>'+esc(o[1])+'</option>'; }).join('') + '</select>';
  var sortSel = '<select onchange="setProspSort(this.value)" title="Sort">'
    + '<option value="recent"'+(s.sort==='recent'?' selected':'')+'>Most recent</option>'
    + '<option value="name"'+(s.sort==='name'?' selected':'')+'>Name A-Z</option>'
    + '<option value="seen"'+(s.sort==='seen'?' selected':'')+'>Times seen</option></select>';
  var bar = '<div class="prosp-bar">'+kindSel+statusSel+sortSel
    + '<button class="prosp-refresh" onclick="reloadProspects()"'+(s.loading?' disabled':'')+'>'+(s.loading?'Loading...':'&#8635; Refresh')+'</button>'
    + '<span class="prosp-hint">Filter by name / city / contact using the search bar above.</span></div>';
  var stats = '<div class="prosp-stats">'
    + prospChip(list.length,'Prospects') + prospChip(contractors,'Contractors') + prospChip(suppliers,'Suppliers')
    + prospChip(withEmail,'With email') + prospChip(joined,'Joined') + prospChip(dnc,'Do not contact') + '</div>';

  var bodyHtml;
  if(s.err && !list.length){   // only blank the panel when there's nothing loaded; a failed refresh keeps the table (+ toast)
    bodyHtml = '<div class="rpt-empty">Couldn\'t load prospects ('+esc(s.err)+').<br>If the Prospects API was just deployed, give it a minute and hit Refresh.</div>';
  } else if(s.loading && !s.loaded){
    bodyHtml = '<div class="rpt-empty">Loading the vendor pipeline...</div>';
  } else if(!list.length){
    bodyHtml = '<div class="rpt-empty">No prospects yet. Vendors appear here automatically as Bid-Out, Find Techs, and Find Suppliers discover them near your work orders.</div>';
  } else {
    var rows = prospFiltered();
    bodyHtml = '<div class="prosp-muted" style="margin-bottom:8px">Showing '+rows.length+' of '+list.length+(s.total>list.length?(' loaded (pipeline has '+s.total+')'):'')+'</div>';
    if(!rows.length){ bodyHtml += '<div class="rpt-empty">Nothing matches these filters.</div>'; }
    else {
      bodyHtml += '<table class="rpt-table"><thead><tr>'
        + '<th>Vendor</th><th>Type</th><th>Trades</th><th>Location</th><th>Contact</th><th>Found by</th><th class="num">Seen</th><th>Last outcome</th><th>Record</th>'
        + '</tr></thead><tbody>' + rows.map(prospRow).join('') + '</tbody></table>';
    }
  }
  board.innerHTML = '<div class="prosp-wrap">'
    + '<div class="rpt-section-hdr" style="margin:0">VENDOR PROSPECT PIPELINE <span class="prosp-muted" style="font-weight:500;text-transform:none;letter-spacing:0">saved from paid discovery - free to browse</span></div>'
    + bar + stats + '<div class="rpt-section" style="padding:12px">'+bodyHtml+'</div></div>';
  var _sc2 = board.querySelector('.prosp-wrap'); if(_sc2 && _scTop) _sc2.scrollTop = _scTop;
}

function prospRow(p){
  var site = prospHttp(p.website);
  var name = site ? ('<a href="'+esc(site).replace(/"/g,'&quot;')+'" target="_blank" rel="noopener noreferrer">'+esc(p.name)+'</a>') : esc(p.name);
  var kind = '<span class="prosp-kind '+(p.kind==='supplier'?'supplier':'contractor')+'">'+(p.kind==='supplier'?'Supplier':'Contractor')+'</span>';
  var trades = (p.trades&&p.trades.length)? esc(p.trades.join(', ')) : '<span class="prosp-muted">-</span>';
  var loc = (p.city||p.state)? esc([p.city,p.state].filter(Boolean).join(', ')) : '<span class="prosp-muted">-</span>';
  var contact = '';
  if(p.contactName||p.contactTitle) contact += '<div>'+esc(p.contactName||'')+(p.contactTitle?(' <span class="prosp-muted">'+esc(p.contactTitle)+'</span>'):'')+'</div>';
  if(p.email) contact += '<div><a href="mailto:'+esc(p.email).replace(/"/g,'&quot;')+'">'+esc(p.email)+'</a>'+(p.emailSrc?(' <span class="prosp-muted">'+esc(p.emailSrc)+'</span>'):'')+'</div>';
  if(p.phone) contact += '<div><a href="tel:'+esc(p.phone).replace(/"/g,'&quot;')+'">'+esc(p.phone)+'</a></div>';
  if(!contact) contact = '<span class="prosp-muted">-</span>';
  var sources = (p.sources&&p.sources.length)? esc(p.sources.join(', ')) : '<span class="prosp-muted">-</span>';
  var seen = (p.seenCount||0) + (p.lastSeen?('<div class="prosp-muted">'+prospFmtTs(p.lastSeen)+'</div>'):'');
  var oc = '<span class="prosp-muted">-</span>';
  if(p.lastOutcome && p.lastOutcome.status){
    var st = p.lastOutcome.status;
    var title = (p.lastOutcome.note||'') + (p.lastOutcome.wo?(' - WO '+p.lastOutcome.wo):'') + (p.lastOutcome.by?(' - '+p.lastOutcome.by):'');
    oc = '<span class="prosp-oc '+esc(st)+'" title="'+esc(title).replace(/"/g,'&quot;')+'">'+esc(st)+'</span>'
       + (p.lastOutcome.ts?(' <span class="prosp-muted">'+prospFmtTs(p.lastOutcome.ts)+'</span>'):'');
  }
  var rec = '<select class="prosp-rec" data-pkey="'+esc(p.key).replace(/"/g,'&quot;')+'" onchange="recordProspectOutcome(this)" title="Record an outcome (saved to the shared pipeline)">'
    + '<option value="">Record...</option><option value="contacted">Contacted</option><option value="declined">Declined</option><option value="no-response">No response</option><option value="joined">Joined network</option><option value="do-not-contact">Do not contact</option></select>';
  return '<tr><td>'+name+'</td><td>'+kind+'</td><td>'+trades+'</td><td>'+loc+'</td><td style="font-size:11px">'+contact+'</td><td class="prosp-muted">'+sources+'</td><td class="num">'+seen+'</td><td>'+oc+'</td><td>'+rec+'</td></tr>';
}

function recordProspectOutcome(sel){
  var key = sel.getAttribute('data-pkey'); var status = sel.value;
  if(!key || !status) return;
  var p = prospectsState.list.find(function(x){return x.key===key;});
  var note = prompt('Optional note for "'+((p&&p.name)||'this vendor')+'" ('+status+') - e.g. why they declined:', '');
  if(note===null){ sel.value=''; return; }   // cancel aborts
  sel.disabled = true;
  fetch('/api/vendor-prospects', { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'same-origin',
      body: JSON.stringify({ outcome: { key:key, status:status, note:note } }) })
    .then(function(r){ return r.json().then(function(j){ if(!r.ok) throw new Error(j && j.error || ('HTTP '+r.status)); return j; }); })
    .then(function(d){
      if(!d || !d.ok || !d.applied) throw new Error('not recorded');
      if(p){ var e={ ts:Date.now(), status:status, wo:'', note:note, by:'you' }; p.outcomes=(p.outcomes||[]).concat([e]); p.lastOutcome=e; }
      toast('Outcome saved: '+status);
      if(view==='prospects') renderProspects(prospBoard());
    })
    .catch(function(e){ sel.disabled=false; sel.value=''; toast('Could not save outcome: '+(e && e.message || e)); });
}

function render(){ updateStatBar(); renderFacets(); renderContent(); }

function updateStatBar(){
  const list = filteredJobs();
  const all = jobs.length;
  const filterCount = Object.values(activeFilters).reduce((a,v)=>a+(v?v.length:0),0);
  let h = `<button class="filt-toggle${filterCount?' active':''}" onclick="toggleSidebar()" title="Show or hide filters">&#9776; Filters${filterCount?` <span class="filt-toggle-cnt">${filterCount}</span>`:''}</button>`;
  const dueCount = jobs.filter(j => !isJobClosed(j) && isActionDue(j)).length;
  h += `<button class="filt-toggle today-toggle${todayOnly?' active':''}" onclick="toggleTodayOnly()" title="Show only jobs that need attention today or are overdue (by Next Touch date)">&#128197; Today${dueCount?` <span class="filt-toggle-cnt">${dueCount}</span>`:''}</button>`;
  h += `<span class="sitem">SHOWING: <strong>${list.length}</strong>${(searchQ||filterCount)?' of '+all:''}</span>`;
  if(searchQ) h+=`<span class="sitem">SEARCH: <strong style="color:var(--green)">${esc(searchQ)}</strong></span>`;
  const stageCounts = {};
  list.forEach(j=>{ const s=j.stages.find(x=>x.id===j.stage); if(s){ if(!stageCounts[s.label]) stageCounts[s.label]={count:0,color:s.color}; stageCounts[s.label].count++; } });
  Object.entries(stageCounts).forEach(([lbl,{count,color}])=>{
    h+=`<span class="sitem">${esc(lbl.toUpperCase())}: <strong style="color:${color}">${count}</strong></span>`;

function renderContent(){

function allStageKeys(list){
  const seen = new Map();
  list.forEach(j=>{ j.stages.forEach(s=>{ if(!seen.has(s.id)) seen.set(s.id,{...s,count:0}); seen.get(s.id).count++; }); });
  const order = [];
  list.forEach(j=>j.stages.forEach(s=>{ if(!order.includes(s.id)) order.push(s.id); }));
  return order.map(id=>seen.get(id)).filter(Boolean);
}

function renderGantt(el, list){
  const today=new Date(); today.setHours(0,0,0,0);
  const ts=today.toISOString().slice(0,10);
  const jw=list.filter(hasTimeline), jn=list.filter(j=>!hasTimeline(j));
  let mn=ts,mx=ts;
  jw.forEach(job=>ganttSegs(job).forEach(seg=>{ if(seg.start<mn)mn=seg.start; if(seg.end>mx)mx=seg.end; }));
  const ps=new Date(mn+'T00:00:00'); ps.setDate(ps.getDate()-7);
  const pe=new Date(mx+'T00:00:00'); pe.setDate(pe.getDate()+7);
  const td=(pe-ps)/86400000;
  const lp=d=>((new Date(d+'T00:00:00')-ps)/86400000/td*100).toFixed(2)+'%';
  const wp=(a,b)=>Math.max(0,(new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000/td*100).toFixed(2)+'%';
  let mh=''; const dm=new Date(ps);
  while(dm<=pe){ const l=((dm-ps)/86400000/td*100).toFixed(2); mh+=`<div class="gantt-month" style="left:${l}%">${dm.toLocaleString('default',{month:'short'})+' '+String(dm.getFullYear()).slice(2)}</div>`; dm.setMonth(dm.getMonth()+1); dm.setDate(1); }
  const tp=((new Date(ts+'T00:00:00')-ps)/86400000/td*100).toFixed(2);
  let h=`<div class="gantt-wrap"><div class="gantt-hdr-row"><div class="gantt-label-col">Job</div><div class="gantt-timeline-hdr" style="position:relative;overflow:hidden;height:34px">${mh}<div class="gantt-today-line" style="left:${tp}%"><div class="gantt-today-lbl">Today</div></div></div></div>`;
  if(!jw.length&&!jn.length) h+='<div style="padding:32px;color:var(--t3);font-size:12px">No jobs match current filter</div>';
  jw.forEach(job=>{
    const sg=ganttSegs(job), stage=job.stages.find(s=>s.id===job.stage), sp=spct(job,job.stage);
    const ci=job.stages.findIndex(s=>s.id===job.stage);
    const projected=!!job.startDate;
    let bars=`<div class="gantt-today-line" style="left:${tp}%;height:24px"></div>`;
    sg.forEach((seg,i)=>{
      const s=job.stages.find(x=>x.id===seg.sid);
      const isCur=seg.sid===job.stage, isPast=i<ci;
      const wn=parseFloat(wp(seg.start,seg.end));
      bars+=`<div class="gantt-seg" title="${s?.label}: ${seg.start} to ${seg.end}${projected?' (projected)':' (actual)'}" style="left:${lp(seg.start)};width:${wp(seg.start,seg.end)};background:${s?.color||'#64748b'};opacity:${isPast?0.35:isCur?1:0.2}" onclick="event.stopPropagation();openSchedule('${job.id}')">
        ${isCur?`<div class="gantt-prog" style="width:${sp}%"></div>`:''}
        <span class="gantt-seg-lbl">${wn>3?s?.label:''}</span>
      </div>`;
    });
    h+=`<div class="gantt-row${selId===job.id?' sel':''}" onclick="openSchedule('${job.id}')" oncontextmenu="showCtx(event,'${job.id}')"><div class="gantt-label"><div class="gantt-label-city">${esc(job.city||'Unknown')}${job.state?', '+esc(job.state):''}${projected?'':' <span class="gantt-actual-tag">actual</span>'}</div><div class="gantt-label-sub" style="color:${stage?.color||'var(--t3)'}">${esc(job.wo||'-')} &bull; ${esc(stage?.label||'')} &bull; ${esc(job.projectType||'')} </div></div><div class="gantt-bar-area">${bars}</div></div>`;
  });
  if(jn.length){
    h+=`<div style="padding:12px 0 5px;font-size:9px;font-weight:600;text-transform:none;letter-spacing:normal;color:var(--t3)">No timeline yet (${jn.length}) - set a start date or move the job through a stage</div>`;
    jn.forEach(job=>{ const stage=job.stages.find(s=>s.id===job.stage); h+=`<div class="gantt-row" onclick="openSchedule('${job.id}')" oncontextmenu="showCtx(event,'${job.id}')"><div class="gantt-label"><div class="gantt-label-city">${esc(job.city||'Unknown')}</div><div class="gantt-label-sub" style="color:${stage?.color||'var(--t3)'}">${esc(job.wo||'-')} &bull; ${esc(stage?.label||'')} </div></div><div class="gantt-bar-area"><div class="gantt-no-date"><span>Set start date in panel to place on timeline</span></div></div></div>`; });
  }
  el.innerHTML=h+'</div>';
}

// ══════════════════════════════════════════════════════
// REPORTS VIEW + AUDIT SYNC
// ══════════════════════════════════════════════════════
//
// Reports is the analytical layer over jobs. Two sections:
//
//   1. Overview - counts of active/complete/in-flight; per-template
//      breakdown; "stuck" jobs that have been in their current stage longer
//      than its template duration target. This is the at-a-glance health check.
//
//   2. Bottleneck - per-stage rollup (mean, median, P90 time-in-stage) so we
//      can see *which* stage is sticking. Median is interpolated (so even-sized
//      sets behave correctly), P90 instead of raw max (one outlier shouldn't
//      define the column).
//
// All metrics derive from the Job Board's own data (stageHistory + template
// duration targets). The audit overlay is informational only and surfaces as
// a divergence flag - it never feeds reporting math, because Mike's policy
// is "Job Board is truth."

function percentile(sortedAsc, p){
  if(!sortedAsc.length) return null;
  if(sortedAsc.length === 1) return sortedAsc[0];
  const idx = (sortedAsc.length - 1) * p;
  const lo = Math.floor(idx), hi = Math.ceil(idx);
  if(lo === hi) return sortedAsc[lo];
  return sortedAsc[lo] + (sortedAsc[hi] - sortedAsc[lo]) * (idx - lo);
}

// "Closed" detection - works across templates because every shipped template
// ends with an id of 'closed', but be defensive in case a custom stage list omits it.
function isJobClosed(job){
  const s = job.stages.find(x => x.id === job.stage);
  if(!s) return false;
  return s.id === 'closed' || /closed|complete|invoiced|paid/i.test(s.label);
}

// rptUiState is the open/closed flags for the inline editors inside the
// Reports view. Kept outside `jobs` so it doesn't pollute persisted state -
// editors collapse by default each session, which is the right behavior
// (the editor is occasional, not always-on).
const rptUiState = { targetsOpen:false, statMapOpen:false };

function toggleStatMapEditor(){ rptUiState.statMapOpen  = !rptUiState.statMapOpen;  render(); }

// Renders the editable per-template-stage target table. Saves on blur of each
// input. Empty input clears the override and falls back to the template default
// (which is then shown as a placeholder). "Reset" button blows away all overrides.
function renderTargetsEditorHTML(){
  let h = '<div class="rpt-editor">';
  h += '<div class="rpt-editor-hdr">Time-in-stage targets (business days). Empty = use template default.</div>';
  Object.keys(STAGE_TEMPLATES).forEach(tplKey => {
    if(tplKey === 'custom') return;  // Custom templates have no fixed stages to target
    const tpl = STAGE_TEMPLATES[tplKey];
    h += `<div class="rpt-editor-group"><div class="rpt-editor-group-hdr">${esc(TPL_LABELS[tplKey]||tplKey)}</div><div class="rpt-editor-grid">`;
    tpl.stages.forEach(s => {
      const override = stageTargets[tplKey]?.[s.id];
      const value = (typeof override === 'number') ? override : '';
      h += `<div class="rpt-editor-cell">
        <label style="font-size:9px;color:var(--t3);text-transform:none;letter-spacing:normal">${esc(s.label)}</label>
        <input type="number" min="0" step="1" value="${value}" placeholder="${s.dur}" data-tpl="${esc(tplKey)}" data-stage="${esc(s.id)}" onchange="onTargetEdit(this)" class="rpt-editor-input">
      </div>`;
    });
    h += '</div></div>';
  });
  h += '<div style="margin-top:8px;display:flex;gap:8px"><button class="btn btn-ghost" style="font-size:10px;padding:4px 10px" onclick="resetAllTargets()">Reset to template defaults</button></div>';
  h += '</div>';
  return h;
}
function onTargetEdit(input){
  const tplKey = input.dataset.tpl;
  const stageId = input.dataset.stage;
  const raw = input.value.trim();
  if(!stageTargets[tplKey]) stageTargets[tplKey] = {};
  if(raw === ''){
    delete stageTargets[tplKey][stageId];
    if(!Object.keys(stageTargets[tplKey]).length) delete stageTargets[tplKey];
  } else {
    const n = Number(raw);
    if(!isFinite(n) || n < 0){ toast('Target must be a non-negative number'); return; }
    stageTargets[tplKey][stageId] = n;
  }
  saveTargets();
  render();  // bottleneck/stuck tables recompute live
}
function resetAllTargets(){
  if(!confirm('Reset all stage target overrides to template defaults? This will clear ALL your custom targets.')) return;
  stageTargets = {};
  saveTargets();
  render();
  toast('Targets reset');
}

// Renders the editable status→stage mapping table. Defaults always appear; user
// overrides ride on top. Each row is "audit status → board stage label" with
// the stage as a free-form text field (since stages vary across templates and
// are user-editable). Add-row button at the bottom; delete via clearing.
function renderStatMapEditorHTML(){
  const eff = effectiveStatusMap();
  // Audit statuses present in the data but NOT in the map (need attention).
  const unmappedSet = new Set(unmappedStatuses().map(u => u.status.toLowerCase()));
  const unmappedList = unmappedStatuses();
  // Sort: user-added/overridden first, then defaults.
  const keys = Object.keys(eff).sort((a,b) => {
    const ua = (a in statusToStage), ub = (b in statusToStage);
    if(ua !== ub) return ua ? -1 : 1;
    return a < b ? -1 : 1;
  });
  const stageOptions = new Set();
  Object.values(STAGE_TEMPLATES).forEach(t => (t.stages||[]).forEach(s => s.label && stageOptions.add(s.label)));
  const stageOpts = [...stageOptions].sort();
  const optsHTML = (sel) => stageOpts.map(o => `<option value="${esc(o)}" ${o===sel?'selected':''}>${esc(o)}</option>`).join('');

  let h = '<div class="rpt-editor">';
  h += '<div class="rpt-editor-hdr">Map audit status → board stage. Used to detect divergence and avoid false flags. Built-in defaults are shown; your edits ride on top.</div>';
  // Controls: search + unmapped-only

      <td style="font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;font-size:11px">${esc(k)}${isUser?' <span class="rpt-flag green">custom</span>':''}</td>
      <td><select onchange="onStatMapSet('${esc(k).replace(/'/g,'&#39;')}', this.value)" class="rpt-editor-input"><option value="">- (no mapping)</option>${optsHTML(eff[k])}</select></td>
      <td>${isUser ? `<button class="btn btn-ghost" style="font-size:9px;padding:2px 6px" onclick="onStatMapClear('${esc(k).replace(/'/g,'&#39;')}')">Clear</button>` : ''}</td>
    </tr>`;
  });

// Live row filter for the status-map editor (search text + unmapped-only).
// No re-render, so input focus is preserved.
function filterStatMap(){
  const q = (document.getElementById('statmap-search')?.value || '').toLowerCase().trim();
  const unmappedOnly = !!document.getElementById('statmap-unmapped-only')?.checked;
  const tbody = document.getElementById('statmap-tbody');
  if(!tbody) return;
  tbody.querySelectorAll('tr').forEach(tr => {
    const status = tr.dataset.status || '';
    const isUnmapped = tr.dataset.unmapped === '1';
    const matchesText = !q || status.includes(q);
    const matchesUnmapped = !unmappedOnly || isUnmapped;
    tr.style.display = (matchesText && matchesUnmapped) ? '' : 'none';
  });
}
function onStatMapSet(key, val){

function onStatMapClear(key){

// ══════════════════════════════════════════════════════
// FLOW ANALYTICS (added)
// All derived from the Job Board's own stageHistory. These are honest
// approximations: jobs imported without movement history have only a single
// stage-entry, so they're excluded from cycle-time math and appear in the CFD
// only from their entry date forward. Nothing here fabricates daily snapshots.
// ══════════════════════════════════════════════════════

function isBlocked(job){ return !!(job && job.blocked); }
function blockedAgeDays(job){
  if(!isBlocked(job) || !job.blockedAt) return null;
  return (Date.now() - new Date(job.blockedAt).getTime()) / 86400000;
}

// Completion timestamp = when the job entered its (closed) stage. Only valid
// if the job is closed AND we have a history entry for that closed stage.
function completionDate(job){
  if(!isJobClosed(job)) return null;
  const h = Array.isArray(job.stageHistory) ? job.stageHistory : [];
  if(!h.length) return null;
  const last = h[h.length-1];
  if(!last || !last.enteredAt) return null;
  const d = new Date(last.enteredAt);
  return isNaN(d.getTime()) ? null : d;
}

// End-to-end cycle time (days) for a CLOSED job: first stage entry -> closed
// entry. Needs >= 2 distinct history entries. Returns null otherwise (which is
// how single-entry imported-as-closed jobs get excluded).
function cycleTimeDays(job){
  if(!isJobClosed(job)) return null;
  const h = Array.isArray(job.stageHistory) ? job.stageHistory : [];
  if(h.length < 2) return null;
  const start = new Date(h[0].enteredAt).getTime();
  const end   = new Date(h[h.length-1].enteredAt).getTime();
  if(!isFinite(start) || !isFinite(end) || end < start) return null;
  return (end - start) / 86400000;
}

// WIP = active (non-closed) jobs, plus a per-stage breakdown.
function wipByStage(list){
  const active = list.filter(j => !isJobClosed(j));
  const byStage = new Map();
  active.forEach(j => {
    const s = j.stages.find(x => x.id === j.stage);
    const label = s ? s.label : 'Unknown';
    if(!byStage.has(label)) byStage.set(label, {label, color: s ? s.color : '#64748b', count:0});
    byStage.get(label).count++;
  });
  return { total: active.length, stages: Array.from(byStage.values()).sort((a,b)=>b.count-a.count) };
}

// Audit statuses present in auditByWo that have no entry in the effective
// status map - i.e. statuses we can't reconcile to a board stage.
function unmappedStatuses(){
  const map = effectiveStatusMap();
  const seen = new Map(); // lowerStatus -> {status, count}
  Object.values(auditByWo).forEach(a => {
    const raw = (a && a.status) ? String(a.status).trim() : '';
    if(!raw) return;
    const key = raw.toLowerCase();
    if(!(key in map)){
      if(!seen.has(key)) seen.set(key, {status: raw, count:0});
      seen.get(key).count++;
    }
  });
  return Array.from(seen.values()).sort((a,b)=>b.count-a.count);
}

// ── CONTROL CHART (individuals / XmR) ──
// Plots closed-job cycle times in completion-date order with a center line and
// 3-sigma control limits estimated from the average moving range (the standard
// SPC method for individual measurements). LCL floored at 0.
function buildControlChart(list){
  const all = list.map(j => ({ job:j, date: completionDate(j), ct: cycleTimeDays(j) }))
                  .filter(p => p.date && p.ct !== null);
  all.sort((a,b) => a.date - b.date);
  const closedTotal = list.filter(isJobClosed).length;
  const excluded = closedTotal - all.length;
  if(all.length < 2){
    return { points: all, cl:null, ucl:null, lcl:null, excluded, closedTotal, insufficient:true };
  }
  const cts = all.map(p => p.ct);
  const cl = cts.reduce((s,v)=>s+v,0) / cts.length;
  let mrSum = 0;
  for(let i=1;i<cts.length;i++) mrSum += Math.abs(cts[i]-cts[i-1]);
  const mrBar = mrSum / (cts.length - 1);
  const ucl = cl + 2.66 * mrBar;
  const lcl = Math.max(0, cl - 2.66 * mrBar);
  all.forEach(p => { p.ooc = (p.ct > ucl) || (p.ct < lcl); });
  return { points: all, cl, ucl, lcl, mrBar, excluded, closedTotal, insufficient:false };
}

function fmtShortDate(d){
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
}

function controlChartSVG(data){

  }
  const W=720, H=260, padL=44, padR=16, padT=16, padB=42;

  // x labels (first, mid, last)

    .map(i=>`<text x="${x(i).toFixed(1)}" y="${H-padB+16}" text-anchor="middle" font-size="9" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">${fmtShortDate(pts[i].date)}</text>`).join('');
  const dots = pts.map((p,i)=>{

  </svg>`;
